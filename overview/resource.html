    // 1. 获取URL参数 (不使用 URLSearchParams 兼容旧浏览器)
    function getQueryParam(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return unescape(r[2]); return null;
    }

    // 2. 时间与主题判断
    function initThemeAndGreeting() {
        var now = new Date();
        var hours = now.getHours();
        var days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        var months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        
        var dateStr = months[now.getMonth()] + ' ' + now.getDate() + '日 · ' + days[now.getDay()];
        document.getElementById('date-box').innerHTML = dateStr;

        var greeting = "你好";
        if (hours >= 5 && hours < 11) greeting = "早上好";
        else if (hours >= 11 && hours < 17) greeting = "下午好";
        else greeting = "晚上好";
        document.getElementById('greeting-box').innerHTML = greeting;

        // 夜间模式判定 (17点后或5点前)
        if (hours >= 17 || hours < 5) {
            document.body.className = "night";
        } else {
            document.body.className = "light";
        }
    }

    // 3. 渲染逻辑
    function render() {
        var page = getQueryParam('page') || "2"; // 默认显示WEB资源 (page=2)
        var container = document.getElementById('contentContainer');
        var html = "";

        // 更新Tab样式
        if(page == "1") {
            document.getElementById('tab-pc').className += " btn-active";
        } else {
            document.getElementById('tab-web').className += " btn-active";
        }

        // 分组数据
        var pcCategories = ["Office软件", "Adoble软件"];
        var displayData = {};
        var allWebItems = [];

        // 提取数据
        for (var cat in rawData) {
            var isPC = false;
            for(var i=0; i<pcCategories.length; i++) {
                if(cat == pcCategories[i]) isPC = true;
            }

            if(page == "1" && isPC) {
                displayData[cat] = rawData[cat];
            } else if (page == "2" && !isPC) {
                displayData[cat] = rawData[cat];
                // 收集所有WEB资源用于推荐
                allWebItems = allWebItems.concat(rawData[cat]);
            }
        }

        // 如果是WEB资源，增加智能推荐
        if(page == "2" && allWebItems.length > 0) {
            var shuffled = allWebItems.sort(function(){ return 0.5 - Math.random() });
            var recommended = shuffled.slice(0, 10);
            html += buildSection("智能推荐 (✨)", recommended);
        }

        // 渲染常规分类
        for (var catName in displayData) {
            html += buildSection(catName, displayData[catName]);
        }

        container.innerHTML = html;
    }

    function buildSection(title, items) {
        var section = '<div class="category-group">';
        section += '<div class="category-title">' + title + '</div>';
        section += '<div class="resource-list">';
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var img = item.imageUrl || DEFAULT_IMG;
            section += '<a href="' + item.url + '" class="card clearfix" target="_blank">';
            section += '<div class="img-box"><img src="' + img + '" onerror="this.src=\''+DEFAULT_IMG+'\'" /></div>';
            section += '<div class="res-info">';
            section += '<span class="resource-title">' + item.title + '</span>';
            section += '<span class="resource-tag">点击获取资源</span>';
            section += '</div></a>';
        }
        section += '</div></div>';
        return section;
    }

    // 4. 搜索功能 (支持实时过滤)
    function handleSearch() {
        var keyword = document.getElementById('searchInput').value.toLowerCase();
        var cards = document.getElementsByClassName('card');
        for (var i = 0; i < cards.length; i++) {
            var title = cards[i].getElementsByClassName('resource-title')[0].innerHTML.toLowerCase();
            if (title.indexOf(keyword) > -1) {
                cards[i].style.display = "block";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // 执行初始化
    initThemeAndGreeting();
    render();

</script>
</body>
</html>
