        .cancel-btn { float: right; color: #ff3b30; font-weight: bold; }

        .app-info { display: table-cell; vertical-align: middle; padding-left: 10px; }
        .app-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; color: #000; }

        .tab.active { color: #007aff; font-weight: bold; }

        function setDateAndGreeting() {
            var now = new Date();
            var days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            var months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            var dateStr = months[now.getMonth()] + ' ' + now.getDate() + '日 · ' + days[now.getDay()];
            document.getElementById('currentDate').innerHTML = dateStr;
            
            var hours = now.getHours();
            var greeting = '';
            // 修正后的时间逻辑
            if (hours >= 5 && hours < 11) { 
                greeting = '早上好'; 
                document.body.classList.remove('night');
            } else if (hours >= 11 && hours < 17) { 
                greeting = '下午好'; 
                document.body.classList.remove('night');
            } else { 
                greeting = '晚上好';
                // 晚上 17:00 - 凌晨 04:59 开启深色模式
                document.body.classList.add('night');
            }
            document.getElementById('greetingText').innerHTML = greeting;
        }

        function initAppList() {
            var appList = document.getElementById('appList');
            appList.innerHTML = '';
            for (var i = 0; i < appData.length; i++) {
                var app = appData[i];
                var appItem = document.createElement('div');
                appItem.className = 'app-item';
                appItem.onclick = (function(url){ return function(){ navigate(url); } })(app.url);
                appItem.innerHTML = '<div class="app-icon"><img src="'+app.icon+'"></div>' +
                                   '<div class="app-info"><div class="app-name">'+app.name+'</div>' +
                                   '<div class="app-desc">'+app.desc+'</div></div>' +
                                   '<div class="app-get"><div class="get-btn">获取</div></div>';
                appList.appendChild(appItem);
            }
        }

        function toggleDescription() {
            var text = document.querySelector('.description-text');
            var btn = document.querySelector('.toggle-btn');
            if (text.classList.contains('expanded')) {
                text.classList.remove('expanded');
                btn.textContent = '展开';
            } else {
                text.classList.add('expanded');
                btn.textContent = '收起';
            }
        }

        function toggleSearch() {
            var box = document.getElementById('searchContainer');
            box.style.display = (box.style.display === 'none') ? 'block' : 'none';
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterApps('');
            toggleSearch();
        }

        function filterApps(keyword) {
            var items = document.getElementsByClassName('app-item');
            keyword = keyword.toLowerCase();
            for (var i = 0; i < items.length; i++) {
                var name = items[i].querySelector('.app-name').textContent.toLowerCase();
                items[i].style.display = (name.indexOf(keyword) !== -1) ? 'table' : 'none';
            }
        }

        function navigate(url) {
            window.location.href = url;
        }

        window.onload = function() {
            setDateAndGreeting();
            initAppList();
            document.getElementById('searchInput').oninput = function(e) {
                filterApps(e.target.value);
            };
        };
    </script>
