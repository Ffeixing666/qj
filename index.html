<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣加应用</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- 通用初始化 --- */
        #pc-view, #mobile-view {
            display: none; /* 初始隐藏，由JS决定显示哪个 */
        }

        /* --- PC端样式 (完全保留原样) --- */
        .pc-body-style {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
        }
        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .fixed-image {
            position: fixed;
            bottom: 3px;
            right: 3px;
            z-index: 9999;
            max-width: 150px; 
            cursor: pointer;
        }
        .fixed-image img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* --- 手机端样式 (完全保留原样) --- */
        :root {
            --primary: #4a6bdf;
            --primary-dark: #3a56b2;
            --secondary: #6c757d;
            --light: #f8f9fa;
            --dark: #212529;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .mobile-wrapper {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f5f7ff;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.5;
        }
        
        header {
            padding: 60px 0 40px;
            text-align: center;
            position: relative;
        }
        
        .title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(90deg, var(--primary), #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 80px;
        }
        
        .btn {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 30px;
            border-radius: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
            overflow: hidden;
            z-index: 1;
            min-width: 220px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-secondary:hover {
            background: rgba(74, 107, 223, 0.05);
        }
        
        .btn-text {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .btn-subtext {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }
        
        .feature-card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }
        
        .feature-card:nth-child(1) { animation: fadeInUp 0.8s ease-out 0.4s forwards; }
        .feature-card:nth-child(2) { animation: fadeInUp 0.8s ease-out 0.5s forwards; }
        .feature-card:nth-child(3) { animation: fadeInUp 0.8s ease-out 0.6s forwards; }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .feature-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--dark);
        }
        
        .feature-desc {
            color: var(--secondary);
            font-size: 1rem;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .button-group { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 280px; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="pc-view">
        <iframe src="https://app-ar7sfvuq9tkx.appmiaoda.com/pc-software" class="fullscreen-iframe"></iframe>
        <div class="fixed-image">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_izsbOFvjO_1775484649035.png" alt="Floating Image">
        </div>
    </div>

    <div id="mobile-view" class="mobile-wrapper">
        <div id="particles-js"></div>
        <div class="container">
            <header>
                <h1 class="title">Welcome to 趣加应用</h1>
                <div class="button-group">
                    <a href="https://db0ai4hqk7tsfy.database.nocode.cn/storage/v1/object/public/qujia//%E8%B6%A3%E5%8A%A0%E5%BA%94%E7%94%A82.0.1.apk" class="btn btn-primary">
                        <span class="btn-text">立即下载</span>
                        <span class="btn-subtext">最新版本v2.0.1|260215</span>
                    </a>
                    <a href="http://qujiaweb.top/overview" class="btn btn-secondary">
                        <span class="btn-text">访问网页版</span>
                        <span class="btn-subtext">电脑版已升级，请通过电脑访问</span>
                    </a>
                </div>
            </header>
            <main>
                <div class="features">
                    <div class="feature-card">
                        <div class="feature-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <h3 class="feature-title">应用分享</h3>
                        <p class="feature-desc">自由上传，随心下载</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                        <h3 class="feature-title">网页共享</h3>
                        <p class="feature-desc">闪电分享，超多实用</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon"><i class="fas fa-gem"></i></div>
                        <h3 class="feature-title">免费畅享</h3>
                        <p class="feature-desc">纯洁无广，无忧体验</p>
                    </div>
                </div>
            </main>
            <footer>Copyright © 2026 趣味加倍科技. All Rights Reserved</footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        (function() {
            // 判断是否为手机端
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            var pcEl = document.getElementById('pc-view');
            var mobileEl = document.getElementById('mobile-view');

            if (isMobile) {
                // 手机端逻辑
                mobileEl.style.display = 'block';
                document.body.style.overflow = 'auto'; // 允许滚动
                
                // 初始化粒子效果
                if (typeof particlesJS !== 'undefined') {
                    particlesJS('particles-js', {
                        "particles": {
                            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                            "color": { "value": "#4a6bdf" },
                            "shape": { "type": "circle" },
                            "opacity": { "value": 0.3 },
                            "size": { "value": 3, "random": true },
                            "line_linked": { "enable": true, "distance": 150, "color": "#4a6bdf", "opacity": 0.2, "width": 1 },
                            "move": { "enable": true, "speed": 2 }
                        },
                        "interactivity": {
                            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
                        },
                        "retina_detect": true
                    });
                }
            } else {
                // PC端逻辑
                pcEl.style.display = 'block';
                document.documentElement.classList.add('pc-body-style');
                document.body.classList.add('pc-body-style'); // 应用PC端的overflow:hidden
            }
        })();
    </script>
</body>
</html>
