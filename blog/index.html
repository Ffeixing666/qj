<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>加载中</title>
    <style>
        /* 极简重置，确保无任何额外边距与文字干扰 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 杜绝任何伪元素生成文本的可能 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 柔和深邃的现代渐变背景，优雅不刺眼 */
            background: radial-gradient(circle at 10% 30%, rgba(18, 25, 45, 0.95), rgba(8, 12, 22, 0.98));
            /* 备选纯色，确保任何环境下都有质感 */
            background-attachment: fixed;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', 'Noto Sans', sans-serif;
            /* 完全没有任何文字装饰或多余内容 */
            overflow: hidden;
            position: relative;
        }

        /* 纯粹只承载「加载中」三个字的容器，无任何多余文本或图标 */
        .loading-pure {
            /* 字号优雅适配各种屏幕，最小48px，最大96px，避免过小或过大失美感 */
            font-size: clamp(2.8rem, 10vw, 5.6rem);
            font-weight: 520;
            letter-spacing: 0.12em;
            /* 高级玻璃质感文字：半透明白色+微光晕，干净且轻盈 */
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2), 0 0 0 rgba(120, 180, 255, 0.3);
            /* 柔和的呼吸动画，仅作用于透明度与轻微位移，无额外图形或文字 */
            animation: subtleBreathing 1.9s ease-in-out infinite;
            transition: all 0.2s ease;
            /* 确保背景完全透明，不产生任何装饰块 */
            background: transparent;
            /* 增加一点精细的 backdrop 光晕，但不添加任何字符或图形元素 */
            backdrop-filter: blur(0px);
            text-align: center;
            /* 保持优雅行距 */
            line-height: 1.2;
            /* 防止任何可能被选中的额外样式 */
            user-select: none;
        }

        /* 极致优雅的呼吸动效：只改变透明度与极其轻微的上下浮动，不产生任何额外文本或形状 */
        @keyframes subtleBreathing {
            0% {
                opacity: 0.65;
                transform: translateY(0px);
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            }
            50% {
                opacity: 1;
                transform: translateY(-4px);
                text-shadow: 0 8px 24px rgba(80, 150, 255, 0.25), 0 0 8px rgba(255, 255, 255, 0.2);
            }
            100% {
                opacity: 0.65;
                transform: translateY(0px);
                text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            }
        }

        /* 可选增加极简的微光晕背景氛围，但完全不会引入任何文本或图形，仅提升视觉层次 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 40%, rgba(70, 130, 200, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 确保加载文字位于最前，且无任何其他伪元素生成文字 */
        .loading-pure {
            position: relative;
            z-index: 2;
        }

        /* 针对移动端极致适配，防止任何意外边距 */
        @media (max-width: 640px) {
            .loading-pure {
                letter-spacing: 0.08em;
                font-weight: 500;
            }
        }

        /* 禁用任何高亮与触摸反馈，避免产生额外UI */
        body, .loading-pure {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- 页面只包含「加载中」三个字，没有任何多余字符、图标、标点或数字 -->
    <div class="loading-pure">加载中</div>
    
    <script>
        // 严格实现「打开立即跳转」: 使用 window.location.replace 进行无历史记录的即时重定向
        // 保证页面在显示「加载中」之后立即执行跳转（浏览器渲染文字与脚本顺序保证用户可见优雅过渡）
        // 目标地址完全符合需求，无任何额外延迟或妥协
        (function() {
            // 目标URL（完全符合需求，立即跳转）
            const targetUrl = "https://app-aklgfcuigg75.appmiaoda.com";
            
            // 使用 replace 方法替换当前历史记录，跳转后用户无法回到本页，体验更流畅
            // 同时确保页面加载后瞬间执行，满足「立即跳转」的定义
            // 由于脚本位于 DOM 元素之后，页面已经渲染出「加载中」三个字，用户可见到优雅的加载提示再跳转
            window.location.replace(targetUrl);
        })();
    </script>
</body>
</html>
