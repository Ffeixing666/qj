<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>加载中</title>
    <style>
        /* 极简纯粹 —— 只有「加载中」三个字，无任何多余文字或图形 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 20%, #0a0f1c, #03050b);
            background-attachment: fixed;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 唯一文本：加载中，优雅呼吸动画，无任何多余装饰 */
        .loading-text {
            font-size: clamp(2.5rem, 12vw, 5rem);
            font-weight: 500;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.3), 0 0 2px rgba(100, 180, 255, 0.2);
            animation: softBreathing 1.9s ease-in-out infinite;
            background: transparent;
            text-align: center;
            user-select: none;
            line-height: 1.2;
        }

        /* 柔和呼吸：透明度 + 微浮动，干净优雅 */
        @keyframes softBreathing {
            0% {
                opacity: 0.65;
                transform: translateY(0px);
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            }
            50% {
                opacity: 1;
                transform: translateY(-4px);
                text-shadow: 0 8px 24px rgba(80, 160, 255, 0.25), 0 0 6px rgba(255, 255, 255, 0.15);
            }
            100% {
                opacity: 0.65;
                transform: translateY(0px);
                text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            }
        }

        /* 极简背景光晕，不产生任何文字或图形 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 50%, rgba(56, 139, 253, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .loading-text {
            position: relative;
            z-index: 2;
        }

        @media (max-width: 640px) {
            .loading-text {
                letter-spacing: 0.08em;
                font-weight: 480;
            }
        }
    </style>
</head>
<body>
    <div class="loading-text">加载中</div>

    <script>
        (function() {
            // 目标地址
            const TARGET_URL = "https://app-aklgfcuigg75.appmiaoda.com";
            // 等待时间 2000 毫秒（2秒）
            const SPLASH_DELAY_MS = 2000;
            
            // 跳转是否已执行（防止重复）
            let navigationTriggered = false;
            
            // 检测是否为 5+ 环境
            const isPlusEnv = typeof window.plus !== 'undefined' && plus && plus.webview;
            
            /**
             * 5+ 方式：创建新 Webview 窗口，带动画滑动打开（新页面）
             * 不会关闭当前开屏页，符合「新增页面」要求
             */
            function openWithPlusAnimation(url) {
                if (!isPlusEnv) return false;
                try {
                    // 唯一窗口标识
                    const viewId = 'target_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                    // 创建 Webview，全屏，无滚动条
                    const newWebview = plus.webview.create(url, viewId, {
                        top: '0px',
                        left: '0px',
                        width: '100%',
                        height: '100%',
                        scalable: false,
                        scrollIndicator: 'none',
                        // 滑动进入动画 (从右侧滑入)
                        transition: { type: "slide-in-right", duration: 350 }
                    });
                    // 显示新窗口
                    newWebview.show();
                    console.log('[5+ 方式] 新页面已创建并滑动展示:', url);
                    return true;
                } catch (e) {
                    console.error('[5+ 打开失败]', e);
                    return false;
                }
            }
            
            /**
             * 非5+环境降级：使用标准方式打开新标签页（新增页面）
             * 优先 window.open，若被拦截则使用 location.href（但保留当前页）
             */
            function fallbackOpenNewPage(url) {
                try {
                    // 尝试打开新标签页
                    const newTab = window.open(url, '_blank');
                    if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                        // 被拦截时，使用 location.href 在当前窗口跳转（仍然算新页面，但替换当前页）
                        // 但为了最大程度保留当前开屏页，部分浏览器可能不支持；这里仍保持打开新页面的意图
                        window.location.href = url;
                    }
                } catch (e) {
                    // 任何异常下使用最直接跳转
                    window.location.href = url;
                }
            }
            
            /**
             * 核心跳转：优先 5+ 滑动新页面，否则普通新页面打开
             * 不使用 replace，不关闭当前页
             */
            function performNavigation() {
                if (navigationTriggered) return;
                navigationTriggered = true;
                
                let success = false;
                if (isPlusEnv) {
                    success = openWithPlusAnimation(TARGET_URL);
                }
                if (!success) {
                    fallbackOpenNewPage(TARGET_URL);
                }
            }
            
            // 等待 2000ms 后执行跳转（开屏优雅展示）
            setTimeout(() => {
                performNavigation();
            }, SPLASH_DELAY_MS);
            
            // ---------- 返回键处理（完整适配 5+ 和普通浏览器）----------
            // 1. 5+ 环境：监听物理返回键，根据是否已跳转给出退出确认
            function registerPlusBackButton() {
                if (!window.plus || !plus.key) return;
                // 避免重复绑定
                if (window._backKeyRegistered) return;
                window._backKeyRegistered = true;
                
                plus.key.addEventListener('backbutton', function() {
                    if (!navigationTriggered) {
                        // 尚未跳转（2秒内用户按返回键），询问退出应用
                        plus.nativeUI.confirm("确定要退出应用吗？", function(e) {
                            if (e.index === 0) {
                                plus.runtime.quit();
                            }
                        }, "提示", ["退出", "取消"]);
                    } else {
                        // 已经执行跳转（新页面已打开），当前开屏页在后台或前台，按返回键也应提供退出选项
                        plus.nativeUI.confirm("是否退出应用？", function(res) {
                            if (res.index === 0) {
                                plus.runtime.quit();
                            }
                        }, "提示", ["退出", "取消"]);
                    }
                });
            }
            
            // 监听 plusready 或立即注册（如果 plus 已存在）
            if (window.plus) {
                if (plus.key) {
                    registerPlusBackButton();
                } else {
                    document.addEventListener('plusready', registerPlusBackButton);
                }
            } else {
                // 非5+环境：普通浏览器处理返回键（popstate）
                // 增加历史状态以便捕获返回事件
                history.pushState(null, null, location.href);
                let backConfirmed = false;
                window.addEventListener('popstate', function() {
                    if (!navigationTriggered && !backConfirmed) {
                        backConfirmed = true;
                        const userWantsExit = confirm("正在加载中，确定要离开吗？");
                        if (userWantsExit) {
                            // 用户确认退出，尝试关闭窗口或跳转空白
                            window.close();
                            if (!window.closed) {
                                window.location.href = 'about:blank';
                            }
                        } else {
                            // 取消退出，重新压入历史记录
                            history.pushState(null, null, location.href);
                            backConfirmed = false;
                        }
                    } else if (navigationTriggered) {
                        // 已经跳转新页面，此时按返回不再干扰（可静默处理）
                        // 保持原历史即可
                    } else {
                        history.pushState(null, null, location.href);
                    }
                });
            }
            
            // 额外保险：在 plus 未触发 ready 但对象已存在情况下再次尝试
            if (window.plus && !window._backKeyRegistered) {
                setTimeout(() => {
                    if (window.plus && plus.key && !window._backKeyRegistered) {
                        registerPlusBackButton();
                    }
                }, 100);
            }
        })();
    </script>
</body>
</html>
