<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<title>Spark AI Pro</title>
<style type="text/css">
    /* 全球通用的 CSS2 语法，确保 iOS 6 甚至更早版本都能解析 */
    body, html { margin: 0; padding: 0; background-color: #000; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; height: 100%; overflow: hidden; color: #fff; }
    
    /* iOS 26 UI: 极黑、悬浮感、极致圆角 */
    #container { position: relative; width: 100%; height: 100%; background: #000; }
    
    #top-bar { height: 50px; line-height: 50px; text-align: center; background: #0a0a0a; border-bottom: 1px solid #1c1c1e; font-size: 17px; font-weight: bold; letter-spacing: 2px; color: #007aff; }

    #chat-window { position: absolute; top: 51px; bottom: 80px; left: 0; right: 0; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }

    /* 气泡样式：未来主义超大圆角 */
    .msg-group { margin-bottom: 20px; clear: both; overflow: hidden; width: 100%; }
    .bubble { padding: 14px 18px; max-width: 80%; word-wrap: break-word; font-size: 15px; line-height: 1.6; -webkit-border-radius: 25px; border-radius: 25px; position: relative; }
    
    .u-bubble { float: right; background: #007aff; color: #fff; -webkit-border-bottom-right-radius: 5px; border-bottom-right-radius: 5px; }
    .a-bubble { float: left; background: #1c1c1e; color: #f2f2f7; border: 1px solid #2c2c2e; -webkit-border-bottom-left-radius: 5px; border-bottom-left-radius: 5px; }

    /* 代码块显示：iOS 26 荧光风格 */
    .code-block { background: #000; border: 1px solid #333; padding: 12px; -webkit-border-radius: 12px; border-radius: 12px; font-family: "Courier New", Courier, monospace; font-size: 13px; color: #30d158; margin: 10px 0; white-space: pre-wrap; display: block; overflow-x: auto; }
    
    .del-action { display: block; font-size: 11px; color: #48484a; text-decoration: none; margin-top: 8px; cursor: pointer; }
    .u-bubble .del-action { text-align: right; color: #add3ff; }

    /* 底部 Table 布局：彻底解决对齐问题 */
    #bottom-dock { position: absolute; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; border-top: 1px solid #1c1c1e; }
    .input-table { width: 100%; height: 100%; border-collapse: collapse; }
    .input-table td { padding: 0 10px; vertical-align: middle; }
    
    #msg-input { 
        width: 100%; height: 44px; background: #1c1c1e; border: 1px solid #3a3a3c; color: #fff; 
        padding: 0 15px; -webkit-border-radius: 22px; border-radius: 22px; outline: none; font-size: 16px;
        box-sizing: border-box; -webkit-appearance: none;
    }
    
    #send-btn { 
        width: 70px; height: 44px; background: #007aff; border: none; color: #fff; 
        font-weight: bold; -webkit-border-radius: 22px; border-radius: 22px; cursor: pointer; font-size: 15px;
    }

    .thinking-tag { color: #8e8e93; font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<div id="container">
    <div id="top-bar">SPARK PRO</div>
    
    <div id="chat-window">
        </div>

    <div id="bottom-dock">
        <table class="input-table" cellpadding="0" cellspacing="0">
            <tr>
                <td><input type="text" id="msg-input" placeholder="输入消息..." /></td>
                <td style="width:80px;"><button id="send-btn" onclick="doSend()">发送</button></td>
            </tr>
        </table>
    </div>
</div>

<script type="text/javascript">
    var win = document.getElementById('chat-window');
    var inp = document.getElementById('msg-input');
    var DB_KEY = 'spark_v5_data';
    var isAjaxing = false;

    // 1. 格式化解析（代码块、换行、Emoji）
    function format(str) {
        var safe = str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        var parts = safe.split('```');
        var out = '';
        for (var i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                out += '<div class="code-block">' + parts[i] + '</div>';
            } else {
                out += '<span style="white-space:pre-wrap;">' + parts[i] + '</span>';
            }
        }
        return out;
    }

    // 2. 存储管理
    function getHistory() {
        try {
            var h = localStorage.getItem(DB_KEY);
            return h ? JSON.parse(h) : [];
        } catch(e) { return []; }
    }

    function saveHistory(arr) {
        try { localStorage.setItem(DB_KEY, JSON.stringify(arr)); } catch(e) {}
    }

    // 3. 渲染单条气泡
    function drawBubble(role, text, id, isLoading) {
        var group = document.createElement('div');
        group.className = 'msg-group';
        if (isLoading) group.id = 'loading-node';

        var cls = (role === 'user') ? 'u-bubble' : 'a-bubble';
        var html = '<div class="bubble ' + cls + '"><div>';
        
        if (isLoading) {
            html += '<span class="thinking-tag">正在调取星火大脑...</span>';
        } else {
            html += format(text);
        }
        
        html += '</div>';
        if (!isLoading) {
            html += '<a class="del-action" onclick="killMsg(' + id + ')">× 移除</a>';
        }
        html += '</div>';
        
        group.innerHTML = html;
        win.appendChild(group);
        win.scrollTop = win.scrollHeight;
    }

    // 4. 全局刷新
    function reload() {
        win.innerHTML = '';
        var h = getHistory();
        for (var i = 0; i < h.length; i++) {
            drawBubble(h[i].role, h[i].text, i, false);
        }
    }

    // 5. 核心发送逻辑
    function doSend() {
        var val = inp.value;
        if (!val || isAjaxing) return;

        isAjaxing = true;
        
        // 保存并展示用户消息
        var h = getHistory();
        h.push({role: 'user', text: val});
        saveHistory(h);
        drawBubble('user', val, h.length - 1, false);
        
        inp.value = '';

        // 显示“加载中”气泡
        drawBubble('ai', '', null, true);

        // API 请求 - 修正 404 问题：去掉结尾斜杠，直接拼接查询字符串
        var xhr = new XMLHttpRequest();
        var apiBase = '[https://api.pearktrue.cn/api/xfai/](https://api.pearktrue.cn/api/xfai/)'; // 保持官方地址
        var fullUrl = apiBase + '?message=' + encodeURIComponent(val);

        xhr.open('GET', fullUrl, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                isAjaxing = false;
                
                // 移除加载气泡
                var ld = document.getElementById('loading-node');
                if (ld) ld.parentNode.removeChild(ld);

                if (xhr.status === 200) {
                    try {
                        var json = JSON.parse(xhr.responseText);
                        if (json.code === 200) {
                            var ans = json.data.answer;
                            var h2 = getHistory();
                            h2.push({role: 'ai', text: ans});
                            saveHistory(h2);
                            drawBubble('ai', ans, h2.length - 1, false);
                        } else {
                            alert('Spark: ' + json.msg);
                        }
                    } catch(e) {
                        alert('数据解析异常');
                    }
                } else {
                    alert('网络连接失败 (状态码:' + xhr.status + ')');
                }
            }
        };

        xhr.onerror = function() {
            isAjaxing = false;
            var ld = document.getElementById('loading-node');
            if (ld) ld.parentNode.removeChild(ld);
            alert('请求拦截：请检查网络或 HTTPS 证书是否正常。');
        };

        xhr.send();
    }

    function killMsg(index) {
        var h = getHistory();
        h.splice(index, 1);
        saveHistory(h);
        reload();
    }

    inp.onkeydown = function(e) {
        var key = e.keyCode || e.which;
        if (key === 13) doSend();
    };

    window.onload = reload;
</script>
</body>
</html>
