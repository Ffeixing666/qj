<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享应用</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-blue: #007AFF;
            --line-color: rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: #1C1C1E; }
        
        header { position: sticky; top: 0; z-index: 100; background: rgba(242,242,247,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line-color); }
        .nav-bar { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .nav-title { font-size: 17px; font-weight: 600; }

        .container { padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; text-align: center; border: 1px solid var(--line-color); width: 100%; }

        #picker { position: fixed; inset: 0; background: #fff; z-index: 1000; display: none; flex-direction: column; }
        .p-header { padding: 10px 16px; border-bottom: 0.5px solid var(--line-color); display: flex; align-items: center; }
        .search-box { flex: 1; background: #efeff4; border-radius: 10px; padding: 6px 12px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; }
        
        #app-list { flex: 1; overflow-y: auto; }
        .app-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--line-color); }
        .app-icon-default { width: 48px; height: 48px; border-radius: 10px; margin-right: 14px; background: #e5e5ea; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        
        #detail-step { display: none; }
        .info-box { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .preview-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .preview-icon { width: 64px; height: 64px; border-radius: 14px; background: #f0f0f0; object-fit: contain; }
        
        .input-group { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .input-item { padding: 14px; }
        textarea { width: 100%; border: none; outline: none; font-size: 15px; height: 100px; resize: none; }
        
        .btn-post { width: 100%; height: 50px; background: var(--ios-blue); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; }
        .btn-post:disabled { background: #ccc; }
        #status-log { font-size: 13px; color: var(--ios-blue); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div onclick="location.reload()" style="color:var(--ios-blue)">取消</div>
            <div class="nav-title">分享应用</div>
            <div style="width:30px"></div>
        </div>
    </header>

    <div class="container" id="entry-step">
        <div class="card" onclick="openPicker()">
            <div style="font-size: 32px; margin-bottom: 8px;">📦</div>
            <strong>选择已安装应用</strong>
        </div>
    </div>

    <div class="container" id="detail-step">
        <div class="info-box">
            <div class="preview-header">
                <img id="res-icon" class="preview-icon">
                <div style="flex:1">
                    <b id="res-name"></b><br>
                    <small id="res-pkg" style="color:#8e8e93"></small>
                </div>
            </div>
            <div id="status-log">准备中...</div>
        </div>
        <div class="input-group">
            <div class="input-item"><textarea id="app-intro" placeholder="说点什么吧..."></textarea></div>
        </div>
        <button class="btn-post" id="submitBtn" disabled onclick="finalSubmit()">上传同步中</button>
    </div>

    <div id="picker">
        <div class="p-header">
            <div class="search-box"><input type="text" id="searchInput" placeholder="搜索已安装应用..." oninput="searchApp(this.value)"></div>
            <div onclick="closePicker()" style="color:var(--ios-blue); margin-left:12px">取消</div>
        </div>
        <div id="app-list"></div>
    </div>

    <script>
        let allApps = [];
        let selectedApp = null;
        const uploadApi = "https://apirank.qujiaweb.top/?mode=upload_meituan";

        function openPicker() {
            document.getElementById('picker').style.display = 'flex';
            if (allApps.length === 0) scanApps();
        }
        function closePicker() { document.getElementById('picker').style.display = 'none'; }

        function scanApps() {
            if (!window.plus) return;
            const main = plus.android.runtimeMainActivity();
            const pm = main.getPackageManager();
            const list = plus.android.invoke(pm, "getInstalledPackages", 0);
            const count = plus.android.invoke(list, "size");

            allApps = [];
            for (let i = 0; i < count; i++) {
                const pkg = plus.android.invoke(list, "get", i);
                const ai = plus.android.getAttribute(pkg, "applicationInfo");
                if ((plus.android.getAttribute(ai, "flags") & 1) !== 0) continue; 
                allApps.push({
                    name: plus.android.invoke(ai, "loadLabel", pm).toString(),
                    pkg: plus.android.getAttribute(pkg, "packageName"),
                    ver: plus.android.getAttribute(pkg, "versionName"),
                    path: plus.android.getAttribute(ai, "publicSourceDir")
                });
            }
            allApps.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
            render(allApps);
        }

        function render(data) {
            document.getElementById('app-list').innerHTML = data.map((app, i) => `
                <div class="app-item" onclick="pickApp(${i})">
                    <div class="app-icon-default">📦</div>
                    <div style="flex:1; overflow:hidden;">
                        <b>${app.name}</b><br><small style="color:#999">${app.pkg}</small>
                    </div>
                </div>
            `).join('');
        }

        // --- 核心：修正后的图标抓取逻辑 ---
        function getIconSync(packageName) {
            try {
                const main = plus.android.runtimeMainActivity();
                const pm = main.getPackageManager();
                const ai = pm.getApplicationInfo(packageName, 0);
                const drawable = ai.loadIcon(pm);

                // 显式导入所有需要的类
                plus.android.importClass("android.graphics.Bitmap");
                plus.android.importClass("android.graphics.Canvas");
                plus.android.importClass("android.graphics.drawable.BitmapDrawable");
                plus.android.importClass("java.io.ByteArrayOutputStream");
                plus.android.importClass("android.util.Base64");

                const Bitmap = window.android.graphics.Bitmap;
                const Canvas = window.android.graphics.Canvas;
                const ByteArrayOutputStream = window.java.io.ByteArrayOutputStream;
                const Base64 = window.android.util.Base64;

                let w = drawable.getIntrinsicWidth();
                let h = drawable.getIntrinsicHeight();
                if (w <= 0 || h <= 0) { w = 144; h = 144; }

                // 强行创建一个画布绘制，无论它是 Adaptive 还是普通的
                const bitmap = Bitmap.createBitmap(w, h, Bitmap.Config.ARGB_8888);
                const canvas = new Canvas(bitmap);
                drawable.setBounds(0, 0, w, h);
                drawable.draw(canvas);

                const stream = new ByteArrayOutputStream();
                bitmap.compress(Bitmap.CompressFormat.PNG, 100, stream);
                const bytes = stream.toByteArray();
                
                // NO_WRAP (值为 2) 非常关键，去掉所有回车符
                const base64Str = Base64.encodeToString(bytes, 2); 
                
                bitmap.recycle(); // 释放内存
                return "data:image/png;base64," + base64Str;
            } catch (e) {
                console.error("图标获取失败: " + e);
                return "https://via.placeholder.com/100?text=Error";
            }
        }

        async function pickApp(index) {
            const searchVal = document.getElementById('searchInput').value;
            const currentList = searchVal ? allApps.filter(a => a.name.includes(searchVal)) : allApps;
            selectedApp = currentList[index];

            closePicker();
            document.getElementById('entry-step').style.display = 'none';
            document.getElementById('detail-step').style.display = 'block';
            document.getElementById('res-name').innerText = selectedApp.name;
            document.getElementById('res-pkg').innerText = selectedApp.pkg;
            
            document.getElementById('status-log').innerText = "✨ 正在提取应用图标...";

            // 延迟一丢丢执行，给 UI 渲染时间
            setTimeout(() => {
                const b64 = getIconSync(selectedApp.pkg);
                selectedApp.icon = b64;
                document.getElementById('res-icon').src = b64;
                startUploadFlow();
            }, 100);
        }

        function startUploadFlow() {
            const log = document.getElementById('status-log');
            const btn = document.getElementById('submitBtn');

            plus.io.resolveLocalFileSystemURL(selectedApp.path, (entry) => {
                entry.file((file) => {
                    selectedApp.size = (file.size / 1024 / 1024).toFixed(2) + "MB";
                    log.innerText = "图标已锁定，开始同步 APK...";
                    
                    const task = plus.uploader.createUpload(uploadApi, { method: "POST" }, (t, status) => {
                        if (status == 200) {
                            selectedApp.remoteUrl = JSON.parse(t.responseText).full_url;
                            log.innerHTML = `<span style="color:#4CD964">✅ 同步成功 (${selectedApp.size})</span>`;
                            btn.disabled = false;
                            btn.innerText = "完成发布";
                        } else {
                            log.innerText = "❌ APK 同步失败";
                        }
                    });
                    task.addFile(selectedApp.path, { key: "file" });
                    task.addEventListener("statechanged", (t) => {
                        if(t.state == 3) {
                            const p = Math.round((t.uploadedSize / t.totalSize) * 100);
                            log.innerText = `同步中：${p}%`;
                        }
                    });
                    task.start();
                });
            });
        }

        async function finalSubmit() {
            const mail = localStorage.getItem('usermail') || "";
            const data = {
                name: selectedApp.name,
                link: selectedApp.remoteUrl,
                icon: selectedApp.icon,
                intro: document.getElementById('app-intro').value,
                package_name: selectedApp.pkg,
                version: selectedApp.ver,
                size: selectedApp.size
            };
            const res = await fetch(`https://apirank.qujiaweb.top/?mode=add_app&mail=${mail}`, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            if ((await res.json()).code === 200) {
                alert("发布成功");
                plus.webview.currentWebview().close();
            }
        }
        
        function searchApp(val) {
            const filtered = allApps.filter(a => a.name.toLowerCase().includes(val.toLowerCase()));
            render(filtered);
        }
    </script>
</body>
</html>
