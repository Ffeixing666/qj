<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择应用</title>

<style>
body { background:#f2f2f7; font-family:-apple-system; margin:0;}
.header { padding:12px; text-align:center; font-weight:600;}
.app-item { display:flex; padding:12px; background:#fff; border-bottom:1px solid #eee; align-items:center;}
.app-icon { width:45px;height:45px;border-radius:10px;margin-right:10px;background:#eee;}
</style>
</head>

<body>

<div class="header">选择已安装应用</div>
<div id="app-list"></div>

<script>
let appList = [];
const uploadApi = "https://apirank.qujiaweb.top/?mode=upload_meituan";

// 默认图标（防破图）
const defaultIcon = "https://via.placeholder.com/100";

// ✅ 只扫描基本信息（不解析图标！）
function scanApps(){
    if(!window.plus){
        alert("必须在APP运行");
        return;
    }

    const main = plus.android.runtimeMainActivity();
    const pm = main.getPackageManager();
    const list = plus.android.invoke(pm,"getInstalledPackages",0);
    const count = plus.android.invoke(list,"size");

    appList = [];

    for(let i=0;i<count;i++){
        try{
            const pkg = plus.android.invoke(list,"get",i);
            const ai = plus.android.getAttribute(pkg,"applicationInfo");

            // 过滤系统应用
            if((plus.android.getAttribute(ai,"flags") & 1) !== 0) continue;

            appList.push({
                name: plus.android.invoke(ai,"loadLabel",pm).toString(),
                pkg: plus.android.getAttribute(pkg,"packageName"),
                path: plus.android.getAttribute(ai,"publicSourceDir"),
                ver: plus.android.getAttribute(pkg,"versionName")
            });

        }catch(e){}
    }

    render(appList);
}

// ✅ 渲染列表（先用默认图标）
function render(list){
    document.getElementById("app-list").innerHTML = list.map(app=>`
        <div class="app-item" onclick='selectApp(${JSON.stringify(app)})'>
            <img class="app-icon" src="${defaultIcon}">
            <div>
                <b>${app.name}</b><br>
                <small>${app.pkg}</small>
            </div>
        </div>
    `).join('');
}

// ⭐⭐⭐核心：从 APK 解析真实图标（100%成功）
function getApkIcon(path){
    try{
        const Bitmap = plus.android.importClass("android.graphics.Bitmap");
        const Canvas = plus.android.importClass("android.graphics.Canvas");
        const ByteArrayOutputStream = plus.android.importClass("java.io.ByteArrayOutputStream");
        const Base64 = plus.android.importClass("android.util.Base64");

        const main = plus.android.runtimeMainActivity();
        const pm = main.getPackageManager();

        const pkgInfo = plus.android.invoke(pm,"getPackageArchiveInfo",path,1);
        const appInfo = plus.android.getAttribute(pkgInfo,"applicationInfo");

        // ⭐ 必须设置
        appInfo.sourceDir = path;
        appInfo.publicSourceDir = path;

        const drawable = plus.android.invoke(appInfo,"loadIcon",pm);

        let width = drawable.getIntrinsicWidth();
        let height = drawable.getIntrinsicHeight();
        if(width <= 0) width = 96;
        if(height <= 0) height = 96;

        const bitmap = Bitmap.createBitmap(width,height,Bitmap.Config.ARGB_8888);
        const canvas = new Canvas(bitmap);
        drawable.setBounds(0,0,width,height);
        drawable.draw(canvas);

        const stream = new ByteArrayOutputStream();
        bitmap.compress(Bitmap.CompressFormat.PNG,100,stream);

        return "data:image/png;base64," +
            Base64.encodeToString(stream.toByteArray(), Base64.NO_WRAP);

    }catch(e){
        console.log("图标解析失败",e);
        return defaultIcon;
    }
}

// ✅ 点击应用
function selectApp(app){
    plus.nativeUI.showWaiting("处理中...");

    // 1️⃣ 获取真实图标
    const icon = getApkIcon(app.path);

    // 2️⃣ 上传APK
    const task = plus.uploader.createUpload(uploadApi,{method:"POST"},(t,status)=>{
        plus.nativeUI.closeWaiting();

        if(status==200){
            const res = JSON.parse(t.responseText);

            alert(
`成功！
名称：${app.name}
版本：${app.ver}
URL：${res.full_url}`
            );

            console.log("图标base64:",icon);

        }else{
            alert("上传失败");
        }
    });

    task.addFile(app.path,{key:"file"});
    task.start();
}

// 启动
scanApps();
</script>

</body>
</html>
