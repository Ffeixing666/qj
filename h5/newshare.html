<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分享应用</title>

<style>
body { font-family: -apple-system; background:#f2f2f7; }
.app-item { display:flex; padding:10px; border-bottom:1px solid #eee; align-items:center;}
.app-icon { width:45px;height:45px;border-radius:10px;margin-right:10px;background:#eee;}
</style>
</head>

<body>

<button onclick="openPicker()">选择已安装应用</button>

<div id="picker" style="display:none;">
    <input oninput="searchApp(this.value)" placeholder="搜索">
    <div id="app-list"></div>
</div>

<script>
let allApps = [];

function openPicker(){
    document.getElementById('picker').style.display='block';
    if(allApps.length===0) scanApps();
}

// ⭐⭐⭐核心修复函数⭐⭐⭐
function drawableToBase64(drawable){
    try{
        const Bitmap = plus.android.importClass("android.graphics.Bitmap");
        const Canvas = plus.android.importClass("android.graphics.Canvas");
        const BitmapDrawable = plus.android.importClass("android.graphics.drawable.BitmapDrawable");
        const AdaptiveIconDrawable = plus.android.importClass("android.graphics.drawable.AdaptiveIconDrawable");
        const ByteArrayOutputStream = plus.android.importClass("java.io.ByteArrayOutputStream");
        const Base64 = plus.android.importClass("android.util.Base64");

        let bitmap;

        // ✅ 1. 如果是 BitmapDrawable
        if(drawable instanceof BitmapDrawable){
            bitmap = drawable.getBitmap();
        }

        // ✅ 2. 如果是 AdaptiveIcon（安卓8+）
        else if (typeof AdaptiveIconDrawable !== "undefined" && drawable instanceof AdaptiveIconDrawable){
            const width = 108;
            const height = 108;
            bitmap = Bitmap.createBitmap(width,height,Bitmap.Config.ARGB_8888);
            const canvas = new Canvas(bitmap);
            drawable.setBounds(0,0,width,height);
            drawable.draw(canvas);
        }

        // ✅ 3. 其他 Drawable
        else{
            let width = drawable.getIntrinsicWidth();
            let height = drawable.getIntrinsicHeight();

            if(width <= 0) width = 96;
            if(height <= 0) height = 96;

            bitmap = Bitmap.createBitmap(width,height,Bitmap.Config.ARGB_8888);
            const canvas = new Canvas(bitmap);
            drawable.setBounds(0,0,width,height);
            drawable.draw(canvas);
        }

        const stream = new ByteArrayOutputStream();
        bitmap.compress(Bitmap.CompressFormat.PNG,100,stream);

        return "data:image/png;base64," +
            Base64.encodeToString(stream.toByteArray(), Base64.NO_WRAP);

    }catch(e){
        console.log("图标失败:",e);
        return "";
    }
}

function scanApps(){
    if(!window.plus){
        alert("必须在APP里运行");
        return;
    }

    const main = plus.android.runtimeMainActivity();
    const pm = main.getPackageManager();
    const list = plus.android.invoke(pm,"getInstalledPackages",0);
    const count = plus.android.invoke(list,"size");

    allApps = [];

    for(let i=0;i<count;i++){
        try{
            const pkg = plus.android.invoke(list,"get",i);
            const ai = plus.android.getAttribute(pkg,"applicationInfo");

            // 过滤系统应用
            if((plus.android.getAttribute(ai,"flags") & 1) !== 0) continue;

            const name = plus.android.invoke(ai,"loadLabel",pm).toString();
            const iconDrawable = plus.android.invoke(ai,"loadIcon",pm);

            const icon = drawableToBase64(iconDrawable);

            allApps.push({
                name:name,
                pkg:plus.android.getAttribute(pkg,"packageName"),
                icon:icon || ""
            });

        }catch(e){
            console.log("跳过异常应用",e);
        }
    }

    render(allApps);
}

function render(data){
    document.getElementById('app-list').innerHTML = data.map(app=>`
        <div class="app-item" onclick='pickApp(${JSON.stringify(app)})'>
            <img class="app-icon" src="${app.icon || 'https://via.placeholder.com/100'}">
            <div>${app.name}</div>
        </div>
    `).join('');
}

function pickApp(app){
    console.log("选中:",app);
}

// 修复搜索bug
function searchApp(val){
    const list = allApps.filter(a =>
        a.name.toLowerCase().includes(val.toLowerCase())
    );
    render(list);
}
</script>

</body>
</html>
