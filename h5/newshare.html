<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享应用</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-blue: #007AFF;
            --line-color: rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: #1C1C1E; }
        
        header { position: sticky; top: 0; z-index: 100; background: rgba(242,242,247,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line-color); }
        .nav-bar { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .nav-title { font-size: 17px; font-weight: 600; }

        .container { padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; text-align: center; border: 1px solid var(--line-color); width: 100%; }

        #picker { position: fixed; inset: 0; background: #fff; z-index: 1000; display: none; flex-direction: column; }
        .p-header { padding: 10px 16px; border-bottom: 0.5px solid var(--line-color); display: flex; align-items: center; }
        .search-box { flex: 1; background: #eee; border-radius: 8px; padding: 6px 12px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; }
        
        #app-list { flex: 1; overflow-y: auto; }
        .app-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--line-color); }
        .app-icon { width: 48px; height: 48px; border-radius: 10px; margin-right: 12px; background: #f0f0f0; object-fit: contain; }
        
        #detail-step { display: none; }
        .info-box { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .preview-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .preview-icon { width: 64px; height: 64px; border-radius: 14px; background: #eee; }
        .input-group { background: #fff; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .input-item { padding: 12px; }
        textarea { width: 100%; border: none; outline: none; font-size: 15px; height: 100px; resize: none; }
        .btn-post { width: 100%; height: 50px; background: var(--ios-blue); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; }
        #status-log { font-size: 12px; color: var(--ios-blue); margin-top: 8px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div onclick="location.reload()">取消</div>
            <div class="nav-title">分享应用</div>
            <div style="width:30px"></div>
        </div>
    </header>

    <div class="container" id="entry-step">
        <div class="card" onclick="openPicker()">
            <strong>选择已安装应用</strong>
        </div>
    </div>

    <div class="container" id="detail-step">
        <div class="info-box">
            <div class="preview-header">
                <img id="res-icon" class="preview-icon">
                <div>
                    <b id="res-name"></b><br>
                    <small id="res-pkg" style="color:#8e8e93"></small>
                </div>
            </div>
            <div id="status-log">同步 APK 中...</div>
        </div>
        <div class="input-group"><div class="input-item"><textarea id="app-intro" placeholder="写点介绍..."></textarea></div></div>
        <button class="btn-post" id="submitBtn" disabled onclick="finalSubmit()">请等待上传</button>
    </div>

    <div id="picker">
        <div class="p-header">
            <div class="search-box"><input type="text" placeholder="搜索应用..." oninput="searchApp(this.value)"></div>
            <div onclick="closePicker()" style="color:var(--ios-blue); margin-left:10px">取消</div>
        </div>
        <div id="app-list"></div>
    </div>

    <script>
        let allApps = [];
        let selectedApp = null;

        function openPicker() {
            document.getElementById('picker').style.display = 'flex';
            if (allApps.length === 0) setTimeout(scanApps, 200);
        }
        function closePicker() { document.getElementById('picker').style.display = 'none'; }

        // --- 修正后的：硬核资源 ID 提取法 ---
        function extractIcon(packageName) {
            try {
                const main = plus.android.runtimeMainActivity();
                const pm = main.getPackageManager();
                const appInfo = pm.getApplicationInfo(packageName, 0);
                
                // 1. 获取该 App 的资源对象
                const resources = pm.getResourcesForApplication(appInfo);
                // 2. 获取该 App 的图标资源 ID
                const iconId = plus.android.getAttribute(appInfo, "icon");
                
                if (!iconId) return "";

                // 3. 导入原生工具类
                const BitmapFactory = plus.android.importClass("android.graphics.BitmapFactory");
                const Bitmap = plus.android.importClass("android.graphics.Bitmap");
                const ByteArrayOutputStream = plus.android.importClass("java.io.ByteArrayOutputStream");
                const Base64 = plus.android.importClass("android.util.Base64");
                const Canvas = plus.android.importClass("android.graphics.Canvas");

                // 4. 通过资源 ID 直接获取 Drawable (不使用 draw)
                const drawable = resources.getDrawable(iconId);
                
                // 5. 转换为 Bitmap (处理 AdaptiveIcon)
                let w = drawable.getIntrinsicWidth();
                let h = drawable.getIntrinsicHeight();
                if (w <= 0) { w = 144; h = 144; }
                
                const bitmap = Bitmap.createBitmap(w, h, Bitmap.Config.ARGB_8888);
                const canvas = new Canvas(bitmap);
                drawable.setBounds(0, 0, w, h);
                drawable.draw(canvas);

                const stream = new ByteArrayOutputStream();
                bitmap.compress(Bitmap.CompressFormat.PNG, 100, stream);
                const base64 = Base64.encodeToString(stream.toByteArray(), Base64.NO_WRAP);
                
                bitmap.recycle();
                return "data:image/png;base64," + base64;
            } catch (e) {
                console.log("提取失败: " + packageName);
                return "";
            }
        }

        function scanApps() {
            const main = plus.android.runtimeMainActivity();
            const pm = main.getPackageManager();
            const list = plus.android.invoke(pm, "getInstalledPackages", 0);
            const count = plus.android.invoke(list, "size");

            allApps = [];
            for (let i = 0; i < count; i++) {
                const pkg = plus.android.invoke(list, "get", i);
                const ai = plus.android.getAttribute(pkg, "applicationInfo");
                if ((plus.android.getAttribute(ai, "flags") & 1) !== 0) continue;

                const pkgName = plus.android.getAttribute(pkg, "packageName");
                allApps.push({
                    name: plus.android.invoke(ai, "loadLabel", pm).toString(),
                    pkg: pkgName,
                    ver: plus.android.getAttribute(pkg, "versionName"),
                    path: plus.android.getAttribute(ai, "publicSourceDir"),
                    icon: "" // 稍后提取
                });
            }
            render();
        }

        function render() {
            document.getElementById('app-list').innerHTML = allApps.map((app, i) => `
                <div class="app-item" onclick="pickApp(${i})">
                    <img id="img-${i}" class="app-icon" src="">
                    <div><b>${app.name}</b><br><small>${app.pkg}</small></div>
                </div>
            `).join('');

            // 分批提取，解决“一张都加载不出来”的核心问题：不要在循环里等待
            allApps.forEach((app, i) => {
                setTimeout(() => {
                    const b64 = extractIcon(app.pkg);
                    app.icon = b64;
                    const img = document.getElementById(`img-${i}`);
                    if (img) img.src = b64 || 'https://via.placeholder.com/48?text=App';
                }, i * 30);
            });
        }

        function pickApp(index) {
            selectedApp = allApps[index];
            closePicker();
            document.getElementById('entry-step').style.display = 'none';
            document.getElementById('detail-step').style.display = 'block';
            document.getElementById('res-icon').src = selectedApp.icon;
            document.getElementById('res-name').innerText = selectedApp.name;
            document.getElementById('res-pkg').innerText = selectedApp.pkg;
            startUpload(selectedApp.path);
        }

        function startUpload(path) {
            const log = document.getElementById('status-log');
            const btn = document.getElementById('submitBtn');
            const task = plus.uploader.createUpload("https://apirank.qujiaweb.top/?mode=upload_meituan", {method:"POST"}, (t,s)=>{
                if(s==200){
                    selectedApp.url = JSON.parse(t.responseText).full_url;
                    log.innerText = "✅ APK 准备就绪";
                    btn.disabled = false;
                    btn.innerText = "立即发布";
                }
            });
            task.addFile(path, {key:"file"});
            task.start();
        }

        async function finalSubmit() {
            const mail = localStorage.getItem('usermail') || "";
            const data = {
                name: selectedApp.name,
                link: selectedApp.url,
                icon: selectedApp.icon,
                intro: document.getElementById('app-intro').value,
                package_name: selectedApp.pkg,
                version: selectedApp.ver
            };
            const res = await fetch(`https://apirank.qujiaweb.top/?mode=add_app&mail=${mail}`, {
                method:'POST',
                body: JSON.stringify(data)
            });
            if((await res.json()).code == 200) {
                alert("分享成功");
                plus.webview.currentWebview().close();
            }
        }

        function searchApp(v) {
            const f = allApps.filter(a => a.name.toLowerCase().includes(v.toLowerCase()));
            // 这里为了简单重新全量渲染，实际使用可优化
        }
    </script>
</body>
</html>
