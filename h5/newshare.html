<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享应用</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-blue: #007AFF;
            --text-main: #1C1C1E;
            --line-color: rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: var(--text-main); overflow-x: hidden; }
        
        header { position: sticky; top: 0; z-index: 100; background: rgba(242,242,247,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line-color); }
        .nav-bar { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .nav-title { font-size: 17px; font-weight: 600; }

        .container { padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; text-align: center; border: 1px solid var(--line-color); width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card:active { background: #f9f9f9; }

        #picker { position: fixed; inset: 0; background: #fff; z-index: 1000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .p-header { padding: 10px 16px; border-bottom: 0.5px solid var(--line-color); display: flex; align-items: center; }
        .search-box { flex: 1; background: #efeff4; border-radius: 10px; padding: 6px 12px; display: flex; align-items: center; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; }
        
        #app-list { flex: 1; overflow-y: auto; }
        .app-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--line-color); }
        .app-item:active { background: #f2f2f2; }
        .app-icon { width: 50px; height: 50px; border-radius: 11px; margin-right: 14px; background: #f0f0f0; object-fit: cover; }
        
        #detail-step { display: none; }
        .info-box { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .preview-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .preview-icon { width: 64px; height: 64px; border-radius: 14px; background: #eee; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        
        .input-group { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .input-item { padding: 14px; }
        textarea { width: 100%; border: none; outline: none; font-size: 15px; height: 100px; resize: none; font-family: inherit; }
        
        .btn-post { width: 100%; height: 50px; background: var(--ios-blue); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; transition: opacity 0.2s; }
        .btn-post:disabled { opacity: 0.5; }
        #upload-progress { font-size: 13px; color: var(--ios-blue); margin-top: 8px; font-weight: 500; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div onclick="location.reload()" style="color:var(--ios-blue); font-size: 16px;">取消</div>
            <div class="nav-title">分享应用</div>
            <div style="width:35px"></div>
        </div>
    </header>

    <div class="container" id="entry-step">
        <div class="card" onclick="openPicker()">
            <div style="font-size: 32px; margin-bottom: 8px;">📦</div>
            <strong>选择已安装应用</strong><br>
            <small style="color:#8e8e93">从系统中自动提取APK与图标</small>
        </div>
    </div>

    <div class="container" id="detail-step">
        <div class="info-box">
            <div class="preview-header">
                <img id="res-icon" class="preview-icon">
                <div style="flex:1">
                    <b id="res-name" style="font-size: 18px;"></b><br>
                    <small id="res-pkg" style="color:#8e8e93; font-size: 12px;"></small>
                </div>
            </div>
            <p id="res-meta" style="font-size:12px; color:#666; padding-top: 8px; border-top: 0.5px solid #eee;"></p>
            <div id="upload-progress">正在解析文件流...</div>
        </div>

        <div class="input-group">
            <div class="input-item">
                <textarea id="app-intro" placeholder="聊聊这个应用有什么特别之处..."></textarea>
            </div>
        </div>
        
        <button class="btn-post" id="submitBtn" disabled onclick="finalSubmit()">等待上传完成</button>
    </div>

    <div id="picker">
        <div class="p-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索应用名称或包名..." oninput="searchApp(this.value)">
            </div>
            <div onclick="closePicker()" style="color:var(--ios-blue); margin-left:12px; font-size: 16px;">关闭</div>
        </div>
        <div id="app-list">
            <div style="padding:50px; text-align:center; color:#999;">正在读取系统应用列表...</div>
        </div>
    </div>

    <script>
        let allApps = [];
        let selectedApp = null;
        const uploadApi = "https://apirank.qujiaweb.top/?mode=upload_meituan";

        function openPicker() {
            document.getElementById('picker').style.display = 'flex';
            if (allApps.length === 0) {
                scanApps(); // 直接调用异步扫描
            }
        }
        function closePicker() { document.getElementById('picker').style.display = 'none'; }

        const DEFAULT_ICON_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAHBhaW50Lm5ldCA0LjAuMTM0A1t6AAAAI0lEQVR4Xu3BMQEAAADCoPVPbQ0PoAAAAAAAAAAAAAAAAAAAAAAA4EwZngABZJN7WwAAAABJRU5ErkJggg==";

        // 验证 Base64 是否有效
        function isValidBase64(base64) {
            return base64 && base64.startsWith('data:image/') && base64.length > 200;
        }

        // 同步方式：绘制 Drawable 到 Bitmap 并转为 Base64
        function drawableToBase64Sync(drawable, targetSize = 144) {
            if (!drawable) return null;
            try {
                const Bitmap = plus.android.importClass("android.graphics.Bitmap");
                const Canvas = plus.android.importClass("android.graphics.Canvas");
                const ByteArrayOutputStream = plus.android.importClass("java.io.ByteArrayOutputStream");
                const Base64 = plus.android.importClass("android.util.Base64");
                
                // 创建固定画布
                let bitmap = Bitmap.createBitmap(targetSize, targetSize, Bitmap.Config.ARGB_8888);
                let canvas = new Canvas(bitmap);
                plus.android.invoke(canvas, "drawARGB", 0, 0, 0, 0); // 透明背景
                
                // 设置绘制区域并绘制
                plus.android.invoke(drawable, "setBounds", 0, 0, targetSize, targetSize);
                plus.android.invoke(drawable, "draw", canvas);
                
                // 尝试 PNG 压缩
                let stream = new ByteArrayOutputStream();
                bitmap.compress(Bitmap.CompressFormat.PNG, 100, stream);
                let bytes = stream.toByteArray();
                let base64 = Base64.encodeToString(bytes, Base64.NO_WRAP);
                let result = "data:image/png;base64," + base64;
                
                // 如果 PNG 结果无效，尝试 JPEG
                if (!isValidBase64(result)) {
                    stream = new ByteArrayOutputStream();
                    bitmap.compress(Bitmap.CompressFormat.JPEG, 90, stream);
                    bytes = stream.toByteArray();
                    base64 = Base64.encodeToString(bytes, Base64.NO_WRAP);
                    result = "data:image/jpeg;base64," + base64;
                }
                
                // 回收 Bitmap
                if (bitmap && !bitmap.isRecycled()) bitmap.recycle();
                return isValidBase64(result) ? result : null;
            } catch(e) {
                return null;
            }
        }

        // 异步方式：通过临时文件获取 Base64（解决大图截断问题）
        function drawableToBase64Async(drawable, targetSize = 144) {
            return new Promise((resolve, reject) => {
                if (!drawable) {
                    reject("drawable为空");
                    return;
                }
                try {
                    const Bitmap = plus.android.importClass("android.graphics.Bitmap");
                    const Canvas = plus.android.importClass("android.graphics.Canvas");
                    
                    // 绘制 Bitmap
                    let bitmap = Bitmap.createBitmap(targetSize, targetSize, Bitmap.Config.ARGB_8888);
                    let canvas = new Canvas(bitmap);
                    plus.android.invoke(canvas, "drawARGB", 0, 0, 0, 0);
                    plus.android.invoke(drawable, "setBounds", 0, 0, targetSize, targetSize);
                    plus.android.invoke(drawable, "draw", canvas);
                    
                    // 保存为临时 PNG 文件
                    const fileName = "temp_icon_" + Date.now() + "_" + Math.random() + ".png";
                    plus.io.requestFileSystem(plus.io.PRIVATE_DOC, fs => {
                        fs.root.getFile(fileName, { create: true }, entry => {
                            entry.createWriter(writer => {
                                writer.onwriteend = () => {
                                    // 读取文件为 Base64
                                    entry.file(file => {
                                        const reader = new plus.io.FileReader();
                                        reader.onloadend = e => {
                                            const base64 = e.target.result;
                                            entry.remove(); // 删除临时文件
                                            resolve(base64);
                                        };
                                        reader.onerror = e => reject(e);
                                        reader.readAsDataURL(file);
                                    });
                                };
                                writer.onerror = e => reject(e);
                                // 将 Bitmap 转为 PNG 数据写入
                                const ByteArrayOutputStream = plus.android.importClass("java.io.ByteArrayOutputStream");
                                const stream = new ByteArrayOutputStream();
                                bitmap.compress(Bitmap.CompressFormat.PNG, 100, stream);
                                const bytes = stream.toByteArray();
                                writer.write(new Uint8Array(bytes).buffer);
                            });
                        }, reject);
                    }, reject);
                } catch(e) {
                    reject(e);
                }
            });
        }

        // 主转换函数：优先同步，无效则异步临时文件，再无效则返回默认图标
        async function convertIcon(drawable, appName) {
            if (!drawable) {
                alert(`⚠️ ${appName}: drawable 为空，使用默认图标`);
                return DEFAULT_ICON_BASE64;
            }
            
            // 1. 同步尝试
            let base64 = drawableToBase64Sync(drawable);
            if (isValidBase64(base64)) {
                alert(`✅ ${appName}: 同步转换成功，长度 ${base64.length}`);
                return base64;
            }
            
            // 2. 异步临时文件尝试
            try {
                base64 = await drawableToBase64Async(drawable);
                if (isValidBase64(base64)) {
                    alert(`✅ ${appName}: 异步临时文件转换成功，长度 ${base64.length}`);
                    return base64;
                } else {
                    alert(`❌ ${appName}: 异步转换结果无效，长度 ${base64 ? base64.length : 0}`);
                }
            } catch(e) {
                alert(`❌ ${appName}: 异步转换失败 - ${e.message || e}`);
            }
            
            // 3. 保底默认图标
            alert(`⚠️ ${appName}: 所有转换方式均失败，使用默认图标`);
            return DEFAULT_ICON_BASE64;
        }

        async function scanApps() {
            if (!window.plus) return;
            try {
                const main = plus.android.runtimeMainActivity();
                const pm = main.getPackageManager();
                const list = plus.android.invoke(pm, "getInstalledPackages", 0);
                const count = plus.android.invoke(list, "size");

                const apps = [];
                for (let i = 0; i < count; i++) {
                    try {
                        const pkg = plus.android.invoke(list, "get", i);
                        const ai = plus.android.getAttribute(pkg, "applicationInfo");
                        
                        // 过滤系统应用
                        if ((plus.android.getAttribute(ai, "flags") & 1) !== 0) continue;
                        
                        const name = plus.android.invoke(ai, "loadLabel", pm).toString();
                        const pkgName = plus.android.getAttribute(pkg, "packageName");
                        const path = plus.android.getAttribute(ai, "publicSourceDir");
                        const ver = plus.android.getAttribute(pkg, "versionName");
                        
                        // 获取 Drawable（优先使用 getApplicationIcon）
                        let iconDrawable;
                        try {
                            iconDrawable = plus.android.invoke(pm, "getApplicationIcon", pkgName);
                        } catch(e) {
                            iconDrawable = plus.android.invoke(ai, "loadIcon", pm);
                        }
                        
                        // 异步转换图标
                        const iconBase64 = await convertIcon(iconDrawable, name);
                        
                        apps.push({
                            name: name,
                            pkg: pkgName,
                            ver: ver,
                            path: path,
                            icon: iconBase64
                        });
                    } catch (err) {
                        console.error("跳过应用:", err);
                    }
                }
                
                apps.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
                allApps = apps;
                render(allApps);
            } catch (e) {
                alert("无法访问应用列表，请检查权限：" + e.message);
            }
        }

        function render(data) {
            const listDiv = document.getElementById('app-list');
            if (data.length === 0) {
                listDiv.innerHTML = '<div style="padding:50px; text-align:center; color:#999;">未找到匹配的应用</div>';
                return;
            }
            listDiv.innerHTML = data.map((app, i) => `
                <div class="app-item" onclick="pickApp(${i})">
                    <img src="${app.icon}" class="app-icon" onerror="this.src='${DEFAULT_ICON_BASE64}'">
                    <div style="flex:1; overflow:hidden;">
                        <b style="display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(app.name)}</b>
                        <small style="color:#999; font-size:12px;">${app.pkg}</small>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function pickApp(index) {
            const searchVal = document.getElementById('searchInput').value;
            const currentList = searchVal ? allApps.filter(a => a.name.includes(searchVal) || a.pkg.includes(searchVal)) : allApps;
            
            selectedApp = currentList[index];
            closePicker();
            document.getElementById('entry-step').style.display = 'none';
            document.getElementById('detail-step').style.display = 'block';
            
            document.getElementById('res-icon').src = selectedApp.icon;
            document.getElementById('res-name').innerText = selectedApp.name;
            document.getElementById('res-pkg').innerText = selectedApp.pkg;

            plus.io.resolveLocalFileSystemURL(selectedApp.path, (entry) => {
                entry.file((file) => {
                    const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                    document.getElementById('res-meta').innerText = `版本：${selectedApp.ver} | 大小：${sizeMB} MB`;
                    selectedApp.size = sizeMB + "MB";
                    startUpload(selectedApp.path);
                });
            }, (e) => {
                document.getElementById('upload-progress').innerText = "无法读取APK路径";
            });
        }

        function startUpload(filePath) {
            const prog = document.getElementById('upload-progress');
            const btn = document.getElementById('submitBtn');
            
            const task = plus.uploader.createUpload(uploadApi, { method: "POST" }, (t, status) => {
                if (status == 200) {
                    const res = JSON.parse(t.responseText);
                    selectedApp.remoteUrl = res.full_url;
                    prog.innerText = "✅ 应用云端同步成功";
                    prog.style.color = "#4CD964";
                    btn.disabled = false;
                    btn.innerText = "立即分享到平台";
                } else {
                    prog.innerText = "❌ 上传失败，请检查网络";
                    prog.style.color = "#FF3B30";
                }
            });

            task.addFile(filePath, { key: "file" });
            task.addEventListener("statechanged", (t) => {
                if(t.state == 3) {
                    const p = Math.round((t.uploadedSize / t.totalSize) * 100);
                    prog.innerText = `正在同步安装包：${p}%`;
                }
            });
            task.start();
        }

        async function finalSubmit() {
            const mail = localStorage.getItem('usermail') || "";
            const postData = {
                name: selectedApp.name,
                link: selectedApp.remoteUrl,
                icon: selectedApp.icon,
                intro: document.getElementById('app-intro').value,
                package_name: selectedApp.pkg,
                version: selectedApp.ver,
                size: selectedApp.size,
                mail: mail
            };

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "正在提交...";

            try {
                const res = await fetch(`https://apirank.qujiaweb.top/?mode=add_app&mail=${mail}`, {
                    method: 'POST',
                    body: JSON.stringify(postData)
                });
                const result = await res.json();
                if (result.code === 200) {
                    alert("发布成功！");
                    plus.webview.currentWebview().close();
                } else {
                    alert("发布失败：" + result.msg);
                    btn.disabled = false;
                    btn.innerText = "立即分享到平台";
                }
            } catch (e) {
                alert("网络请求出错");
                btn.disabled = false;
            }
        }
        
        function searchApp(val) {
            const filtered = allApps.filter(a => 
                a.name.toLowerCase().includes(val.toLowerCase()) || 
                a.pkg.toLowerCase().includes(val.toLowerCase())
            );
            render(filtered);
        }
    </script>
</body>
</html>
