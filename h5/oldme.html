<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的（旧兼容）</title>
    <style>
        /* 极简兼容样式 - 无flex，无calc，无sticky */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, "Helvetica Neue", Helvetica, sans-serif;
            background: #F2F2F7;
            color: #1C1C1E;
        }
        /* 登录界面 */
        .login-container {
            padding: 60px 30px;
        }
        .login-container h1 {
            font-size: 28px;
            margin-bottom: 40px;
            font-weight: bold;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8E8E93;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .login-button {
            width: 100%;
            padding: 15px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }
        .login-button.secondary {
            background: #f0f0f0;
            color: #007AFF;
            margin-top: 15px;
        }
        /* Header */
        header {
            background: #F2F2F7;
            padding: 15px 16px;
            overflow: hidden;
            border-bottom: 1px solid #e5e5ea;
        }
        .profile-left {
            float: left;
        }
        .avatar {
            width: 52px;
            height: 52px;
            background: #ddd;
            border-radius: 26px;
            border: 2px solid #fff;
            float: left;
            margin-right: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .user-meta {
            float: left;
            padding-top: 6px;
        }
        .username {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .points-badge {
            background: #E3E3E6;
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #8E8E93;
            display: inline-block;
            cursor: pointer;
        }
        .top-btns {
            float: right;
            margin-top: 8px;
        }
        .icon-box {
            width: 34px;
            height: 34px;
            background: #E3E3E6;
            border-radius: 10px;
            display: inline-block;
            text-align: center;
            line-height: 34px;
            margin-left: 8px;
            position: relative;
            cursor: pointer;
        }
        .icon-box img {
            width: 20px;
            vertical-align: middle;
        }
        .unread-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 18px;
            height: 18px;
            background: #FF3B30;
            color: white;
            border-radius: 9px;
            font-size: 11px;
            text-align: center;
            line-height: 18px;
            padding: 0 4px;
            display: none;
        }
        .clearfix:after {
            content: "";
            display: table;
            clear: both;
        }
        /* 选项卡 */
        .middle-nav {
            padding: 10px 16px;
            background: #F2F2F7;
            border-bottom: 1px solid #e5e5ea;
        }
        .mid-tab-item {
            font-size: 18px;
            font-weight: 600;
            color: #8E8E93;
            margin-right: 20px;
            cursor: pointer;
            display: inline-block;
        }
        .mid-tab-item.active {
            font-size: 24px;
            color: #1C1C1E;
        }
        /* 列表区域 */
        .app-list {
            padding: 10px 16px 100px 16px;
            min-height: 300px;
        }
        .app-item {
            background: #FFFFFF;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            overflow: hidden;
        }
        .app-icon {
            width: 60px;
            height: 60px;
            background: #f0f0f2;
            border-radius: 14px;
            float: left;
            margin-right: 14px;
            background-size: cover;
            background-position: center;
        }
        .app-info {
            float: left;
            width: 60%;
        }
        .app-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-desc {
            font-size: 12px;
            color: #8E8E93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-badge {
            float: right;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 18px;
        }
        .status-shared {
            background: #EAF9EE;
            color: #34C759;
        }
        .status-pending {
            background: #E3F2FD;
            color: #2196F3;
        }
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 52px;
            background: #FFFFFF;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 100;
        }
        .bottom-item {
            width: 50%;
            float: left;
            text-align: center;
            padding-top: 6px;
            cursor: pointer;
            color: #8E8E93;
            font-size: 10px;
        }
        .bottom-item.active {
            color: #007AFF;
        }
        .nav-icon-img {
            width: 22px;
            height: 22px;
            display: block;
            margin: 0 auto 2px;
        }
        /* 提示 */
        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            margin-left: -80px;
            width: 160px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 999;
            text-align: center;
        }
        .fab {
            position: fixed;
            right: 20px;
            bottom: 72px;
            width: 46px;
            height: 46px;
            background: #FFF;
            border-radius: 23px;
            text-align: center;
            line-height: 46px;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 99;
            cursor: pointer;
        }
        .empty-tip, .loading-tip {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .loading-tip {
            color: #666;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- 登录界面 -->
<div id="loginSection" style="display: none;">
    <div class="login-container">
        <h1>Welcome</h1>
        <div class="input-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="输入邮箱地址">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="pass" placeholder="输入您的密码">
        </div>
        <button class="login-button" id="loginBtn">马上登录</button>
        <button class="login-button secondary" id="registerBtn">立即注册</button>
    </div>
</div>

<!-- 个人主页内容 -->
<div id="profileSection" style="display: none;">
    <header class="clearfix">
        <div class="profile-left">
            <div class="avatar" id="uAvatar" style="background-image: url('https://creation.bcmcdn.com/716/appcraft/IMAGE_k7lDKB-Wr_1772007264168.jpeg');"></div>
            <div class="user-meta">
                <div class="username" id="uName">加载中...</div>
                <div class="points-badge" id="uPointsBtn">⭐ <span id="uPoints">0</span></div>
            </div>
        </div>
        <div class="top-btns">
            <div class="icon-box" id="msgBtn">
                <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_N7XqHo5QC_1766889837434.png" alt="消息">
                <div class="unread-badge" id="unreadBadge">0</div>
            </div>
            <div class="icon-box" id="settingBtn">
                <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_tnm1F1efLp_1766889744283.png" alt="设置">
            </div>
        </div>
    </header>

    <div class="middle-nav">
        <span class="mid-tab-item active" data-type="history">历史</span>
        <span class="mid-tab-item" data-type="collection">收藏</span>
        <span class="mid-tab-item" data-type="mine">我的</span>
        <span class="mid-tab-item" data-type="review" id="reviewTab" style="display: none;">审核</span>
    </div>

    <div class="app-list" id="appList">
        <div class="loading-tip">加载中...</div>
    </div>
</div>

<div class="fab" id="fabBtn">+</div>

<div class="bottom-nav">
    <div class="bottom-item" id="homeBtn">
        <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_v4UVIMr2qe_1766889744125.png" class="nav-icon-img" alt="首页">
        <span>首页</span>
    </div>
    <div class="bottom-item active" id="profileNavBtn">
        <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_C7AQMwmQxj_1766889744280.png" class="nav-icon-img" alt="我的">
        <span>我的</span>
    </div>
</div>

<script>
(function() {
    var API_BASE = 'https://apirank.qujiaweb.top/';
    
    function showToast(msg) {
        var toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(function() {
            toast.style.display = 'none';
        }, 1500);
    }
    
    function isArray(obj) {
        return Object.prototype.toString.call(obj) === '[object Array]';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getLocal(key, def) {
        try {
            var val = localStorage.getItem(key);
            return val !== null ? val : def;
        } catch(e) {
            return def;
        }
    }
    
    function setLocal(key, val) {
        try {
            localStorage.setItem(key, val);
        } catch(e) {}
    }
    
    function getJson(key, def) {
        try {
            var val = localStorage.getItem(key);
            if (!val) return def;
            return JSON.parse(val);
        } catch(e) {
            return def;
        }
    }
    
    function setJson(key, val) {
        try {
            localStorage.setItem(key, JSON.stringify(val));
        } catch(e) {}
    }
    
    function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.timeout = 10000;
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var res = JSON.parse(xhr.responseText);
                        callback(null, res);
                    } catch(e) {
                        callback(e, null);
                    }
                } else {
                    callback(new Error('HTTP ' + xhr.status), null);
                }
            }
        };
        xhr.onerror = function() {
            callback(new Error('Network error'), null);
        };
        xhr.ontimeout = function() {
            callback(new Error('Timeout'), null);
        };
        xhr.send();
    }
    
    function renderList(data) {
        var container = document.getElementById('appList');
        if (!container) return;
        container.innerHTML = '';
        if (!data || !isArray(data) || data.length === 0) {
            container.innerHTML = '<div class="empty-tip">暂无数据</div>';
            return;
        }
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            var name = item.名称 || item.name || '未知应用';
            var icon = item.图标 || item.icon || '';
            var desc = item.简介 || item.description || '暂无简介';
            var id = item.id || item.ID || '';
            name = escapeHtml(name);
            desc = escapeHtml(desc);
            var iconStyle = icon ? 'style="background-image: url(' + encodeURI(icon) + ');"' : '';
            var statusHtml = '';
            if (item.是否推荐) {
                var isRec = (item.是否推荐 === '推荐');
                var statusCls = isRec ? 'status-shared' : 'status-pending';
                var statusTxt = isRec ? '已发布' : '审核中';
                statusHtml = '<div class="status-badge ' + statusCls + '">' + statusTxt + '</div>';
            }
            var safeId = (id + '').replace(/'/g, "\\'");
            var appHtml = '<div class="app-item" data-id="' + safeId + '">' +
                '<div class="app-icon" ' + iconStyle + '></div>' +
                '<div class="app-info">' +
                '<div class="app-name">' + name + '</div>' +
                '<div class="app-desc">' + desc + '</div>' +
                '</div>' +
                statusHtml +
                '</div>';
            container.insertAdjacentHTML('beforeend', appHtml);
        }
        var items = container.querySelectorAll('.app-item');
        for (var i = 0; i < items.length; i++) {
            items[i].addEventListener('click', function(e) {
                var id = this.getAttribute('data-id');
                if (id) openDetail(id);
            });
        }
    }
    
    function loadHistory() {
        var data = getJson('appHistory', []);
        renderList(data);
    }
    
    function loadCollection() {
        var data = getJson('appCollection', []);
        renderList(data);
    }
    
    function loadUserApps() {
        var mail = getLocal('usermail', '');
        if (!mail) {
            renderList([]);
            return;
        }
        var container = document.getElementById('appList');
        if (container) container.innerHTML = '<div class="loading-tip">加载中...</div>';
        var url = API_BASE + '?mode=get_user_apps&mail=' + encodeURIComponent(mail);
        ajaxGet(url, function(err, res) {
            if (err) {
                showToast('加载失败');
                renderList([]);
                return;
            }
            if (res && res.code === 200 && res.fields && isArray(res.fields)) {
                renderList(res.fields);
            } else {
                renderList([]);
            }
        });
    }
    
    function fetchUnreadCount() {
        var mail = getLocal('usermail', '');
        if (!mail) return;
        var url = API_BASE + '?mode=get_messages&mail=' + encodeURIComponent(mail);
        ajaxGet(url, function(err, res) {
            if (err) return;
            if (res && res.code === 200 && res.fields && isArray(res.fields)) {
                var count = 0;
                for (var i = 0; i < res.fields.length; i++) {
                    if (res.fields[i] && res.fields[i]['是否已读'] === '否') count++;
                }
                var badge = document.getElementById('unreadBadge');
                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        });
    }
    
    function checkAdmin() {
        var mail = getLocal('usermail', '');
        if (!mail) return;
        var url = API_BASE + '?mode=get_user_info&mail=' + encodeURIComponent(mail);
        ajaxGet(url, function(err, res) {
            if (err) return;
            if (res && res.code === 200 && res.fields && res.fields[0]) {
                var user = res.fields[0];
                var isAdmin = (user['是否管理'] === '是');
                setLocal('isAdmin', isAdmin ? 'true' : 'false');
                var reviewTab = document.getElementById('reviewTab');
                if (isAdmin) {
                    reviewTab.style.display = 'inline-block';
                } else {
                    reviewTab.style.display = 'none';
                }
            }
        });
    }
    
    function initProfile() {
        var username = getLocal('username', '用户');
        var points = getLocal('userpoints', '0');
        var avatar = getLocal('userpicture', 'https://creation.bcmcdn.com/716/appcraft/IMAGE_k7lDKB-Wr_1772007264168.jpeg');
        document.getElementById('uName').textContent = username;
        document.getElementById('uPoints').textContent = points;
        document.getElementById('uAvatar').style.backgroundImage = 'url(' + avatar + ')';
        checkAdmin();
        fetchUnreadCount();
        loadHistory();
    }
    
    function switchTab(type) {
        var tabs = document.querySelectorAll('.mid-tab-item');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('active');
            if (tabs[i].getAttribute('data-type') === type) {
                tabs[i].classList.add('active');
            }
        }
        if (type === 'history') loadHistory();
        else if (type === 'collection') loadCollection();
        else if (type === 'mine') loadUserApps();
        else if (type === 'review') openReviewPage();
    }
    
    function doLogin() {
        var email = document.getElementById('email').value.trim();
        var pass = document.getElementById('pass').value.trim();
        if (!email || !pass) {
            showToast('请输入账号密码');
            return;
        }
        showToast('登录中...');
        var url = API_BASE + '?mode=login&email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(pass);
        ajaxGet(url, function(err, res) {
            if (err) {
                showToast('网络错误: ' + (err.message || '未知错误'));
                return;
            }
            if (res && res.code === 200 && res.fields && res.fields.length > 0) {
                var u = res.fields[0];
                if (u['是否封禁'] === '是') {
                    showToast('账号已被封禁');
                    return;
                }
                setLocal('usermail', u["邮箱"] || '');
                setLocal('username', u["昵称"] || '用户');
                setLocal('userpicture', u["头像"] || '');
                setLocal('userpoints', u["积分"] || '0');
                setLocal('isAdmin', (u["是否管理"] === '是') ? 'true' : 'false');
                showToast('登录成功');
                setTimeout(function() {
                    location.reload();
                }, 600);
            } else {
                showToast('账号或密码错误');
            }
        });
    }
    
    function openDetail(id) {
        var url = 'oldxiangqing.html?id=' + encodeURIComponent(id);
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        }
    }
    function openHomePage() {
        var url = 'oldhome.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        }
    }
    function openSettingPage() { var url = 'oldsetting.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        } }
    function openMessagePage() { var url = 'oldxiaoxi.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        } }
    function openUserPage() {
    

        var url = 'oldpage.html?user=' + encodeURIComponent(mail);
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        }
    }
    function openMallPage() {
        var url = 'oldmall.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        }
    }
    function openSharePage() { var url = 'oldshare.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        } }
    function openReviewPage() { var url = 'oldguanli.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        } }
    function openRegisterPage() { var url = 'oldzhuce.html';
        if (window.plus && plus.webview) {
            var ws = plus.webview.create(url, url);
            ws.show('pop-in', 300);
        } else {
            window.location.href = url;
        } }
    
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('registerBtn').addEventListener('click', openRegisterPage);
        
        // 分别绑定点击事件
        document.getElementById('uAvatar').addEventListener('click', openUserPage);
        document.getElementById('uName').addEventListener('click', openUserPage);
        document.getElementById('uPointsBtn').addEventListener('click', openMallPage);
        
        document.getElementById('msgBtn').addEventListener('click', openMessagePage);
        document.getElementById('settingBtn').addEventListener('click', openSettingPage);
        document.getElementById('fabBtn').addEventListener('click', openSharePage);
        document.getElementById('homeBtn').addEventListener('click', openHomePage);
        document.getElementById('profileNavBtn').addEventListener('click', function() {});
        
        var tabs = document.querySelectorAll('.mid-tab-item');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].addEventListener('click', function(e) {
                var type = this.getAttribute('data-type');
                if (type === 'review') openReviewPage();
                else switchTab(type);
            });
        }
        
        var usermail = getLocal('usermail', '');
        var loginSection = document.getElementById('loginSection');
        var profileSection = document.getElementById('profileSection');
        if (!usermail) {
            loginSection.style.display = 'block';
            profileSection.style.display = 'none';
        } else {
            loginSection.style.display = 'none';
            profileSection.style.display = 'block';
            initProfile();
        }
    });
    
    window.addEventListener('storage', function(e) {
        if (e.key === 'usermail' && !e.newValue) {
            location.reload();
        }
    });
})();
</script>
</body>
</html>
