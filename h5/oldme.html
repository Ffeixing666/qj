<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人中心 - 趣加应用</title>
    <style>
        /* 移除 CSS 变量，改用硬编码以兼容 iOS 9 */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: #F2F2F7;
            color: #1C1C1E;
            overflow-x: hidden;
        }

        /* 登录界面 */
        .login-container { padding: 60px 30px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; }
        .login-container h1 { font-size: 28px; margin-bottom: 40px; font-weight: 700; }
        .input-group { width: 100%; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #8E8E93; }
        .input-group input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; background: #fff; font-size: 16px; outline: none;
        }
        .login-button {
            width: 100%; padding: 15px; background: #007AFF;
            color: #fff; border: none; border-radius: 16px; font-size: 17px;
            font-weight: 600; margin-top: 10px;
        }

        /* Header */
        header {
            position: -webkit-sticky; position: sticky; top: 0; 
            background: #F2F2F7; background: rgba(242, 242, 247, 0.9);
            z-index: 100; padding: 15px 16px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between;
        }
        .profile-left { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }
        .avatar {
            width: 52px; height: 52px; background: #ddd; border-radius: 26px;
            border: 2px solid #fff; object-fit: cover; margin-right: 12px;
        }
        .user-meta { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }
        .username { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .points-badge {
            background: #E3E3E6; padding: 2px 10px; border-radius: 8px; font-size: 13px; color: #8E8E93;
        }

        .top-btns { display: -webkit-flex; display: flex; }
        .icon-box {
            width: 34px; height: 34px; background: #E3E3E6; border-radius: 10px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center;
            margin-left: 8px; position: relative;
        }
        .unread-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 18px; height: 18px; background: #FF3B30;
            color: white; border-radius: 9px; font-size: 11px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center;
        }

        /* 选项卡 */
        .middle-nav { padding: 10px 16px; display: -webkit-flex; display: flex; -webkit-align-items: baseline; align-items: baseline; }
        .mid-tab-item { font-size: 18px; font-weight: 600; color: #8E8E93; margin-right: 20px; }
        .mid-tab-item.active { font-size: 24px; color: #1C1C1E; }

        /* 列表 */
        .app-list { padding: 10px 16px 100px 16px; }
        .app-item {
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; background: #FFFFFF;
            padding: 12px; border-radius: 16px; margin-bottom: 12px;
        }
        .app-icon { width: 60px; height: 60px; background: #f0f0f2; border-radius: 14px; margin-right: 14px; -webkit-flex-shrink: 0; flex-shrink: 0; }
        .app-info { -webkit-flex: 1; flex: 1; min-width: 0; }
        .app-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-desc { font-size: 12px; color: #8E8E93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 底部 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 52px; background: #FFFFFF;
            border-top: 1px solid rgba(0,0,0,0.1); display: -webkit-flex; display: flex; z-index: 100;
        }
        .bottom-item { -webkit-flex: 1; flex: 1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; font-size: 10px; color: #8E8E93; text-decoration: none; }
        .bottom-item.active { color: #007AFF; }
        .nav-icon-img { width: 22px; height: 22px; margin-bottom: 2px; }

        #toast {
            position: fixed; top: 40px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 999;
        }

        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; margin-left: 10px; }
        .status-shared { background: #EAF9EE; color: #34C759; }
        .status-pending { background: #E3F2FD; color: #2196F3; }

        .fab {
            position: fixed; right: 20px; bottom: 72px; width: 46px; height: 46px;
            background: #FFF; border-radius: 23px; display: -webkit-flex; display: flex;
            -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center;
            font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 99;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <section id="loginSection" style="display: none;">
        <div class="login-container">
            <h1>Welcome</h1>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="输入邮箱地址">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="pass" placeholder="输入您的密码">
            </div>
            <button class="login-button" onclick="handleLogin(true)">马上登录</button>
            <button class="login-button" style="background: #f0f0f0; color: #007AFF; margin-top: 15px;" onclick="openRegisterPage()">立即注册</button>
        </div>
    </section>

    <section id="profileSection" style="display: none;">
        <header>
            <div class="profile-left" onclick="openUserPage()">
                <img src="" class="avatar" id="uAvatar">
                <div class="user-meta">
                    <div class="username" id="uName">加载中...</div>
                    <div class="points-badge">
                        ⭐ <span id="uPoints">0</span>
                    </div>
                </div>
            </div>
            <div class="top-btns">
                <div class="icon-box" onclick="openMessagePage()">
                    <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_N7XqHo5QC_1766889837434.png" style="width:20px;">
                    <div class="unread-badge" id="unreadBadge" style="display: none;">0</div>
                </div>
                <div class="icon-box" onclick="openSettingPage()">
                    <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_tnm1F1efLp_1766889744283.png" style="width:20px;">
                </div>
            </div>
        </header>

        <nav class="middle-nav">
            <span class="mid-tab-item active" onclick="switchMidTab(this, 'history')">历史</span>
            <span class="mid-tab-item" onclick="switchMidTab(this, 'collection')">收藏</span>
            <span class="mid-tab-item" onclick="switchMidTab(this, 'mine')">我的</span>
            <span class="mid-tab-item" onclick="openReviewPage()" id="reviewTab" style="display: none;">审核</span>
        </nav>

        <main class="app-list" id="appList">
            </main>
    </section>

    <div class="fab" onclick="openSharePage()">+</div>

    <nav class="bottom-nav">
        <div onclick="openHomePage()" class="bottom-item">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_v4UVIMr2qe_1766889744125.png" class="nav-icon-img">
            <span>首页</span>
        </div>
        <div class="bottom-item active">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_C7AQMwmQxj_1766889744280.png" class="nav-icon-img">
            <span>我的</span>
        </div>
    </nav>

    <script src="https://static2.pgaot.com/Assets/js/jquery-2.2.4.min.js"></script>
    <script>
        var API = 'https://apirank.qujiaweb.top/';

        function toast(m) {
            $('#toast').text(m).stop(true, true).fadeIn().delay(1500).fadeOut();
        }

        // 页面初始化
        $(document).ready(function() {
            var mail = localStorage.getItem('usermail');
            if (!mail) {
                $('#loginSection').show();
            } else {
                $('#profileSection').show();
                initProfile();
            }
        });

        function initProfile() {
            // 设置基本 UI
            $('#uName').text(localStorage.getItem('username') || '用户');
            $('#uAvatar').attr('src', localStorage.getItem('userpicture') || 'https://creation.bcmcdn.com/716/appcraft/IMAGE_k7lDKB-Wr_1772007264168.jpeg');
            $('#uPoints').text(localStorage.getItem('userpoints') || '0');

            // 检查管理员身份 (解决管理员失效问题：确保同步更新本地存储)
            checkAdminStatus();
            // 获取消息
            getUnreadCount();
            // 默认加载历史
            loadHistory();
        }

        function checkAdminStatus() {
            var mail = localStorage.getItem('usermail');
            $.ajax({
                url: API + '?mode=get_user_info&mail=' + encodeURIComponent(mail),
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200 && res.fields && res.fields[0]) {
                        var user = res.fields[0];
                        var isAdmin = user['是否管理'] === '是';
                        localStorage.setItem('isAdmin', isAdmin ? 'true' : 'false');
                        if (isAdmin) $('#reviewTab').show();
                    }
                }
            });
        }

        function handleLogin(isManual) {
            var email = $('#email').val().trim();
            var password = $('#pass').val().trim();
            if (!email || !password) return toast('请输入账号密码');

            if(isManual) toast('登录中...');

            $.ajax({
                url: API + '?mode=login',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email: email, password: password }),
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200 && res.fields && res.fields[0]) {
                        var u = res.fields[0];
                        localStorage.setItem('usermail', u["邮箱"]);
                        localStorage.setItem('username', u["昵称"]);
                        localStorage.setItem('userpicture', u["头像"]);
                        localStorage.setItem('userpoints', u["积分"] || '0');
                        localStorage.setItem('isAdmin', u["是否管理"] === '是' ? 'true' : 'false');
                        location.reload();
                    } else {
                        toast('账号或密码错误');
                    }
                },
                error: function() {
                    toast('网络请求失败');
                }
            });
        }

        function switchMidTab(el, type) {
            $('.mid-tab-item').removeClass('active');
            $(el).addClass('active');
            if (type === 'history') loadHistory();
            else if (type === 'collection') loadCollection();
            else if (type === 'mine') getUserApps();
        }

        function renderList(data) {
            var $list = $('#appList').empty();
            if (!data || data.length === 0) {
                $list.append('<div style="text-align:center;padding:40px;color:#999;">暂无数据</div>');
                return;
            }
            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                var name = item.名称 || item.name || '未知应用';
                var icon = item.图标 || item.icon || '';
                var desc = item.简介 || item.description || '暂无简介';
                var id = item.id;

                var html = '<div class="app-item" onclick="openDetail(\'' + id + '\')">' +
                    '<div class="app-icon" style="background:url(' + icon + ') center/cover"></div>' +
                    '<div class="app-info">' +
                    '<div class="app-name">' + name + '</div>' +
                    '<div class="app-desc">' + desc + '</div>' +
                    '</div>';
                
                if (item.是否推荐) {
                    var statusCls = item.是否推荐 === '推荐' ? 'status-shared' : 'status-pending';
                    var statusTxt = item.是否推荐 === '推荐' ? '已发布' : '审核中';
                    html += '<div class="status-badge ' + statusCls + '">' + statusTxt + '</div>';
                }
                html += '</div>';
                $list.append(html);
            }
        }

        function loadHistory() {
            var data = JSON.parse(localStorage.getItem('appHistory') || '[]');
            renderList(data);
        }

        function loadCollection() {
            var data = JSON.parse(localStorage.getItem('appCollection') || '[]');
            renderList(data);
        }

        function getUserApps() {
            var mail = localStorage.getItem('usermail');
            $('#appList').html('<div style="text-align:center;padding:40px;">加载中...</div>');
            $.ajax({
                url: API + '?mode=get_user_apps&mail=' + encodeURIComponent(mail),
                type: 'GET',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200) renderList(res.fields);
                    else renderList([]);
                }
            });
        }

        function getUnreadCount() {
            var mail = localStorage.getItem('usermail');
            $.get(API + '?mode=get_messages&mail=' + encodeURIComponent(mail), function(res) {
                if (res.code === 200 && res.fields) {
                    var count = 0;
                    for (var i = 0; i < res.fields.length; i++) {
                        if (res.fields[i]['是否已读'] === '否') count++;
                    }
                    if (count > 0) $('#unreadBadge').text(count).show();
                }
            });
        }

        // 路由跳转封装 (处理 5+ Webview)
        function openDetail(id) {
            var url = 'xiangqing.html?id=' + id;
            if (window.plus) {
                var ws = plus.webview.create(url, url);
                ws.show('pop-in', 300);
            } else {
                location.href = url;
            }
        }

        function openHomePage() {
            if (window.plus) plus.webview.currentWebview().close('pop-out', 300);
            else history.back();
        }
        
        function openSettingPage() { location.href = 'setting.html'; }
        function openMessagePage() { location.href = 'xiaoxi.html'; }
        function openUserPage() { location.href = 'page.html?user=' + encodeURIComponent(localStorage.getItem('usermail')); }
        function openSharePage() { location.href = 'share.html'; }
        function openReviewPage() { location.href = 'guanli.html'; }
        function openRegisterPage() { location.href = 'zhuce.html'; }
    </script>
</body>
</html>
