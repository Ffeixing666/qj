<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人中心 - 趣加应用</title>
    <style>
        /* 彻底移除 CSS 变量，改用硬编码以支持极旧浏览器 */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: #F2F2F7;
            color: #1C1C1E;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* 登录界面 */
        .login-container { padding: 60px 30px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; }
        .login-container h1 { font-size: 28px; margin-bottom: 40px; font-weight: 700; }
        .input-group { width: 100%; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #8E8E93; }
        .input-group input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; background: #fff; font-size: 16px; outline: none;
        }
        .login-button {
            width: 100%; padding: 15px; background: #007AFF;
            color: #fff; border: none; border-radius: 16px; font-size: 17px;
            font-weight: 600; margin-top: 10px;
        }

        /* 导航头 */
        header {
            position: -webkit-sticky; position: sticky; 
            top: 0; background: #F2F2F7; background: rgba(242, 242, 247, 0.95);
            z-index: 100; padding: 15px 16px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .profile-left { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }
        .avatar {
            width: 52px; height: 52px; background: #ddd; border-radius: 26px;
            border: 2px solid #fff; object-fit: cover; margin-right: 12px;
        }
        .username { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .points-badge {
            background: #E3E3E6; padding: 2px 10px; border-radius: 8px; font-size: 13px; color: #8E8E93; display: inline-block;
        }

        .top-btns { display: -webkit-flex; display: flex; }
        .icon-box {
            width: 34px; height: 34px; background: #E3E3E6; border-radius: 10px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center;
            margin-left: 8px; position: relative;
        }
        .unread-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 18px; height: 18px; background: #FF3B30;
            color: white; border-radius: 9px; font-size: 11px;
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center;
        }

        /* 选项卡 */
        .middle-nav { padding: 10px 16px; display: -webkit-flex; display: flex; -webkit-align-items: baseline; align-items: baseline; }
        .mid-tab-item { font-size: 18px; font-weight: 600; color: #8E8E93; margin-right: 20px; }
        .mid-tab-item.active { font-size: 24px; color: #1C1C1E; }

        /* 列表区域 */
        .app-list { padding: 10px 16px 100px 16px; min-height: 200px; }
        .app-item {
            display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; background: #FFFFFF;
            padding: 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .app-icon { width: 60px; height: 60px; background: #f0f0f2; border-radius: 14px; margin-right: 14px; -webkit-flex-shrink: 0; }
        .app-info { -webkit-flex: 1; flex: 1; min-width: 0; }
        .app-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-desc { font-size: 12px; color: #8E8E93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 底部 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 52px; background: #FFFFFF;
            border-top: 1px solid rgba(0,0,0,0.1); display: -webkit-flex; display: flex; z-index: 100;
        }
        .bottom-item { -webkit-flex: 1; flex: 1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; font-size: 10px; color: #8E8E93; text-decoration: none; }
        .bottom-item.active { color: #007AFF; }
        .nav-icon-img { width: 22px; height: 22px; margin-bottom: 2px; }

        #toast {
            position: fixed; top: 40px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 999;
        }

        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; margin-left: 10px; }
        .status-shared { background: #EAF9EE; color: #34C759; }
        .status-pending { background: #E3F2FD; color: #2196F3; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <section id="loginSection" style="display: none;">
        <div class="login-container">
            <h1>趣加应用</h1>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="pass" placeholder="请输入密码">
            </div>
            <button class="login-button" onclick="handleLogin(true)">登录</button>
        </div>
    </section>

    <section id="profileSection" style="display: none;">
        <header>
            <div class="profile-left" onclick="location.href='page.html?user='+encodeURIComponent(localStorage.getItem('usermail'))">
                <img src="" class="avatar" id="uAvatar">
                <div class="user-meta">
                    <div class="username" id="uName">加载中...</div>
                    <div class="points-badge">⭐ <span id="uPoints">0</span></div>
                </div>
            </div>
            <div class="top-btns">
                <div class="icon-box" onclick="location.href='xiaoxi.html'">
                    <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_N7XqHo5QC_1766889837434.png" style="width:20px;">
                    <div class="unread-badge" id="unreadBadge" style="display:none;">0</div>
                </div>
            </div>
        </header>

        <nav class="middle-nav">
            <span class="mid-tab-item active" onclick="switchMidTab(this, 'history')">历史</span>
            <span class="mid-tab-item" onclick="switchMidTab(this, 'collection')">收藏</span>
            <span class="mid-tab-item" onclick="switchMidTab(this, 'mine')">我的</span>
        </nav>

        <div class="app-list" id="appList">
            </div>
    </section>

    <nav class="bottom-nav">
        <a href="old.html" class="bottom-item">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_v4UVIMr2qe_1766889744125.png" class="nav-icon-img">
            <span>首页</span>
        </a>
        <a href="me.html" class="bottom-item active">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_C7AQMwmQxj_1766889744280.png" class="nav-icon-img">
            <span>我的</span>
        </a>
    </nav>

    <script src="https://static2.pgaot.com/Assets/js/jquery-2.2.4.min.js"></script>
    <script>
        var API_URL = 'https://apirank.qujiaweb.top/';

        function showToast(m) {
            $('#toast').text(m).fadeIn().delay(1500).fadeOut();
        }

        // 页面启动逻辑
        $(document).ready(function() {
            var m = localStorage.getItem('usermail');
            if (!m) {
                $('#loginSection').show();
            } else {
                $('#profileSection').show();
                initProfile();
            }
        });

        function initProfile() {
            // 设置基本信息
            $('#uName').text(localStorage.getItem('username') || '用户');
            $('#uAvatar').attr('src', localStorage.getItem('userpicture') || 'https://creation.bcmcdn.com/716/appcraft/IMAGE_k7lDKB-Wr_1772007264168.jpeg');
            $('#uPoints').text(localStorage.getItem('userpoints') || '0');
            
            // 加载初始列表
            loadHistory();
            fetchUnread();
        }

        function handleLogin(isManual) {
            var e = $('#email').val();
            var p = $('#pass').val();
            if (!e || !p) return showToast('请填写完整');

            // 关键修复：显式指定请求类型
            $.ajax({
                url: API_URL + '?mode=login',
                type: 'POST',
                data: JSON.stringify({ email: e, password: p }),
                contentType: 'application/json',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 200 && res.fields && res.fields[0]) {
                        var u = res.fields[0];
                        localStorage.setItem('usermail', u["邮箱"]);
                        localStorage.setItem('username', u["昵称"]);
                        localStorage.setItem('userpicture', u["头像"]);
                        localStorage.setItem('userpoints', u["积分"] || '0');
                        location.reload();
                    } else {
                        showToast('登录失败，请检查账号密码');
                    }
                },
                error: function() {
                    showToast('网络请求失败');
                }
            });
        }

        function fetchUnread() {
            var m = localStorage.getItem('usermail');
            $.get(API_URL + '?mode=get_messages&mail=' + encodeURIComponent(m), function(res) {
                if (res.code === 200 && res.fields) {
                    var count = 0;
                    for(var i=0; i<res.fields.length; i++) {
                        if(res.fields[i]['是否已读'] === '否') count++;
                    }
                    if(count > 0) $('#unreadBadge').text(count).show();
                }
            });
        }

        function switchMidTab(obj, type) {
            $('.mid-tab-item').removeClass('active');
            $(obj).addClass('active');
            if (type === 'history') loadHistory();
            else if (type === 'collection') loadCollection();
            else if (type === 'mine') loadMine();
        }

        function renderItems(list) {
            var $box = $('#appList').empty();
            if (!list || list.length === 0) {
                $box.append('<div style="text-align:center;color:#999;padding-top:40px;">暂无内容</div>');
                return;
            }
            for (var i = 0; i < list.length; i++) {
                var it = list[i];
                var name = it.name || it.名称 || '未知';
                var desc = it.description || it.简介 || '';
                var icon = it.icon || it.图标 || '';
                var id = it.id;

                var html = '<div class="app-item" onclick="location.href=\'xiangqing.html?id=' + id + '\'">' +
                    '<div class="app-icon" style="background:url(' + icon + ') center/cover"></div>' +
                    '<div class="app-info">' +
                    '<div class="app-name">' + name + '</div>' +
                    '<div class="app-desc">' + desc + '</div>' +
                    '</div>';
                
                if (it.是否推荐) {
                    var statusTxt = it.是否推荐 === '推荐' ? '已分享' : '审核中';
                    var statusCls = it.是否推荐 === '推荐' ? 'status-shared' : 'status-pending';
                    html += '<div class="status-badge ' + statusCls + '">' + statusTxt + '</div>';
                }
                html += '</div>';
                $box.append(html);
            }
        }

        function loadHistory() {
            var data = JSON.parse(localStorage.getItem('appHistory') || '[]');
            renderItems(data);
        }

        function loadCollection() {
            var data = JSON.parse(localStorage.getItem('appCollection') || '[]');
            renderItems(data);
        }

        function loadMine() {
            var m = localStorage.getItem('usermail');
            $('#appList').html('<div style="text-align:center;padding:20px;">加载中...</div>');
            $.get(API_URL + '?mode=get_user_apps&mail=' + encodeURIComponent(m), function(res) {
                if (res.code === 200) {
                    renderItems(res.fields);
                } else {
                    renderItems([]);
                }
            });
        }
    </script>
</body>
</html>
