<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>积分商城</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-orange: #FF9500;
            --text-main: #1C1C1E;
            --text-second: #8E8E93;
            --line-color: rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        /* 顶部导航 */
        header {
            position: sticky; top: 0; z-index: 100;
            background-color: rgba(242, 242, 247, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--line-color);
        }
        .nav-bar { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .back-btn { width: 40px; height: 100%; display: flex; align-items: center; }
        .back-icon { width: 11px; height: 11px; border-left: 2px solid var(--ios-blue); border-bottom: 2px solid var(--ios-blue); transform: rotate(45deg); }
        .nav-title { font-size: 17px; font-weight: 600; }

        .container { padding: 16px; max-width: 600px; margin: 0 auto; }

        /* 积分余额卡片 */
        .points-card {
            background: linear-gradient(135deg, #007AFF, #5856D6);
            border-radius: 20px;
            padding: 24px;
            color: #fff;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0,122,255,0.15);
            position: relative;
            overflow: hidden;
        }
        .points-card::after {
            content: ""; position: absolute; right: -20px; bottom: -20px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .points-label { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
        .points-balance { font-size: 36px; font-weight: 800; letter-spacing: -1px; }

        /* --- 新增：支付充值区域 --- */
        .pay-section {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
        .pay-option {
            border: 1.5px solid var(--line-color);
            border-radius: 12px;
            padding: 12px 0;
            text-align: center;
            transition: all 0.2s;
        }
        .pay-option.active {
            border-color: var(--ios-blue);
            background: rgba(0, 122, 255, 0.05);
            color: var(--ios-blue);
        }
        .pay-option .amount { font-size: 17px; font-weight: 700; }
        .pay-option .desc { font-size: 11px; opacity: 0.7; }
        .pay-submit-btn {
            width: 100%; height: 44px; background: var(--ios-blue); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            margin-top: 16px; transition: opacity 0.2s;
        }
        .pay-submit-btn:active { opacity: 0.8; }
        
        /* 任务区域 */
        .section-header { font-size: 18px; font-weight: 700; margin-bottom: 12px; padding-left: 4px; }
        
        .task-list { margin-bottom: 30px; }
        .task-item {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }
        .task-item:active { transform: scale(0.98); }
        
        .task-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .bg-orange { background: rgba(255,149,0,0.1); fill: var(--ios-orange); }
        .bg-blue { background: rgba(0,122,255,0.1); fill: var(--ios-blue); }

        .task-info { flex: 1; }
        .task-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .task-reward { font-size: 12px; color: var(--ios-orange); font-weight: 600; }
        .task-progress-text { font-size: 12px; color: var(--text-second); margin-top: 4px; }

        .task-btn {
            padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
            border: none; cursor: pointer;
        }
        .btn-go { background: var(--ios-blue); color: #fff; }

        /* 积分明细区域 */
        .detail-card {
            background: var(--ios-card);
            border-radius: 16px;
            overflow: hidden;
        }
        .detail-item {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .detail-item:not(:last-child)::after {
            content: ""; position: absolute; bottom: 0; left: 16px; right: 0;
            height: 0.5px; background: var(--line-color);
        }
        .detail-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
        .detail-info p { font-size: 12px; color: var(--text-second); }
        .detail-amount { font-size: 16px; font-weight: 700; }
        .plus { color: var(--ios-blue); }
        .minus { color: var(--text-main); }

        /* 进度条 */
        .progress-bar-wrap { width: 100%; height: 4px; background: #E5E5EA; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--ios-blue); transition: width 0.3s; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div class="back-btn" onclick="handleBack()"><div class="back-icon"></div></div>
            <div class="nav-title">积分商城</div>
            <div style="width:40px"></div>
        </div>
    </header>

    <main class="container">
        <!-- 积分卡片 -->
        <div class="points-card">
            <p class="points-label">当前可用积分</p>
            <div class="points-balance" id="totalPoints">0</div>
        </div>

        <!-- 新增：积分充值模块 -->
        <div class="section-header">积分充值</div>
        <div class="pay-section">
            <div class="pay-grid" id="payOptions">
                <div class="pay-option active" data-amount="1">
                    <div class="amount">￥1</div>
                    <div class="desc">50积分</div>
                </div>
                <div class="pay-option" data-amount="5">
                    <div class="amount">￥5</div>
                    <div class="desc">250积分</div>
                </div>
                <div class="pay-option" data-amount="10">
                    <div class="amount">￥10</div>
                    <div class="desc">500积分</div>
                </div>
            </div>
            <button class="pay-submit-btn" onclick="handlePay()">立即充值</button>
        </div>

        <div class="section-header">我的任务</div>
        <div class="task-list">
            <div class="task-item" onclick="handleAd()">
                <div class="task-icon bg-orange">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15h2v2H8zm0-4h2v2H8zm0-4h2v2H8zm4 8h4v2h-4zm0-4h4v2h-4zm0-4h4v2h-4z"/></svg>
                </div>
                <div class="task-info">
                    <div class="task-name">每日观看广告</div>
                    <div class="task-reward">+3 积分/次</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width: 0%;"></div></div>
                    <div class="task-progress-text">今日进度 0/10</div>
                </div>
                <button class="task-btn btn-go">去完成</button>
            </div>

            <div class="task-item" onclick="handleUpload()">
                <div class="task-icon bg-blue">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                </div>
                <div class="task-info">
                    <div class="task-name">每日上传资源</div>
                    <div class="task-reward">+10 积分/次</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width: 0%;"></div></div>
                    <div class="task-progress-text">今日进度 0/10</div>
                </div>
                <button class="task-btn btn-go">去完成</button>
            </div>
        </div>

        <div class="section-header">积分明细</div>
        <div class="detail-card">
            <div class="detail-item" style="justify-content: center; padding: 32px 16px;">
                <p style="font-size: 14px; color: var(--text-second);">加载中...</p>
            </div>
        </div>
    </main>

    <script>
        // --- 逻辑部分：保留原始功能并增加支付逻辑 ---

        // 1. 初始化充值选项选择
        document.querySelectorAll('.pay-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.pay-option').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 2. 发起支付逻辑
        async function handlePay() {
            const usermail = localStorage.getItem('usermail');
            if (!usermail) { showToast('请先登录'); return; }

            const activeOption = document.querySelector('.pay-option.active');
            const amount = activeOption.getAttribute('data-amount');

            try {
                showLoading();
                const response = await fetch(`https://apirank.qujiaweb.top/?mode=create_pay_order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail: usermail, amount: amount })
                });
                const res = await response.json();
                if (res.code === 200 && res.payUrl) {
                    // 跳转易支付收银台
                    if (window.plus) {
                        plus.runtime.openURL(res.payUrl);
                    } else {
                        window.location.href = res.payUrl;
                    }
                } else {
                    showToast(res.msg || '支付链接获取失败');
                }
            } catch (e) {
                showToast('网络请求错误');
            } finally {
                hideLoading();
            }
        }

        // --- 以下为完全保留的原始逻辑 ---

        function handleBack() {
            if (window.plus) { plus.webview.currentWebview().close('auto'); } else { history.back(); }
        }

        function handleAd() {
            const usermail = localStorage.getItem('usermail');
            if (!usermail) { showToast('请先登录'); return; }
            if (window.plus && plus.ad && plus.ad.createRewardedVideoAd) {
                if (window._adRewardLoading) { showToast('广告加载中'); return; }
                window._adRewardLoading = true;
                let adReward = plus.ad.createRewardedVideoAd({adpid:'1358284724'});
                adReward.onLoad(() => adReward.show());
                adReward.onError(e => {
                    showToast('广告失败: ' + JSON.stringify(e));
                    adReward.destroy(); window._adRewardLoading = false;
                });
                adReward.onClose(e => {
                    if(e.isEnded) { addAdRewardCoins(); } else { showToast('未看完无奖励'); }
                    adReward.destroy(); window._adRewardLoading = false;
                });
                adReward.load();
            } else { showToast('请在APP环境使用'); }
        }

        async function addAdRewardCoins() {
            const usermail = localStorage.getItem('usermail');
            try {
                showLoading();
                const res = await fetch(`https://apirank.qujiaweb.top/?mode=ad_reward&mail=${encodeURIComponent(usermail)}`).then(r => r.json());
                if (res.code === 200) { showToast('奖励领取成功'); init(); } else { showToast(res.msg); }
            } catch(e) { showToast('领取失败'); } finally { hideLoading(); }
        }

        function handleUpload() { handleBack(); }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function showLoading() { if (window.plus) plus.nativeUI.showWaiting('请稍候...'); }
        function hideLoading() { if (window.plus) plus.nativeUI.closeWaiting(); }
        function showToast(m) { if (window.plus) { plus.nativeUI.toast(m); } else { alert(m); } }

        async function fetchUserPoints() {
            const savedEmail = localStorage.getItem('usermail_login');
            const savedPass = localStorage.getItem('userpass_login');
            if (savedEmail && savedPass) {
                try {
                    const res = await fetch(`https://apirank.qujiaweb.top/?mode=login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: savedEmail, password: savedPass })
                    }).then(r => r.json());
                    if (res.code === 200 && res.fields && res.fields.length > 0) {
                        const p = res.fields[0]["积分"] || '0';
                        localStorage.setItem('userpoints', p);
                        return parseInt(p);
                    }
                } catch(e) {}
            }
            return parseInt(localStorage.getItem('userpoints') || '0');
        }

        async function fetchCoinLog() {
            const userMail = localStorage.getItem('usermail');
            if (!userMail) return [];
            try {
                const res = await fetch(`https://apirank.qujiaweb.top/?mode=get_coin_log&mail=${encodeURIComponent(userMail)}`).then(r => r.json());
                return res.code === 200 ? res.fields : [];
            } catch(e) { return []; }
        }

        function updateTaskProgressUI(logs) {
            const today = new Date().toISOString().split('T')[0];
            const tLogs = logs.filter(l => (l.时间 || '').split(' ')[0] === today);
            const counts = { ad: 0, upload: 0 };
            tLogs.forEach(l => {
                if (l.类型 === '观看广告奖励') counts.ad++;
                else if (l.类型 === '上传资源奖励') counts.upload++;
            });
            const updateUI = (idx, count) => {
                const fill = document.querySelector(`.task-item:nth-child(${idx}) .progress-bar-fill`);
                const txt = document.querySelector(`.task-item:nth-child(${idx}) .task-progress-text`);
                fill.style.width = `${Math.min(count*10, 100)}%`;
                txt.textContent = `今日进度 ${count}/10`;
            };
            updateUI(1, counts.ad); updateUI(2, counts.upload);
        }

        function updateCoinLogUI(logs) {
            const card = document.querySelector('.detail-card');
            card.innerHTML = logs.length ? '' : '<div class="detail-item" style="justify-content: center; padding: 32px 16px;"><p style="font-size: 14px; color: var(--text-second);">暂无积分记录</p></div>';
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'detail-item';
                let change = String(log["积分变动"] || '0');
                if (!change.startsWith('+') && !change.startsWith('-') && parseInt(change) > 0) change = '+' + change;
                const cls = change.startsWith('+') ? 'plus' : 'minus';
                item.innerHTML = `<div class="detail-info"><h4>${log.类型}</h4><p>${log.时间}</p></div><div class="detail-amount ${cls}">${change}</div>`;
                card.appendChild(item);
            });
        }

        async function init() {
            const p = await fetchUserPoints();
            animateValue(document.getElementById('totalPoints'), 0, p, 800);
            const logs = await fetchCoinLog();
            updateCoinLogUI(logs);
            updateTaskProgressUI(logs);
        }

        window.onload = init;
    </script>
</body>
</html>
