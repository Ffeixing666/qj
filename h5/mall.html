<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>积分商城（旧兼容）</title>
    <style type="text/css">
        body {
            margin: 0; padding: 0;
            background-color: #F2F2F7;
            color: #1C1C1E;
            font-family: Helvetica, STHeiti, "Microsoft YaHei", sans-serif;
            padding-bottom: 60px;
            -webkit-user-select: none;
            -webkit-text-size-adjust: none;
        }
        header {
            position: relative;
            background-color: #F2F2F7;
            border-bottom: 1px solid #D1D1D6;
            width: 100%;
            z-index: 100;
        }
        .nav-bar {
            height: 44px;
            line-height: 44px;
            text-align: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 0; top: 0;
            width: 60px; height: 44px;
        }
        .back-icon {
            display: block;
            width: 12px; height: 12px;
            border-left: 2px solid #007AFF;
            border-bottom: 2px solid #007AFF;
            -webkit-transform: rotate(45deg);
            margin: 15px 0 0 20px;
        }
        .nav-title {
            font-size: 17px;
            font-weight: bold;
        }
        .container {
            padding: 15px;
        }
        .points-card {
            background-color: #007AFF;
            background-image: -webkit-gradient(linear, left top, right bottom, from(#007AFF), to(#5856D6));
            -webkit-border-radius: 20px;
            padding: 25px;
            color: #FFFFFF;
            margin-bottom: 20px;
            -webkit-box-shadow: 0 8px 15px rgba(0,122,255,0.2);
        }
        .points-label {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .points-balance {
            font-size: 36px;
            font-weight: bold;
        }
        .section-header {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0 10px 5px;
        }
        .pay-section {
            background-color: #FFFFFF;
            -webkit-border-radius: 15px;
            padding: 15px;
        }
        .sub-label {
            font-size: 12px;
            color: #8E8E93;
            margin-bottom: 10px;
            display: block;
        }
        .pay-grid {
            overflow: hidden;
            margin-bottom: 15px;
        }
        .pay-option {
            float: left;
            width: 30%;
            margin-right: 3%;
            background-color: #F2F2F7;
            border: 1px solid #F2F2F7;
            -webkit-border-radius: 10px;
            padding: 10px 0;
            text-align: center;
        }
        .pay-option-last {
            margin-right: 0;
        }
        .pay-option.active {
            border-color: #007AFF;
            background-color: #F0F7FF;
        }
        .pay-option .amount {
            font-size: 16px;
            font-weight: bold;
        }
        .pay-option .desc {
            font-size: 10px;
            color: #8E8E93;
        }
        .pay-option.active .amount {
            color: #007AFF;
        }
        .method-list {
            margin-top: 10px;
        }
        .method-item {
            background-color: #F9F9FB;
            -webkit-border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #F9F9FB;
            overflow: hidden;
        }
        .method-item.active {
            border-color: #007AFF;
            background-color: #F0F7FF;
        }
        .method-left {
            float: left;
        }
        .method-name {
            font-size: 15px;
            font-weight: bold;
            line-height: 24px;
            margin-left: 10px;
        }
        .radio-circle {
            float: right;
            width: 18px; height: 18px;
            border: 2px solid #D1D1D6;
            -webkit-border-radius: 50%;
            margin-top: 2px;
        }
        .method-item.active .radio-circle {
            background-color: #007AFF;
            border-color: #007AFF;
            position: relative;
        }
        .method-item.active .radio-circle:after {
            content: "";
            position: absolute;
            width: 8px; height: 4px;
            border-left: 2px solid #FFFFFF;
            border-bottom: 2px solid #FFFFFF;
            left: 4px; top: 4px;
            -webkit-transform: rotate(-45deg);
        }
        .pay-submit-btn {
            width: 100%;
            height: 48px;
            background-color: #007AFF;
            color: #FFFFFF;
            border: none;
            -webkit-border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
        .task-item {
            background-color: #FFFFFF;
            -webkit-border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .task-icon {
            float: left;
            width: 44px; height: 44px;
            -webkit-border-radius: 10px;
            text-align: center;
        }
        .bg-orange { background-color: #FFF9F0; color: #FF9500; font-size: 20px; line-height: 44px; }
        .bg-blue { background-color: #F0F7FF; color: #007AFF; font-size: 20px; line-height: 44px; }
        .task-content {
            margin-left: 55px;
            margin-right: 70px;
        }
        .task-name { font-size: 15px; font-weight: bold; }
        .task-reward { font-size: 12px; color: #FF9500; font-weight: bold; }
        .task-btn {
            float: right;
            width: 60px;
            height: 30px;
            -webkit-border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            background-color: #007AFF;
            color: #FFFFFF;
            margin-top: 7px;
        }
        .progress-bar-wrap {
            width: 100%;
            height: 5px;
            background-color: #E5E5EA;
            -webkit-border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 5px;
            background-color: #007AFF;
            width: 0%;
        }
        .detail-card {
            background-color: #FFFFFF;
            -webkit-border-radius: 15px;
        }
        .detail-item {
            padding: 12px 15px;
            border-bottom: 1px solid #F2F2F7;
            overflow: hidden;
        }
        .detail-info { float: left; }
        .detail-info h4 { font-size: 14px; margin: 0; }
        .detail-info p { font-size: 11px; color: #8E8E93; margin: 2px 0 0 0; }
        .detail-amount { float: right; font-size: 15px; font-weight: bold; line-height: 34px; }
        .plus { color: #007AFF; }
        .minus { color: #1C1C1E; }
        .footer-tips { text-align: center; font-size: 11px; color: #8E8E93; padding: 20px 0; }
        .clear { clear: both; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div class="back-btn" onclick="handleBack()"><div class="back-icon"></div></div>
            <div class="nav-title">积分商城（旧兼容）</div>
        </div>
    </header>

    <div class="container">
        
        <div class="points-card">
            <div class="points-label">当前可用积分</div>
            <div class="points-balance" id="totalPoints">0</div>
        </div>

        <div class="section-header">积分充值</div>
        <div class="pay-section">
            <span class="sub-label">选择金额</span>
            <div class="pay-grid">
                <div class="pay-option" onclick="selectAmount(this, 1)">
                    <div class="amount">￥1</div>
                    <div class="desc">50积分</div>
                </div>
                <div class="pay-option" onclick="selectAmount(this, 5)">
                    <div class="amount">￥5</div>
                    <div class="desc">250积分</div>
                </div>
                <div class="pay-option pay-option-last" onclick="selectAmount(this, 10)">
                    <div class="amount">￥10</div>
                    <div class="desc">500积分</div>
                </div>
                <div class="clear"></div>
            </div>

            <span class="sub-label">支付方式</span>
            <div class="method-list">
                <div class="method-item" onclick="selectType(this, 'alipay')">
                    <div class="method-left">
                        <span class="method-name" style="margin-left:0">支付宝支付</span>
                    </div>
                    <div class="radio-circle"></div>
                    <div class="clear"></div>
                </div>
                <div class="method-item" onclick="selectType(this, 'wxpay')">
                    <div class="method-left">
                        <span class="method-name" style="margin-left:0">微信支付</span>
                    </div>
                    <div class="radio-circle"></div>
                    <div class="clear"></div>
                </div>
            </div>

            <button class="pay-submit-btn" id="payBtn" onclick="handlePay()">立即支付</button>
        </div>

        <div class="section-header">我的任务</div>
        <div class="task-list">
            <div class="task-item">
                <div class="task-icon bg-orange">A</div>
                <button class="task-btn" onclick="handleAd()">去完成</button>
                <div class="task-content">
                    <div class="task-name">每日观看广告</div>
                    <div class="task-reward">+3 积分/次</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="adProgressFill"></div></div>
                    <div style="font-size:10px; color:#8E8E93; margin-top:4px" id="adProgressText">今日进度 0/10</div>
                </div>
            </div>

            <div class="task-item">
                <div class="task-icon bg-blue">U</div>
                <button class="task-btn" onclick="handleUpload()">去完成</button>
                <div class="task-content">
                    <div class="task-name">每日上传资源</div>
                    <div class="task-reward">+10 积分/次</div>
                    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="upProgressFill"></div></div>
                    <div style="font-size:10px; color:#8E8E93; margin-top:4px" id="upProgressText">今日进度 0/10</div>
                </div>
            </div>
        </div>

        <div class="section-header">积分明细</div>
        <div class="detail-card" id="coinLogContainer">
            <div class="detail-item" style="text-align:center; padding: 30px 0;">
                <p style="font-size: 13px; color: #8E8E93;">加载中...</p>
            </div>
        </div>
        <p class="footer-tips">仅显示最近30天记录</p>
    </div>

    <script type="text/javascript">
        var selectedAmount = null;
        var selectedType = null;
        var userPoints = 0;

        function ajax(options) {
            var xhr = new XMLHttpRequest();
            var method = options.method || 'GET';
            var url = options.url;
            xhr.open(method, url, true);
            if (method === 'POST') {
                xhr.setRequestHeader('Content-Type', 'application/json');
            }
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        options.success(JSON.parse(xhr.responseText));
                    } else {
                        if (options.error) options.error();
                    }
                }
            };
            xhr.send(options.data ? JSON.stringify(options.data) : null);
        }

        function selectAmount(el, val) {
            var opts = document.getElementsByClassName('pay-option');
            for(var i=0; i<opts.length; i++) { opts[i].className = 'pay-option'; }
            el.className = 'pay-option active';
            selectedAmount = val;
            checkSelection();
        }

        function selectType(el, val) {
            var opts = document.getElementsByClassName('method-item');
            for(var i=0; i<opts.length; i++) { opts[i].className = 'method-item'; }
            el.className = 'method-item active';
            selectedType = val;
            checkSelection();
        }

        function checkSelection() {
            if (selectedAmount && selectedType) {
                document.getElementById('payBtn').style.display = 'block';
            }
        }

        function handlePay() {
            var usermail = localStorage.getItem('usermail');
            if (!usermail) { showToast('请先登录'); return; }
            showLoading();
            setTimeout(function() {
                ajax({
                    method: 'POST',
                    url: 'https://apirank.qujiaweb.top/?mode=create_pay_order',
                    data: { mail: usermail, amount: selectedAmount, type: selectedType },
                    success: function(res) {
                        hideLoading();
                        if (res.code === 200 && res.payUrl) {
                            if (window.plus) {
                                plus.runtime.openURL(res.payUrl);
                            } else {
                                window.location.href = res.payUrl;
                            }
                        } else {
                            showToast(res.msg || '获取失败');
                        }
                    },
                    error: function() { hideLoading(); showToast('网络错误'); }
                });
            }, 500);
        }

        function handleBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('auto');
            } else {
                var prev = document.referrer;
                if (prev && prev.indexOf('index.html') !== -1) {
                    window.location.href = 'oldindex.html';
                } else {
                    history.back();
                }
            }
        }

        function handleAd() {
            var usermail = localStorage.getItem('usermail');
            if (!usermail) { showToast('请先登录'); return; }
            if (window.plus && plus.ad && plus.ad.createRewardedVideoAd) {
                showLoading();
                setTimeout(function() {
                    hideLoading();
                    var adReward = plus.ad.createRewardedVideoAd({adpid:'1358284724'});
                    adReward.onLoad(function() { adReward.show(); });
                    adReward.onClose(function(e) {
                        if(e.isEnded) { addAdRewardCoins(); }
                        adReward.destroy();
                    });
                    adReward.load();
                }, 300);
            } else { showToast('请在APP环境使用'); }
        }

        function addAdRewardCoins() {
            var usermail = localStorage.getItem('usermail');
            showLoading();
            setTimeout(function() {
                ajax({
                    url: 'https://apirank.qujiaweb.top/?mode=ad_reward&mail=' + encodeURIComponent(usermail),
                    success: function(res) {
                        hideLoading();
                        if (res.code === 200) { showToast('领取成功'); init(); } else { showToast(res.msg); }
                    }
                });
            }, 800);
        }

        function handleUpload() {
            window.location.href = 'oldupload.html';
        }

        function showLoading() { if (window.plus) plus.nativeUI.showWaiting('请稍候...'); }
        function hideLoading() { if (window.plus) plus.nativeUI.closeWaiting(); }
        function showToast(m) { if (window.plus) { plus.nativeUI.toast(m); } else { alert(m); } }

        function fetchUserPoints() {
            var savedEmail = localStorage.getItem('usermail_login');
            var savedPass = localStorage.getItem('userpass_login');
            if (savedEmail && savedPass) {
                ajax({
                    method: 'POST',
                    url: 'https://apirank.qujiaweb.top/?mode=login',
                    data: { email: savedEmail, password: savedPass },
                    success: function(res) {
                        if (res.code === 200 && res.fields && res.fields.length > 0) {
                            var p = res.fields[0]["积分"] || '0';
                            localStorage.setItem('userpoints', p);
                            document.getElementById('totalPoints').innerHTML = p;
                        }
                    }
                });
            }
        }

        function fetchLogs() {
            var userMail = localStorage.getItem('usermail');
            if (!userMail) return;
            ajax({
                url: 'https://apirank.qujiaweb.top/?mode=get_coin_log&mail=' + encodeURIComponent(userMail),
                success: function(res) {
                    if (res.code === 200) {
                        updateUI(res.fields);
                    }
                }
            });
        }

        function updateUI(logs) {
            var container = document.getElementById('coinLogContainer');
            var html = '';
            var adCount = 0, upCount = 0;
            var today = new Date().getFullYear() + '-' + (new Date().getMonth()+1) + '-' + new Date().getDate();
            
            for(var i=0; i<logs.length; i++) {
                var log = logs[i];
                var change = String(log["积分变动"] || '0');
                if (change.indexOf('+') === -1 && change.indexOf('-') === -1 && parseInt(change) > 0) change = '+' + change;
                var cls = change.indexOf('+') !== -1 ? 'plus' : 'minus';
                
                html += '<div class="detail-item">' +
                        '<div class="detail-info"><h4>' + log.类型 + '</h4><p>' + log.时间 + '</p></div>' +
                        '<div class="detail-amount ' + cls + '">' + change + '</div>' +
                        '</div>';
                
                if (log.时间.indexOf(today) !== -1) {
                    if (log.类型 === '观看广告奖励') adCount++;
                    if (log.类型 === '上传资源奖励') upCount++;
                }
            }
            container.innerHTML = html || '<div style="text-align:center;padding:20px;color:#8E8E93">暂无记录</div>';
            
            document.getElementById('adProgressFill').style.width = (adCount * 10) + '%';
            document.getElementById('adProgressText').innerHTML = '今日进度 ' + adCount + '/10';
            document.getElementById('upProgressFill').style.width = (upCount * 10) + '%';
            document.getElementById('upProgressText').innerHTML = '今日进度 ' + upCount + '/10';
        }

        function init() {
            setTimeout(function() {
                var p = localStorage.getItem('userpoints') || '0';
                document.getElementById('totalPoints').innerHTML = p;
                fetchUserPoints();
                setTimeout(fetchLogs, 500);
            }, 300);
        }

        window.onload = init;
    </script>
</body>
</html>
