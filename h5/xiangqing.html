<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>应用详情</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gray: #F2F2F7;
            --text-main: #000000;
            --text-sec: #8E8E93;
            --card-bg: #FFFFFF;
        }

        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, "SF Pro SC", "SF Pro Display", "PingFang SC", sans-serif;
            color: var(--text-main);
            line-height: 1.5;
            width: 100%;
            overflow-x: hidden; 
            -webkit-text-size-adjust: 100%;
        }

        
        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 44px;
            z-index: 900;
            display: flex;
            align-items: center;
            padding: 0 16px;
            margin-top: env(safe-area-inset-top);
        }

        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.05);
        }

        .back-icon {
            width: 10px;
            height: 10px;
            border-left: 2px solid var(--ios-blue);
            border-bottom: 2px solid var(--ios-blue);
            transform: rotate(45deg);
            margin-left: 2px;
        }

        
        .app-header {
            padding: calc(60px + env(safe-area-inset-top)) 20px 24px;
            display: flex;
            align-items: flex-start;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            background: linear-gradient(135deg, #f5f5f7 0%, #e3e3e8 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-right: 20px;
            flex-shrink: 0;
            border: 0.5px solid rgba(0,0,0,0.1);
        }

        .app-title-group {
            flex: 1;
            min-width: 0; 
            overflow: hidden;
        }
        .app-name { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 4px; 
            letter-spacing: -0.5px; 
            white-space: nowrap;     
            overflow: hidden;         
            text-overflow: ellipsis; 
        }
        .app-package-container {
            display: flex;
            align-items: center;
            gap: 4px;
            width: 100%; 
        }
        .app-package {
            font-size: 13px;
            color: var(--text-sec);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            white-space: nowrap;      
            overflow: hidden;         
            text-overflow: ellipsis;  
            flex: 0 1 auto;           
            min-width: 0;              
        }
        .app-package-arrow {
            font-size: 13px;
            color: var(--text-sec);
            flex-shrink: 0;           
        }

       
        .info-grid {
            display: flex;
            overflow-x: auto;
            padding: 0 20px;
            gap: 24px;
            margin-bottom: 30px;
            -webkit-overflow-scrolling: touch;
        }
        .info-grid::-webkit-scrollbar { display: none; }
        .info-item {
            flex-shrink: 0;
            text-align: center;
            min-width: 75px;
            position: relative;
        }
        .info-item:not(:last-child)::after {
            content: ""; position: absolute; right: -12px; top: 20%; height: 60%; width: 0.5px; background: #D1D1D6;
        }
        .info-label { font-size: 11px; color: var(--text-sec); font-weight: 600; margin-bottom: 4px; }
        .info-value { font-size: 15px; font-weight: 700; color: #48484A; }

  
        .section {
            padding: 24px 20px;
            border-top: 0.5px solid var(--ios-gray);
        }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }

    
        .screenshot-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }
        .screenshot-list::-webkit-scrollbar { display: none; }
        .screenshot-item {
            width: 180px;
            height: 320px;
            background: #f5f5f7;
            border-radius: 12px;
            flex-shrink: 0;
            border: 0.5px solid rgba(0,0,0,0.05);
            background-size: cover;
            background-position: center;
        }

        .description { font-size: 15px; color: #3A3A3C; line-height: 1.6; word-wrap: break-word; overflow-wrap: break-word; -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }

    
        .comment-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .comment-card {
            background: #F9F9FB;
            border-radius: 15px;
            padding: 16px;
            border: 0.5px solid rgba(0,0,0,0.03);
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            user-select: none;
        }
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 10px;
            background: linear-gradient(45deg, #FF9500, #FFCC00); 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        .user-meta {
            flex: 1;
        }
        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }
        .comment-time {
            font-size: 11px;
            color: var(--text-sec);
        }
        .comment-body {
            font-size: 14px;
            color: #3A3A3C;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

       
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        
        .download-progress-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .progress-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .progress-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--ios-gray);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: var(--ios-blue);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-sec);
            text-align: center;
            margin-bottom: 20px;
        }

        .progress-cancel {
            width: 100%;
            height: 44px;
            background: var(--ios-gray);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
        }

        .progress-cancel:active {
            background: #e0e0e5;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            background: var(--ios-gray);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--ios-blue);
            flex-shrink: 0;
        }

        .get-btn-main {
            flex: 1;
            height: 44px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            transition: transform 0.1s;
        }
        .get-btn-main:active { transform: scale(0.98); opacity: 0.9; }

        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 2000;
            align-items: flex-end;
        }
        .modal-sheet {
            width: 100%;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .modal-sheet.show { transform: translateY(0); }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .coin-options { display: flex; gap: 15px; }
        .coin-opt {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--ios-gray);
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .coin-opt:active { border-color: var(--ios-blue); background: rgba(0,122,255,0.05); }
        .coin-num { font-size: 24px; font-weight: 800; color: var(--ios-blue); display: block; }
        .coin-label { font-size: 13px; color: var(--text-sec); }

        
        .star-rating {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }
        .star-rating span {
            font-size: 24px;
            color: #D1D1D6;
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating span.active {
            color: #FF9500;
        }
        .comment-input {
            width: 100%;
            min-height: 100px;
            border: 1px solid var(--ios-gray);
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 20px;
        }
        .comment-input:focus {
            outline: none;
            border-color: var(--ios-blue);
        }
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .upload-item {
            width: 100%;
            aspect-ratio: 1;
            background: var(--ios-gray);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-sec);
            position: relative;
            overflow: hidden;
        }
        .upload-item.upload-add {
            cursor: pointer;
            border: 2px dashed var(--ios-gray);
            background: transparent;
        }
        .upload-item.upload-add:active {
            background: rgba(0, 122, 255, 0.05);
        }
        .upload-del {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }
        .upload-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="back-btn" onclick="handleBack()">
            <div class="back-icon"></div>
        </div>
    </nav>

    <header class="app-header">
        <div class="app-icon"></div>
        <div class="app-title-group">
            <div class="app-name">加载中...</div>
            <div class="app-package-container" onclick="handlePackageClick()">
                <div class="app-package" id="appPackage">加载中...</div>
                <div class="app-package-arrow">›</div>
            </div>
        </div>
    </header>

    <div class="info-grid">
        <div class="info-item">
            <div class="info-label">应用大小</div>
            <div class="info-value"></div>
        </div>
        <div class="info-item">
            <div class="info-label">应用版本</div>
            <div class="info-value"></div>
        </div>
        <div class="info-item">
            <div class="info-label">安卓版本</div>
            <div class="info-value"></div>
        </div>
        <div class="info-item">
            <div class="info-label">系统位数</div>
            <div class="info-value"></div>
        </div>
        <div class="info-item">
            <div class="info-label">分享时间</div>
            <div class="info-value"></div>
        </div>
        <div class="info-item">
            <div class="info-label">分享用户</div>
            <div class="info-value"></div>
        </div>
    </div>

    <section class="section">
        <div class="section-title">截图</div>
        <div class="screenshot-list">
            </div>
    </section>

    <section class="section">
        <div class="section-title">简介</div>
        <div class="description">
            加载中...
        </div>
    </section>

    <section class="section" style="margin-bottom: 110px;">
        <div class="section-title">
            评论 
            <span onclick="openCommentModal()" style="font-size: 14px; color: var(--ios-blue); font-weight: normal; cursor: pointer;">写评论</span>
        </div>
        
        <div class="comment-container">
            <div style="text-align: center; padding: 20px; color: var(--text-sec);">加载中...</div>
        </div>
    </section>

    <div class="modal-overlay" id="commentModal" onclick="closeCommentModal()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-title">发表评论</div>
            
            <div class="star-rating" id="starRating">
                <span onclick="setRating(1)">★</span>
                <span onclick="setRating(2)">★</span>
                <span onclick="setRating(3)">★</span>
                <span onclick="setRating(4)">★</span>
                <span onclick="setRating(5)">★</span>
            </div>

            <textarea class="comment-input" id="commentContent" placeholder="说说你的使用心得..."></textarea>

            <div class="upload-grid" id="imageGrid">
                <div class="upload-item upload-add" onclick="triggerUpload()">+</div>
            </div>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileSelect(event)">

            <button class="get-btn-main" style="width:100%" onclick="submitComment()">立即发表</button>
        </div>
    </div>

    
    <div class="modal-overlay" id="replyModal" onclick="closeReplyModal()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-title" id="replyTitle">回复 用户名</div>

            <textarea class="comment-input" id="replyContent" placeholder="写下你的回复..."></textarea>

            <div class="upload-grid" id="replyImageGrid">
                <div class="upload-item upload-add" onclick="triggerReplyUpload()">+</div>
            </div>
            <input type="file" id="replyFileInput" hidden accept="image/*" onchange="handleReplyFileSelect(event)">

            <button class="get-btn-main" style="width:100%" onclick="submitReply()">立即回复</button>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="btn-icon" onclick="toggleCollect()">
            <span id="collectIcon" style="font-size: 18px;">☆</span>
            <span>收藏</span>
        </div>
        <button class="get-btn-main" id="downloadBtn" onclick="startDownload()">获取</button>
        <div class="btn-icon" onclick="openCoinModal()">
            <span style="font-size: 18px;">🪙</span>
            <span id="coinText">投币</span>
        </div>
    </div>

    <div class="modal-overlay" id="coinModal" onclick="closeCoinModal()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-title">为应用投币</div>
            <div class="coin-options">
                <div class="coin-opt" onclick="doCoin(1)">
                    <span class="coin-num">1</span>
                    <span class="coin-label">积分</span>
                </div>
                <div class="coin-opt" onclick="doCoin(2)">
                    <span class="coin-num">2</span>
                    <span class="coin-label">积分</span>
                </div>
            </div>
            <button class="get-btn-main" style="width:100%; margin-top: 20px; background: #eee; color: #333;" onclick="closeCoinModal()">取消</button>
        </div>
    </div>

    
    <div class="download-progress-modal" id="downloadProgressModal" style="display: none;">
        <div class="progress-container">
            <div class="progress-title">下载中</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">准备中...</div>
            <button class="progress-cancel" onclick="cancelDownload()">取消下载</button>
        </div>
    </div>

    <script>
        
        let screenshotUrls = [];
        let isSaving = false;
        let pageActive = true; 
        let currentDownloadTask = null; 

        function handleBack() {
            pageActive = false; 
            if (window.plus) {
                var webview = plus.webview.currentWebview();
                
                webview.back();
                
                setTimeout(function() {
                    webview.canBack(function(e) {
                        if (!e.canBack) {
                            webview.close('auto');
                        }
                    });
                }, 100);
            } else {
                window.history.back();
            }
        }

        function handlePackageClick() {
            if (!isPageActive()) {
                console.log('页面已销毁，取消包名点击操作');
                return;
            }
            
            const packageElement = document.getElementById('appPackage');
            if (!packageElement) {
                console.log('包名元素不存在');
                return;
            }
            
            const packageName = packageElement.textContent.trim();
            if (!packageName || packageName === '加载中...') {
                return;
            }
            
            var url = 'moreapp.html?baoming=' + encodeURIComponent(packageName);
            if (window.plus) {
                var ws = plus.webview.create(url, url, {
                    backbuttonMaximize: false
                });
                ws.show('pop-in', 300);
            } else {
                window.location.href = url;
            }
        }

        
        function isPageActive() {
            return pageActive;
        }

        function toggleCollect() {
            if (!isPageActive()) {
                console.log('页面已销毁，取消收藏操作');
                return;
            }
            
            const icon = document.getElementById('collectIcon');
            if (!icon) {
                console.log('收藏按钮不存在');
                return;
            }
            
            const appId = getUrlParam('id');
            
            if (icon.innerText === '☆') {
                // 添加收藏
                icon.innerText = '★';
                icon.style.color = '#FF9500';
                addToCollection(appId);
                showToast('收藏成功');
            } else {
                // 取消收藏
                icon.innerText = '☆';
                icon.style.color = 'var(--ios-blue)';
                removeFromCollection(appId);
                showToast('取消收藏');
            }
        }

        
        function addToCollection(appId) {
            try {
                
                let collection = JSON.parse(localStorage.getItem('appCollection') || '[]');
                
                
                if (!collection.some(item => item.id === appId)) {
                    
                    const app = getCurrentAppInfo();
                    if (app) {
                        const collectionItem = {
                            id: appId,
                            name: app.name,
                            icon: app.icon,
                            description: app.description,
                            timestamp: Date.now()
                        };
                        
                        
                        collection.push(collectionItem);
                        
                        
                        localStorage.setItem('appCollection', JSON.stringify(collection));
                    }
                }
            } catch (error) {
                console.error('添加收藏失败:', error);
            }
        }

        
        function removeFromCollection(appId) {
            try {
                
                let collection = JSON.parse(localStorage.getItem('appCollection') || '[]');
                
                
                const newCollection = collection.filter(item => item.id !== appId);
                
                
                localStorage.setItem('appCollection', JSON.stringify(newCollection));
            } catch (error) {
                console.error('移除收藏失败:', error);
            }
        }

        
        function getCurrentAppInfo() {
            try {
                const appIcon = document.querySelector('.app-icon');
                const appName = document.querySelector('.app-name');
                const appDesc = document.querySelector('.description');
                
                return {
                    name: appName ? appName.textContent : '',
                    icon: appIcon ? appIcon.style.backgroundImage.replace(/url\(['"]?(.*?)['"]?\)/, '$1') : '',
                    description: appDesc ? appDesc.textContent : ''
                };
            } catch (error) {
                console.error('获取应用信息失败:', error);
                return null;
            }
        }

        
        function isCollected(appId) {
            try {
                const collection = JSON.parse(localStorage.getItem('appCollection') || '[]');
                return collection.some(item => item.id === appId);
            } catch (error) {
                console.error('检查收藏状态失败:', error);
                return false;
            }
        }

        
        function updateCollectButton() {
            if (!isPageActive()) {
                console.log('页面已销毁，取消更新收藏按钮状态');
                return;
            }
            
            const appId = getUrlParam('id');
            const icon = document.getElementById('collectIcon');
            
            if (!icon) {
                console.log('收藏按钮不存在');
                return;
            }
            
            if (isCollected(appId)) {
                icon.innerText = '★';
                icon.style.color = '#FF9500';
            } else {
                icon.innerText = '☆';
                icon.style.color = 'var(--ios-blue)';
            }
        }

        const modal = document.getElementById('coinModal');
        const sheet = modal.querySelector('.modal-sheet');

        function openCoinModal() {
            if (!isPageActive()) {
                console.log('页面已销毁，取消打开投币弹窗');
                return;
            }
            
            if (modal && sheet) {
                modal.style.display = 'flex';
                setTimeout(() => {
                    if (isPageActive() && sheet) {
                        sheet.classList.add('show');
                    }
                }, 10);
            }
        }

        function closeCoinModal() {
            if (!isPageActive()) {
                console.log('页面已销毁，取消关闭投币弹窗');
                return;
            }
            
            if (modal && sheet) {
                sheet.classList.remove('show');
                setTimeout(() => {
                    if (isPageActive() && modal) {
                        modal.style.display = 'none';
                    }
                }, 300);
            }
        }


        let currentAppInfo = null;
        
        function doCoin(num) {
            if (!isPageActive()) {
                console.log('页面已销毁，取消投币操作');
                return;
            }
            
            const appId = getUrlParam('id');
            const userMail = localStorage.getItem('usermail');
            
            if (!userMail) {
                showToast('请先登录');

                    .then(() => {
                        console.log('复制成功 (现代API)');
                        showCopySuccess(copyType);
                    })
                    .catch(err => {
                        console.warn('现代API复制失败，尝试备用方案:', err);

        function tryFallbackMethods(text, copyType = 'password') {
       
            if (window.plus && plus.device) {
                try {
                    plus.device.setClipboard(text, function() {
                        console.log('复制成功 (HTML5+)');
                        showCopySuccess(copyType);
                    }, function(err) {
                        console.warn('HTML5+复制失败:', err);
                        tryExecCommand(text, copyType);
                    });
                    return;
                } catch (e) {
                    console.warn('HTML5+复制异常:', e);
                }
            }
            
            
            tryExecCommand(text, copyType);

        function tryExecCommand(text, copyType = 'password') {
        
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    console.log('复制成功 (execCommand)');
                    showCopySuccess(copyType);
                } else {
                    console.warn('execCommand复制失败');
                    showToast('复制失败，请手动复制');
                }
            } catch (err) {
                console.error('execCommand执行失败:', err);
                showToast('复制失败，请手动复制');
            } finally {
                document.body.removeChild(textArea);
            }
        }

        function updateDownloadProgress(progress, downloadedSize, totalSize) {
            if (!isPageActive()) return;
            
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            if (progressFill) {
                progressFill.style.width = progress + '%';
            }
            
            if (progressText) {
                const downloaded = formatFileSize(downloadedSize);
                const total = formatFileSize(totalSize);
                progressText.textContent = `${downloaded} / ${total} (${progress}%)`;
            }
        }

  
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

            return `${month}-${day}`;

        function emojiToHtmlEntity(str) {
            return [...str].map(char => {
                const code = char.codePointAt(0);
                if (
                    (code >= 0x1F300 && code <= 0x1F6FF) ||
                    (code >= 0x1F900 && code <= 0x1F9FF) ||
                    (code >= 0x1FA70 && code <= 0x1FAFF) ||
                    (code >= 0x2600 && code <= 0x26FF) ||
                    (code >= 0x2700 && code <= 0x27BF) ||
                    (code >= 0x1F1E6 && code <= 0x1F1FF)
                ) {
                    return `&#${code};`;
                } else {
                    return char;
                }
            }).join('');
        }

                    for (let i = 0; i < sections.length; i++) {

                            commentSection = sections[i];
                            break;
                        }
                    }
                    if (commentSection) {
                        const commentTitle = commentSection.querySelector('.section-title');
                        if (commentTitle) {
                            const commentCount = result.fields.filter(comment => !comment.rootid || comment.rootid === '').length;

                    commentContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-sec);">暂无评论，快来抢沙发</div>';
                }

        function addLongPressEvent(element, comment) {
            let pressTimer = null;
            let startX = 0;
            let startY = 0;

        
            element.oncontextmenu = function(e) { e.preventDefault(); return false; };

            element.addEventListener('touchstart', function(e) {
              
                e.stopPropagation();
                
             
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                
                element.style.transform = 'scale(0.98)';
                element.style.transition = 'transform 0.2s';
                
                pressTimer = setTimeout(function() {
                   
                    showActionMenu(element, comment);
                
                    element.style.transform = 'scale(1)';
                }, 600); 
            });

            element.addEventListener('touchmove', function(e) {
               
                e.stopPropagation();
                
            
                let moveX = Math.abs(e.touches[0].clientX - startX);
                let moveY = Math.abs(e.touches[0].clientY - startY);
                
           
                if (moveX > 10 || moveY > 10) {
                    element.style.transform = 'scale(1)';
                    clearTimeout(pressTimer);
                }
            });

            element.addEventListener('touchend', function(e) {
            
                e.stopPropagation();
                
                element.style.transform = 'scale(1)';
                clearTimeout(pressTimer);
            });

            element.addEventListener('touchcancel', function(e) {
          
                e.stopPropagation();
                
                element.style.transform = 'scale(1)';
                clearTimeout(pressTimer);
            });
        }

                        mail: userMail,
                        target_user: currentReplyTarget.用户,
                        target_mail: currentReplyTarget.邮箱,
                        parentid: currentReplyTarget.createdAt,
                        rootid: currentReplyTarget.rootid || currentReplyTarget.createdAt
                    })
                });
                
                const result = await response.json();
                if (result.code === 200) {
                    showToast('回复成功');
                    closeReplyModal();
                   
                    replyImages = [];
                    currentReplyTarget = null;
                    
                    getAppComments(appId);
                } else {
                    showToast('回复失败：' + (result.msg || '未知错误'));
                }
            } catch (e) {
                showToast('回复出错');
            } finally {
                if (window.plus) {
                    plus.nativeUI.closeWaiting();
                }
            }
        }

        document.addEventListener('plusready', function() {
            plus.key.addEventListener('backbutton', handleBack);
        });
    </script>
</body>
</html>
