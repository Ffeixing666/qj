<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --text-main: #1C1C1E;
            --text-second: #8E8E93;
            --line-color: #C6C6C8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(242, 242, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .back-btn {
            width: 40px;
            height: 100%;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .back-icon {
            width: 12px;
            height: 12px;
            border-left: 2.5px solid var(--ios-blue);
            border-bottom: 2.5px solid var(--ios-blue);
            transform: rotate(45deg);
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        .nav-right { width: 40px; }

        .settings-container {
            padding: 16px 0 40px 0;
        }

        .section-group {
            background: var(--ios-card);
            margin: 0 16px 24px 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        .section-header {
            padding-left: 32px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-second);
            text-transform: uppercase;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            position: relative;
            background: var(--ios-card);
            transition: background 0.2s;
        }

        .item:active {
            background-color: #E5E5EA;
        }

        .item:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            left: 56px;
            height: 0.5px;
            background-color: rgba(0,0,0,0.1);
        }

        .icon-box {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-box svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .bg-blue   { background-color: #007AFF; }
        .bg-green  { background-color: #34C759; }
        .bg-orange { background-color: #FF9500; }
        .bg-indigo { background-color: #5856D6; }
        .bg-red    { background-color: #FF3B30; }

        .item-label {
            flex: 1;
            font-size: 16px;
            font-weight: 400;
        }

        .item-arrow {
            width: 8px;
            height: 8px;
            border-top: 2px solid #C7C7CC;
            border-right: 2px solid #C7C7CC;
            transform: rotate(45deg);
            margin-right: 4px;
        }

        .logout-btn {
            margin: 32px 16px 0 16px;
            background: var(--ios-card);
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ios-red);
            font-size: 17px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:active {
            background-color: #FFF0F0;
            transform: scale(0.98);
        }

        .footer-info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-second);
            letter-spacing: 0.2px;
        }

        .custom-prompt-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .custom-prompt-overlay.active {
            display: flex;
            opacity: 1;
        }

        .custom-prompt-box {
            width: 270px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            transform: scale(1.1);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .custom-prompt-overlay.active .custom-prompt-box {
            transform: scale(1);
        }

        .custom-prompt-title {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            padding: 20px 16px 12px;
        }

        .custom-prompt-content {
            padding: 0 16px 20px;
        }

        .custom-prompt-input {
            width: 100%;
            height: 36px;
            background-color: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            padding: 0 8px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            -webkit-appearance: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .custom-prompt-footer {
            display: flex;
            border-top: 0.5px solid rgba(0, 0, 0, 0.1);
            height: 44px;
        }

        .custom-prompt-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            color: var(--ios-blue);
            cursor: pointer;
        }

        .custom-prompt-btn:active {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .custom-prompt-btn-cancel {
            border-right: 0.5px solid rgba(0, 0, 0, 0.1);
            font-weight: 400;
            border-bottom-left-radius: 14px;
        }

        .custom-prompt-btn-confirm {
            font-weight: 600;
            border-bottom-right-radius: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div class="back-btn" onclick="handleBack()">
                <div class="back-icon"></div>
            </div>
            <div class="nav-title">设置</div>
            <div class="nav-right"></div>
        </div>
    </header>

    <main class="settings-container">
        <div class="section-header">用户资料</div>
        <div class="section-group">
            <div class="item" onclick="navigate('nickname')">
                <div class="icon-box bg-blue">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="item-label">修改昵称</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item" onclick="navigate('bio')">
                <div class="icon-box bg-green">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </div>
                <div class="item-label">修改个签</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item" onclick="navigate('avatar')">
                <div class="icon-box bg-orange">
                    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </div>
                <div class="item-label">修改头像</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item" onclick="navigate('background')">
                <div class="icon-box bg-indigo">
                    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM5 5h14v14H5V5zm9 5.08V7h-4v3.08l-2 1.5V17h8v-5.42l-2-1.5z"/></svg>
                </div>
                <div class="item-label">修改背景</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="section-header">账号安全</div>
        <div class="section-group">
            <div class="item" onclick="navigate('password')">
                <div class="icon-box bg-red">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </div>
                <div class="item-label">修改密码</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="logout-btn" onclick="handleLogout()">退出当前账号</div>
        <div class="footer-info">趣加应用 v2.0.1</div>
    </main>

    <div id="customPromptOverlay" class="custom-prompt-overlay">
        <div class="custom-prompt-box">
            <div id="customPromptTitle" class="custom-prompt-title">提示</div>
            <div class="custom-prompt-content">
                <input type="text" id="customPromptInput" class="custom-prompt-input" placeholder="">
            </div>
            <div class="custom-prompt-footer">
                <div class="custom-prompt-btn custom-prompt-btn-cancel" onclick="closeCustomPrompt()">取消</div>
                <div class="custom-prompt-btn custom-prompt-btn-confirm" onclick="confirmCustomPrompt()">确定</div>
            </div>
        </div>
    </div>

    <script>
        // --- 通用 AJAX 请求函数 (降级方案) ---
        function ajaxPost(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            // 如果是 FormData 不要设置 Content-Type
            if (!(data instanceof FormData)) {
                xhr.setRequestHeader('Content-Type', 'application/json');
                data = JSON.stringify(data);
            }
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            callback(null, res);
                        } catch (e) {
                            callback('解析失败');
                        }
                    } else {
                        callback('请求失败 ' + xhr.status);
                    }
                }
            };
            xhr.send(data);
        }

        // --- 自定义弹窗逻辑 ---
        var promptCallback = null;
        function showCustomPrompt(title, isPassword, callback) {
            var overlay = document.getElementById('customPromptOverlay');
            var titleEl = document.getElementById('customPromptTitle');
            var inputEl = document.getElementById('customPromptInput');
            titleEl.textContent = title;
            inputEl.value = '';
            inputEl.type = isPassword ? 'password' : 'text';
            promptCallback = callback;
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.add('active');
            setTimeout(function() { inputEl.focus(); }, 100);
        }

        function closeCustomPrompt() {
            var overlay = document.getElementById('customPromptOverlay');
            overlay.classList.remove('active');
            setTimeout(function() {
                overlay.style.display = 'none';
                promptCallback = null;
            }, 250);
        }

        function confirmCustomPrompt() {
            var inputEl = document.getElementById('customPromptInput');
            if (promptCallback) promptCallback(inputEl.value);
            closeCustomPrompt();
        }

        // --- 核心逻辑 ---
        document.addEventListener('plusready', function() {
            plus.key.addEventListener('backbutton', function() { handleBack(); });
        });

        function handleBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('auto');
            } else {
                history.back();
            }
        }

        function toast(message) {
            if (window.plus) {
                plus.nativeUI.toast(message, { verticalAlign: 'center' });
            } else {
                alert(message); // 极低端浏览器降级使用 alert
            }
        }

        // 修改导航逻辑：图片上传全部走文件选择
        function navigate(page) {
            var mail = localStorage.getItem('usermail');
            if (!mail) { toast('请先登录'); return; }

            if (page === 'avatar' || page === 'background') {
                if (window.plus) {
                    plus.gallery.pick(function(path) {
                        uploadFileWithPlus(path, page);
                    }, function(e) {}, { filter: 'image' });
                } else {
                    // 浏览器降级方案：创建隐藏的文件上传控件
                    var fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = 'image/*';
                    fileInput.onchange = function(e) {
                        if (e.target.files && e.target.files[0]) {
                            handleWebUpload(e.target.files[0], page);
                        }
                    };
                    fileInput.click();
                }
            } else if (page === 'nickname') {
                showCustomPrompt('请输入新昵称', false, function(v) { if(v) updateNickname(v); });
            } else if (page === 'bio') {
                showCustomPrompt('请输入新的个性签名', false, function(v) { updateBio(v || ''); });
            } else if (page === 'password') {
                showCustomPrompt('请输入新密码', true, function(v) { if(v) updatePassword(v); });
            }
        }

        // --- Web 端上传处理 ---
        function handleWebUpload(file, type) {
            if (window.plus) plus.nativeUI.showWaiting('上传中...');
            var fd = new FormData();
            fd.append('file', file);
            
            ajaxPost('https://apirank.qujiaweb.top/?mode=upload_meituan', fd, function(err, res) {
                if (window.plus) plus.nativeUI.closeWaiting();
                if (!err && res.full_url) {
                    if (type === 'avatar') updateAvatarUrl(res.full_url);
                    else updateBackgroundUrl(res.full_url);
                } else {
                    toast('上传失败');
                }
            });
        }

        // --- H5+ 原生上传处理 ---
        function uploadFileWithPlus(path, type) {
            plus.nativeUI.showWaiting('上传中...');
            var task = plus.uploader.createUpload('https://apirank.qujiaweb.top/?mode=upload_meituan', {method:'POST'}, function(t, status) {
                plus.nativeUI.closeWaiting();
                if (status == 200) {
                    var res = JSON.parse(t.responseText);
                    if (res.full_url) {
                        if (type === 'avatar') updateAvatarUrl(res.full_url);
                        else updateBackgroundUrl(res.full_url);
                    } else { toast('上传失败'); }
                } else { toast('上传错误'); }
            });
            task.addFile(path, {key:'file'});
            task.start();
        }

        // --- API 更新函数 ---
        function updateAvatarUrl(url) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_avatar&mail=' + encodeURIComponent(mail), {mail:mail, avatar:url}, function(err, res){
                if(!err && res.code === 200) toast('头像修改成功');
            });
        }

        function updateBackgroundUrl(url) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_background&mail=' + encodeURIComponent(mail), {mail:mail, background:url}, function(err, res){
                if(!err && res.code === 200) toast('背景修改成功');
            });
        }

        function updateNickname(name) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_nickname&mail=' + encodeURIComponent(mail), {mail:mail, nickname:escapeEmoji(name)}, function(err, res){
                if(!err && res.code === 200) toast('昵称修改成功');
            });
        }

        function updateBio(bio) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_bio&mail=' + encodeURIComponent(mail), {mail:mail, bio:escapeEmoji(bio)}, function(err, res){
                if(!err && res.code === 200) toast('签名修改成功');
            });
        }

        function updatePassword(pwd) {
            if (!/^[a-zA-Z0-9_]+$/.test(pwd)) { toast('密码格式非法'); return; }
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_password&mail=' + encodeURIComponent(mail), {mail:mail, password:pwd}, function(err, res){
                if(!err && res.code === 200) toast('密码修改成功');
            });
        }

        function escapeEmoji(text) {
            return text.replace(/'/g, "~PGDBSD~");
        }

        function handleLogout() {
            var msg = '确定退出登录？';
            if (window.plus) {
                plus.nativeUI.confirm(msg, function(e) {
                    if (e.index === 0) {
                        localStorage.clear();
                        plus.webview.currentWebview().close('auto');
                        var me = plus.webview.getWebviewById('me.html');
                        if (me) me.reload();
                    }
                }, '提示', ['确定', '取消']);
            } else {
                if (confirm(msg)) {
                    localStorage.clear();
                    window.location.href = 'me.html';
                }
            }
        }
    </script>
</body>
</html>
