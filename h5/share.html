<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分享应用</title>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-blue: #007AFF; --line: rgba(0,0,0,0.06); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); color: #1C1C1E; }
        header { position: sticky; top: 0; z-index: 100; background: rgba(242,242,247,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--line); }
        .nav-bar { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .container { padding: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; text-align: center; border: 1px solid var(--line); }
        #picker { position: fixed; inset: 0; background: #fff; z-index: 1000; display: none; flex-direction: column; }
        .p-header { padding: 10px 16px; border-bottom: 0.5px solid var(--line); display: flex; align-items: center; }
        .search-box { flex: 1; background: #efeff4; border-radius: 10px; padding: 6px 12px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; }
        #app-list { flex: 1; overflow-y: auto; }
        .app-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--line); }
        .app-icon-placeholder { width: 48px; height: 48px; border-radius: 10px; margin-right: 14px; background: #e5e5ea; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        #detail-step { display: none; }
        .info-box { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .preview-header { display: flex; align-items: center; gap: 15px; }
        .preview-icon { width: 64px; height: 64px; border-radius: 14px; background: #f0f0f0; object-fit: contain; }
        textarea { width: 100%; border: none; outline: none; font-size: 15px; height: 80px; resize: none; margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .btn-post { width: 100%; height: 50px; background: var(--ios-blue); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; margin-top: 15px; }
        #status-log { font-size: 13px; color: var(--ios-blue); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div onclick="location.reload()" style="color:var(--ios-blue)">取消</div>
            <div style="font-weight:600">分享应用</div>
            <div style="width:30px"></div>
        </div>
    </header>

    <div class="container" id="entry-step">
        <div class="card" onclick="openPicker()"><strong>从已安装列表选择应用</strong></div>
    </div>

    <div class="container" id="detail-step">
        <div class="info-box">
            <div class="preview-header">
                <img id="res-icon" class="preview-icon">
                <div><b id="res-name"></b><br><small id="res-pkg" style="color:#8e8e93"></small></div>
            </div>
            <textarea id="app-intro" placeholder="好东西要大家一起分享，写点介绍吧..."></textarea>
            <div id="status-log">初始化中...</div>
            <button class="btn-post" id="submitBtn" disabled onclick="finalSubmit()">同步中...</button>
        </div>
    </div>

    <div id="picker">
        <div class="p-header">
            <div class="search-box"><input type="text" id="searchInput" placeholder="搜索..." oninput="searchApp(this.value)"></div>
            <div onclick="closePicker()" style="color:var(--ios-blue); margin-left:12px">关闭</div>
        </div>
        <div id="app-list"></div>
    </div>

    <script>
        let allApps = [];
        let selectedApp = null;

        function openPicker() {
            document.getElementById('picker').style.display = 'flex';
            if (allApps.length === 0) scanApps();
        }
        function closePicker() { document.getElementById('picker').style.display = 'none'; }

        function scanApps() {
            if (!window.plus) return;
            const main = plus.android.runtimeMainActivity();
            const pm = main.getPackageManager();
            const list = plus.android.invoke(pm, "getInstalledPackages", 0);
            const count = plus.android.invoke(list, "size");
            allApps = [];
            for (let i = 0; i < count; i++) {
                const pkg = plus.android.invoke(list, "get", i);
                const ai = plus.android.getAttribute(pkg, "applicationInfo");
                if ((plus.android.getAttribute(ai, "flags") & 1) !== 0) continue; 
                allApps.push({
                    name: plus.android.invoke(ai, "loadLabel", pm).toString(),
                    pkg: plus.android.getAttribute(pkg, "packageName"),
                    path: plus.android.getAttribute(ai, "publicSourceDir"),
                    ver: plus.android.getAttribute(pkg, "versionName")
                });
            }
            render(allApps);
        }

        function render(data) {
            document.getElementById('app-list').innerHTML = data.map((app, i) => `
                <div class="app-item" onclick="pickApp(${i})">
                    <div class="app-icon-placeholder">📦</div>
                    <div style="flex:1"><b>${app.name}</b><br><small style="color:#999">${app.pkg}</small></div>
                </div>
            `).join('');
        }

        // ⭐ 物理级解决方案：存为临时文件 ⭐
        function saveIconToFile(packageName, callback) {
            try {
                const main = plus.android.runtimeMainActivity();
                const pm = main.getPackageManager();
                const ai = pm.getApplicationInfo(packageName, 0);
                const drawable = ai.loadIcon(pm);

                plus.android.importClass("android.graphics.Bitmap");
                plus.android.importClass("android.graphics.Canvas");
                plus.android.importClass("java.io.FileOutputStream");
                plus.android.importClass("java.io.File");

                const width = Math.max(drawable.getIntrinsicWidth(), 144);
                const height = Math.max(drawable.getIntrinsicHeight(), 144);
                const bitmap = window.android.graphics.Bitmap.createBitmap(width, height, window.android.graphics.Bitmap.Config.ARGB_8888);
                const canvas = new window.android.graphics.Canvas(bitmap);
                drawable.setBounds(0, 0, width, height);
                drawable.draw(canvas);

                // 保存到 HBuilder 临时目录
                const fileName = "_doc/temp_icon_" + packageName + ".png";
                const fullPath = plus.io.convertLocalFileSystemURL(fileName);
                const file = new window.java.io.File(fullPath);
                const out = new window.java.io.FileOutputStream(file);
                
                bitmap.compress(window.android.graphics.Bitmap.CompressFormat.PNG, 100, out);
                out.flush();
                out.close();
                bitmap.recycle();

                // 返回本地路径供 HTML 使用
                callback(fileName); 
            } catch (e) {
                callback("");
            }
        }

        function pickApp(index) {
            selectedApp = allApps[index];
            closePicker();
            document.getElementById('entry-step').style.display = 'none';
            document.getElementById('detail-step').style.display = 'block';
            document.getElementById('res-name').innerText = selectedApp.name;
            document.getElementById('res-pkg').innerText = selectedApp.pkg;
            
            document.getElementById('status-log').innerText = "读取应用图标...";

            saveIconToFile(selectedApp.pkg, (localPath) => {
                if(localPath) {
                    // 1. 设置预览图
                    document.getElementById('res-icon').src = localPath + "?" + new Date().getTime();
                    // 2. 将本地图片转为最终上传需要的 Base64
                    const reader = new plus.io.FileReader();
                    reader.onloadend = function(e) {
                        selectedApp.iconBase64 = e.target.result;
                        startUploadFlow();
                    };
                    plus.io.resolveLocalFileSystemURL(localPath, (entry) => {
                        entry.file((file) => { reader.readAsDataURL(file); });
                    });
                } else {
                    document.getElementById('status-log').innerText = "图标读取失败";
                    startUploadFlow();
                }
            });
        }

        function startUploadFlow() {
            const log = document.getElementById('status-log');
            const btn = document.getElementById('submitBtn');
            log.innerText = "同步 APK 文件中...";
            
            const task = plus.uploader.createUpload("https://apirank.qujiaweb.top/?mode=upload_meituan", { method: "POST" }, (t, status) => {
                if (status == 200) {
                    selectedApp.remoteUrl = JSON.parse(t.responseText).full_url;
                    log.innerHTML = `<span style="color:#4CD964">✅ 准备就绪</span>`;
                    btn.disabled = false;
                    btn.innerText = "立即发布";
                }
            });
            task.addFile(selectedApp.path, { key: "file" });
            task.start();
        }

        async function finalSubmit() {
            const mail = localStorage.getItem('usermail') || "";
            const postData = {
                name: selectedApp.name,
                link: selectedApp.remoteUrl,
                icon: selectedApp.iconBase64, // 最终提交转换后的Base64
                intro: document.getElementById('app-intro').value,
                package_name: selectedApp.pkg,
                version: selectedApp.ver
            };
            const res = await fetch(`https://apirank.qujiaweb.top/?mode=add_app&mail=${mail}`, {
                method: 'POST',
                body: JSON.stringify(postData)
            });
            if ((await res.json()).code === 200) {
                alert("发布成功");
                plus.webview.currentWebview().close();
            }
        }
    </script>
</body>
</html>
