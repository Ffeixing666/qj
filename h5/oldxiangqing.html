
<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
* {
-webkit-user-select: none;

box-sizing: border-box;

}
body {
margin: 0;
padding: 0;

.nav-bar {

.app-header {
padding: 64px 20px 24px;

}
.app-icon {
float: left;

height: 100px;

.app-package {

}
.info-grid {
overflow-x: auto;

}
.info-grid::-webkit-scrollbar { display: none; }
.info-item {

}
.info-item:after {

.section {

.section-title {

.screenshot-item:last-child { margin-right: 0; }
.description {
font-size: 15px;
color: #3A3A3C;

.comment-container { display: block; }
.comment-card {
background: #F9F9FB;
border-radius: 15px;
padding: 16px;

color: #3A3A3C;

bottom: 0;
width: 100%;
background: rgba(255, 255, 255, 0.95);
padding: 10px 16px;

}
.btn-icon-left {
position: absolute;
left: 16px;
top: 10px;

background: #F2F2F7;

.btn-icon-right {

text-align: center;

.btn-icon-inner1 { display: block; font-size: 18px; margin-top: 5px; }

right: 70px;

height: 44px;
background: #007AFF;

font-size: 17px;
font-weight: bold;

}
.get-btn-full {

height: 44px;
background: #007AFF;

.download-progress-modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.5);

}
.progress-container {
position: absolute;
top: 50%;
left: 50%;
width: 85%;
max-width: 400px;
-webkit-transform: translate(-50%, -50%);
background: white;
border-radius: 20px;
padding: 30px;
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
box-sizing: border-box;
}
.progress-title {
font-size: 18px;
font-weight: bold;
text-align: center;
margin-bottom: 20px;
color: #000000;
}
.progress-bar {
width: 100%;
height: 8px;
background: #F2F2F7;
border-radius: 4px;
overflow: hidden;
margin-bottom: 15px;
}
.progress-fill {
height: 100%;
background: #007AFF;
border-radius: 4px;
width: 0%;
-webkit-transition: width 0.3s;
}
.progress-text {
font-size: 14px;
color: #8E8E93;
text-align: center;
margin-bottom: 20px;
}
.progress-cancel {
width: 100%;
height: 44px;
background: #F2F2F7;
border: none;
border-radius: 12px;
font-size: 16px;
font-weight: bold;
color: #000000;
-webkit-appearance: none;
}
.modal-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.4);
display: none;
z-index: 2000;
}
.modal-sheet {
position: absolute;
bottom: 0;
left: 0;
width: 100%;
background: white;
border-radius: 20px 20px 0 0;
padding: 20px;
box-sizing: border-box;
-webkit-transform: translateY(100%);
-webkit-transition: -webkit-transform 0.3s;
}
.modal-sheet.show { -webkit-transform: translateY(0); }
.modal-title { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 20px; }
.coin-options { overflow: hidden; margin: 0 -10px; }
.coin-opt {
float: left;
width: 50%;
padding: 0 10px;
box-sizing: border-box;
}
.coin-opt-inner {
padding: 16px;
border: 2px solid #F2F2F7;
border-radius: 15px;
text-align: center;
}
.coin-num { font-size: 24px; font-weight: bold; color: #007AFF; display: block; }
.coin-label { font-size: 13px; color: #8E8E93; }
.star-rating { text-align: center; margin: 20px 0; }
.star-rating span { font-size: 24px; color: #D1D1D6; margin: 0 4px; }
.star-rating span.active { color: #FF9500; }
.comment-input {
width: 100%;
height: 100px;
border: 1px solid #F2F2F7;
border-radius: 12px;
padding: 12px;
font-size: 15px;
box-sizing: border-box;
margin-bottom: 20px;
font-family: inherit;
-webkit-appearance: none;
}
.upload-grid { overflow: hidden; margin-bottom: 20px; margin-right: -10px; }
.upload-item {
float: left;
width: 25%;
padding-right: 10px;
margin-bottom: 10px;
box-sizing: border-box;
}
.upload-item-inner {
width: 100%;
height: 0;
padding-bottom: 100%;
background: #F2F2F7;
border-radius: 10px;
position: relative;
background-size: cover;
background-position: center;
}
.upload-add-inner {
border: 2px dashed #D1D1D6;
background: transparent;
text-align: center;

.upload-add-text {

top: 50%;

}
.upload-del {

top: 4px;
right: 4px;
width: 20px;
height: 20px;

}
.reply-card {
background: #F5F5F7;
border-radius: 12px;
padding: 12px;
margin-bottom: 8px;
border: 1px solid rgba(0,0,0,0.03);
}
</style>
</head>
<body>

</div>

</div>

</div>

<script>
var screenshotUrls = [];
var isSaving = false;
var pageActive = true;
var currentDownloadTask = null;
var currentAppInfo = null;
var currentRating = 0;
var uploadedImages = [];
var replyImages = [];
var currentReplyTarget = null;
function cancelBubble(e) {
if (!e) e = window.event;
if (e.stopPropagation) e.stopPropagation();
else e.cancelBubble = true;
}
function ajax(opts, cb) {
var xhr = new XMLHttpRequest();
xhr.open(opts.method || 'GET', opts.url, true);
if (opts.headers) {
for (var k in opts.headers) {
if (opts.headers.hasOwnProperty(k)) {
xhr.setRequestHeader(k, opts.headers[k]);
}
}
}
xhr.onreadystatechange = function() {
if (xhr.readyState === 4) {
if (xhr.status >= 200 && xhr.status < 300) {
try {
var json = JSON.parse(xhr.responseText);
cb(null, json);
} catch(e) {
cb(e, null);
}
} else {
cb(new Error(xhr.status), null);
}
}
};
xhr.send(opts.body || null);
}
function getUrlParam(name) {
var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
var r = window.location.search.substr(1).match(reg);
if (r != null) return decodeURIComponent(r[2]);
return null;
}
function handleBack() {
pageActive = false;
if (window.plus) {
var webview = plus.webview.currentWebview();
webview.back();
setTimeout(function() {
webview.canBack(function(e) {
if (!e.canBack) webview.close('auto');
});
}, 100);
} else {
window.history.back();
}
}
function handlePackageClick() {
if (!pageActive) return;
var pkgElem = document.getElementById('appPackage');
if (!pkgElem) return;
var pkgName = pkgElem.innerText || pkgElem.textContent;
if (!pkgName || pkgName === '加载中...') return;
var url = 'oldmoreapp.html?baoming=' + encodeURIComponent(pkgName);
if (window.plus) {
var ws = plus.webview.create(url, url, {backbuttonMaximize: false});
ws.show('pop-in', 300);
} else {
window.location.href = url;
}
}
function toggleCollect() {
if (!pageActive) return;
var icon = document.getElementById('collectIcon');
var appId = getUrlParam('id');
if (icon.innerText === '☆' || icon.textContent === '☆') {
icon.innerText = '★';
icon.style.color = '#FF9500';
addToCollection(appId);
showToast('收藏成功');
} else {
icon.innerText = '☆';
icon.style.color = '#007AFF';
removeFromCollection(appId);
showToast('取消收藏');
}
}
function addToCollection(appId) {
try {
var colStr = localStorage.getItem('appCollection') || '[]';
var collection = JSON.parse(colStr);
var exists = false;
for(var i=0; i<collection.length; i++){
if(collection[i].id === appId) { exists = true; break; }
}
if (!exists && currentAppInfo) {
collection.push({
id: appId,
name: currentAppInfo['名称'] || '',
icon: currentAppInfo['图标'] || '',
description: currentAppInfo['简介'] || '',
timestamp: new Date().getTime()
});
localStorage.setItem('appCollection', JSON.stringify(collection));
}
} catch (e) {}
}
function removeFromCollection(appId) {
try {
var colStr = localStorage.getItem('appCollection') || '[]';
var collection = JSON.parse(colStr);
var newCol = [];
for(var i=0; i<collection.length; i++){
if(collection[i].id !== appId) newCol.push(collection[i]);
}
localStorage.setItem('appCollection', JSON.stringify(newCol));
} catch (e) {}
}
function isCollected(appId) {
try {
var colStr = localStorage.getItem('appCollection') || '[]';
var collection = JSON.parse(colStr);
for(var i=0; i<collection.length; i++){
if(collection[i].id === appId) return true;
}
} catch (e) {}
return false;
}
function updateCollectButton() {
if (!pageActive) return;
var appId = getUrlParam('id');
var icon = document.getElementById('collectIcon');
if (isCollected(appId)) {
icon.innerText = '★';
icon.style.color = '#FF9500';
} else {
icon.innerText = '☆';
icon.style.color = '#007AFF';
}
}
function openCoinModal() {
if (!pageActive) return;
var modal = document.getElementById('coinModal');
var sheet = modal.querySelector('.modal-sheet');
modal.style.display = 'block';
setTimeout(function() {
if (pageActive && sheet) sheet.className = 'modal-sheet show';
}, 10);
}
function closeCoinModal() {
if (!pageActive) return;
var modal = document.getElementById('coinModal');
var sheet = modal.querySelector('.modal-sheet');
if (sheet) sheet.className = 'modal-sheet';
setTimeout(function() {
if (pageActive && modal) modal.style.display = 'none';
}, 300);
}
function doCoin(num) {
if (!pageActive) return;
var appId = getUrlParam('id');
var userMail = localStorage.getItem('usermail');
if (!userMail) { showToast('请先登录'); closeCoinModal(); return; }
if (!currentAppInfo) { showToast('应用信息加载中'); closeCoinModal(); return; }
if (currentAppInfo['邮箱'] === userMail) { showToast('不能给自己的应用投币'); closeCoinModal(); return; }
var userCoin = parseInt(localStorage.getItem('userpoints') || '0', 10);
if (userCoin < num) { showToast('积分不足'); closeCoinModal(); return; }
showLoading();
var mode = num === 1 ? 'coin_1' : 'coin_2';
ajax({
method: 'POST',
url: 'https://apirank.qujiaweb.top/?mode=' + mode,
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({mail: userMail, appid: appId})
}, function(err, data) {
if (!pageActive) return;
hideLoading();
closeCoinModal();
if (!err && data && data.code === 200) {
showToast('投币成功！');
localStorage.setItem('userpoints', (userCoin - num).toString());
var appCoin = parseInt(currentAppInfo['积分'] || '0', 10) + num;
currentAppInfo['积分'] = appCoin;
updateCoinDisplay();
} else {
showToast((data && data.msg) ? data.msg : '投币失败');
}
});
}
function updateCoinDisplay() {
if (!pageActive) return;
var coinBtnText = document.getElementById('coinText');
if (coinBtnText && currentAppInfo) {
var currentAppCoin = parseInt(currentAppInfo['积分'] || 0, 10);
coinBtnText.innerText = currentAppCoin > 99 ? '99币+' : currentAppCoin + '币';
}
}
function showLoading() {
if (window.plus) plus.nativeUI.showWaiting('加载中...');
else document.body.style.opacity = '0.7';
}
function hideLoading() {
if (window.plus) plus.nativeUI.closeWaiting();
else document.body.style.opacity = '1';
}
function showToast(message) {
if (!pageActive) return;
if (window.plus && plus.nativeUI) plus.nativeUI.toast(message);
else alert(message);
}

function fromCodePoint(codePoint) {
if (codePoint > 0xFFFF) {

}
return String.fromCharCode(codePoint);
}

}
function emojiToHtmlEntity(str) {
var result = '';
for (var i = 0; i < str.length; i++) {
var code = str.charCodeAt(i);
if (code >= 0xD800 && code <= 0xDBFF) {
var lowCode = str.charCodeAt(i + 1);
if (lowCode >= 0xDC00 && lowCode <= 0xDFFF) {
var codePoint = ((code - 0xD800) * 0x400) + (lowCode - 0xDC00) + 0x10000;
result += '&#' + codePoint + ';';
i++;
continue;
}
}
result += str.charAt(i);
}
return result;
}

if (mx > 10 || my > 10) clearTimeout(pressTimer);

elem.ontouchend = function(e) { clearTimeout(pressTimer); };
elem.ontouchcancel = function(e) { clearTimeout(pressTimer); };
}
function showActionMenu(elem, comment) {
if (!comment || !comment['时间']) return;
var userMail = localStorage.getItem('usermail');
var isOwn = String(comment['邮箱']) === String(userMail);
var oldMenu = document.getElementById('actionMenuBox');
if (oldMenu) oldMenu.parentNode.removeChild(oldMenu);
var menu = document.createElement('div');
menu.id = 'actionMenuBox';
menu.style.cssText = "position: fixed; top: 50%; left: 50%; margin-top: -60px; margin-left: -90px; width: 180px; background: rgba(0, 0, 0, 0.9); color: white; border-radius: 12px; padding: 16px 0; z-index: 9999; font-size: 16px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4); text-align: center;";
var html = '<div id="miReply" style="padding: 14px 0;">回复</div>';
if (isOwn) {
html += '<div id="miDel" style="padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.1);">删除</div>';
html += '<div id="miCopy" style="padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.1);">复制</div>';
} else {
html += '<div id="miCopy" style="padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.1);">复制</div>';
}
menu.innerHTML = html;
document.body.appendChild(menu);
var mReply = document.getElementById('miReply');
var mDel = document.getElementById('miDel');
var mCopy = document.getElementById('miCopy');
if (mReply) mReply.onclick = function() { handleReplyComment(comment); };
if (mDel) mDel.onclick = function() { handleDeleteComment(comment['时间']); };
if (mCopy) mCopy.onclick = function() { handleCopyComment(comment); };
setTimeout(function() {
document.onclick = function closeMenu(e) {
var target = e.target || e.srcElement;
if (!getClosest(target, 'action-menu') && target !== elem && !getClosest(target, 'comment-card') && !getClosest(target, 'reply-card')) {
if (menu.parentNode) menu.parentNode.removeChild(menu);
document.onclick = null;
}
};
}, 100);
}
function handleCopyComment(comment) {
var pCon = comment['内容'] || '';
pCon = pCon.replace(/&#(\d+);/g, function(m, c) { return fromCodePoint(parseInt(c, 10)); });
copyToClipboardWithFallback(pCon, 'comment');
var m = document.getElementById('actionMenuBox');
if (m && m.parentNode) m.parentNode.removeChild(m);
}
function handleReplyComment(comment) {
if (!comment) return;
currentReplyTarget = comment;
openReplyModal(comment);
var m = document.getElementById('actionMenuBox');
if (m && m.parentNode) m.parentNode.removeChild(m);
}
function handleDeleteComment(commentId) {
var userMail = localStorage.getItem('usermail');
if (!userMail) { showToast('请先登录'); return; }
if (window.plus) {
plus.nativeUI.confirm('确定要删除这条评论吗？', function(res) {
if (res.index === 0) deleteComment(commentId, userMail);
}, '提示', ['确定', '取消']);
} else {
if (confirm('确定要删除这条评论吗？')) deleteComment(commentId, userMail);
}
var m = document.getElementById('actionMenuBox');
if (m && m.parentNode) m.parentNode.removeChild(m);
}
function deleteComment(commentId, userMail) {
if (window.plus) plus.nativeUI.showWaiting('删除中...');
ajax({
method: 'POST',
url: 'https://apirank.qujiaweb.top/?mode=delete_comment&mail=' + userMail,
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ comment_id: commentId, mail: userMail })
}, function(err, res) {
if (window.plus) plus.nativeUI.closeWaiting();
if (!err && res && res.code === 200) {
showToast('删除成功');
var appId = getUrlParam('id');
getAppComments(appId);
} else { showToast('删除失败'); }
});
}
function openReplyModal(comment) {
var m = document.getElementById('replyModal');
var s = m.querySelector('.modal-sheet');
var rt = document.getElementById('replyTitle');
if (rt && comment['用户']) rt.innerText = '回复 ' + comment['用户'];
document.getElementById('replyContent').value = '';
replyImages = [];
renderReplyUploadGrid();
m.style.display = 'block';
setTimeout(function() { s.className = 'modal-sheet show'; }, 10);
}
function closeReplyModal() {
var m = document.getElementById('replyModal');
var s = m.querySelector('.modal-sheet');
s.className = 'modal-sheet';
setTimeout(function() { m.style.display = 'none'; }, 300);
}
function triggerReplyUpload() { document.getElementById('replyFileInput').click(); }
function handleReplyFileSelect(event) {
var file = event.target.files[0];
if (!file) return;
if (window.plus) plus.nativeUI.showWaiting('上传中...');
var fd = new FormData();
fd.append('file', file);
ajax({
method: 'POST',
url: 'https://apirank.qujiaweb.top/?mode=upload_meituan',
body: fd
}, function(err, res) {
if (window.plus) plus.nativeUI.closeWaiting();
event.target.value = '';
if (!err && res && res.full_url) {
replyImages.push(res.full_url);
renderReplyUploadGrid();
} else { showToast('上传失败'); }
});
}
function renderReplyUploadGrid() {
var grid = document.getElementById('replyImageGrid');
grid.innerHTML = '';
for (var i=0; i<replyImages.length; i++) {
var item = document.createElement('div');
item.className = 'upload-item';
item.innerHTML = '<div class="upload-item-inner" style="background-image:url(' + replyImages[i] + ')"><div class="upload-del" onclick="removeReplyImage(' + i + ')">×</div></div>';
grid.appendChild(item);
}
var addBtn = document.createElement('div');
addBtn.className = 'upload-item';
addBtn.onclick = triggerReplyUpload;
addBtn.innerHTML = '<div class="upload-item-inner upload-add-inner"><div class="upload-add-text">+</div></div>';
grid.appendChild(addBtn);
}
function removeReplyImage(idx) { replyImages.splice(idx, 1); renderReplyUploadGrid(); }
function submitReply() {
var content = document.getElementById('replyContent').value;
content = content.replace(/^\s+|\s+$/g, '');
if (!content) { showToast('请输入回复内容'); return; }
if (!currentReplyTarget) return;
var appId = getUrlParam('id');
var userMail = localStorage.getItem('usermail');
if (!appId || !userMail) return;
var processed = emojiToHtmlEntity(content);
if (window.plus) plus.nativeUI.showWaiting('提交中...');
ajax({
method: 'POST',
url: 'https://apirank.qujiaweb.top/?mode=submit_reply&mail=' + userMail,
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({
appid: appId,
content: processed,
images: replyImages.join(','),
mail: userMail,
target_user: currentReplyTarget['用户'],
target_mail: currentReplyTarget['邮箱'],
parentid: currentReplyTarget.createdAt,
rootid: currentReplyTarget.rootid || currentReplyTarget.createdAt
})
}, function(err, res) {
if (window.plus) plus.nativeUI.closeWaiting();
if (!err && res && res.code === 200) {
showToast('回复成功');
closeReplyModal();
replyImages = [];
currentReplyTarget = null;
getAppComments(appId);
} else { showToast('回复失败'); }
});
}
window.onload = function() {
setTimeout(function() { if (pageActive) getAppDetail(); }, 200);
};
document.addEventListener('plusready', function() {
plus.key.addEventListener('backbutton', handleBack);
}, false);
</script>
</body>
</html>
