<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注册（旧兼容）</title>
    <script src="https://static2.pgaot.com/Assets/js/jquery-2.2.4.min.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: rgba(0,0,0,0); 
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        body { 
            background-color: #F2F2F7; 
            font-family: Helvetica, STHeiti, "Microsoft YaHei", sans-serif; 
            width: 100%;
        }

        .nav-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 44px;
            background-color: #F2F2F7;
            border-bottom: 1px solid #C8C7CC;
            z-index: 100;
        }
        .back-btn {
            position: absolute;
            left: 10px;
            top: 6px;
            width: 32px;
            height: 32px;
            background-color: #E5E5EA;
            border-radius: 16px;
            text-align: center;
            line-height: 30px;
            cursor: pointer;
        }
        .back-btn b {
            color: #333;
            font-size: 18px;
        }

        .container {
            padding: 64px 15px 20px 15px;
            text-align: center;
        }

        .card { 
            display: inline-block;
            width: 100%; 
            max-width: 400px;
            background-color: #FFFFFF; 
            border-radius: 14px; 
            padding: 25px 20px; 
            border: 1px solid #D1D1D6;
            text-align: left;
        }

        .title { 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            color: #000000; 
        }

        .step { display: none; }
        .active { display: block; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #C8C7CC; 
            border-radius: 8px; 
            background-color: #F2F2F7; 
            font-size: 16px; 
            -webkit-user-select: text; 
            display: block;
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            background-color: #007AFF; 
            color: #ffffff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 17px;
            margin-top: 10px;
            display: block;
            text-align: center;
            cursor: pointer;
        }
        .btn-disabled { background-color: #D1D1D6 !important; }

        .tips-trigger {
            text-align: center;
            font-size: 13px;
            color: #007AFF;
            margin-top: 15px;
            font-weight: bold;
        }
        .help-panel {
            display: none;
            background-color: #F9F9FB;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.5;
            color: #666;
            border: 1px solid #EEE;
        }

        #toast { 
            position: fixed; 
            top: 30%; 
            left: 50%;
            width: 200px;
            margin-left: -100px;
            background-color: rgba(0,0,0,0.8); 
            color: #ffffff; 
            padding: 12px; 
            border-radius: 10px; 
            display: none; 
            font-size: 14px; 
            z-index: 9999; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="back-btn" onclick="goBack()">
        <b>&lt;</b>
    </div>
</div>

<div id="toast"></div>

<div class="container">
    <div class="card">
        <div class="title">Welcome</div>
        
        <div id="s1" class="step active">
            <input type="text" id="email" placeholder="输入邮箱地址">
            <div id="sendBtn" class="btn" onclick="goStep1()">发送验证码</div>
        </div>

        <div id="s2" class="step">
            <p style="text-align:center; font-size:14px; color:#333; margin-bottom: 10px;">验证码已发送</p>
            <input type="text" id="vcode" placeholder="4位验证码">
            <div class="btn" onclick="goStep2()">校验验证码</div>
            
            <div class="tips-trigger" onclick="$('#help').toggle()">收不到验证码？</div>
            <div id="help" class="help-panel">
                <p>1. QQ邮箱请使用QQ邮箱APP或网页版查收。</p>
                <p>2. 同一设备仅支持注册一个账号。</p>
                <p>3. 如有疑问请联系：110045310@qq.com</p>
            </div>
        </div>

        <div id="s3" class="step">
            <input type="text" id="nick" placeholder="用户昵称">
            <input type="password" id="p1" placeholder="设置密码">
            <input type="password" id="p2" placeholder="确认密码">
            <div id="regBtn" class="btn" onclick="goStep3()">完成注册</div>
        </div>
    </div>
</div>

<script>
    var API = 'https://apirank.qujiaweb.top/';
    var cache = { email: '', code: '' };
    var countdownTimer = null;

    function toast(m) { 
        $('#toast').text(m).show();
        setTimeout(function(){ $('#toast').hide(); }, 2000);
    }

    function showStep(n) { 
        $('.step').hide().removeClass('active'); 
        $('#s' + n).show().addClass('active'); 
    }

    function goBack() {
        if ($('#s2').is(':visible')) {
            showStep(1);
        } else if ($('#s3').is(':visible')) {
            showStep(2);
        } else {
            if(window.plus) {
                plus.webview.currentWebview().close('pop-out', 300);
            } else {
                history.back();
            }
        }
    }

    function initSendBtn() {
        var lastTime = localStorage.getItem('last_vcode_time');
        if (lastTime) {
            var now = new Date().getTime();
            var diff = Math.floor((now - lastTime) / 1000);
            if (diff < 300) { startCountdown(300 - diff); }
        }
    }

    function startCountdown(seconds) {
        var $btn = $('#sendBtn');
        $btn.addClass('btn-disabled');
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(function() {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdownTimer);
                $btn.removeClass('btn-disabled').text('发送验证码');
                localStorage.removeItem('last_vcode_time');
            } else {
                $btn.text('重新发送 (' + seconds + 's)');
            }
        }, 1000);
    }

    $(document).ready(function(){
        initSendBtn();
    });

    function goStep1() {
        if($('#sendBtn').hasClass('btn-disabled')) return;
        var email = $('#email').val();
        if(!email || email.indexOf('@') === -1) return toast('请输入有效邮箱');

        var $btn = $('#sendBtn');
        $btn.addClass('btn-disabled').text('正在发送...');
        localStorage.setItem('last_vcode_time', new Date().getTime());
        startCountdown(300);
        
        var generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
        cache.code = generatedCode;
        cache.email = email;

        toast('正在发送验证码...');
        
        $.ajax({
            url: API + '?mode=send_mail',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ to: email, code: generatedCode }),
            dataType: 'json',
            success: function(mail) {
                if(mail.code === 200) { 
                    showStep(2); 
                    toast('验证码已发送'); 
                } else { 
                    toast('发送失败：' + (mail.msg || '服务商拦截'));
                }
            },
            error: function() {
                toast('网络繁忙，请稍后再试');
            }
        });
    }

    function goStep2() {
        var inputCode = $('#vcode').val();
        if(inputCode && inputCode.toString() === cache.code.toString()) {
            showStep(3);
        } else {
            toast('验证码错误');
        }
    }

    function hasSpecialChars(password) { 
        var reg = /^[a-zA-Z0-9_]+$/;
        return !reg.test(password); 
    }

    function goStep3() {
        var nick = $('#nick').val();
        var p1 = $('#p1').val();
        var p2 = $('#p2').val();

        if(!nick) return toast('请输入昵称');
        if(p1.length < 6) return toast('密码至少6位');
        if(p1 !== p2) return toast('两次输入的密码不一致');
        if(hasSpecialChars(p1)) return toast('密码请勿包含特殊字符');

        var $btn = $('#regBtn');
        if($btn.hasClass('btn-disabled')) return;
        $btn.addClass('btn-disabled').text('提交中...');

        toast('正在完成注册...');

        $.ajax({
            url: API + '?mode=register',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ 
                email: cache.email, 
                password: p1, 
                nickname: nick 
            }),
            dataType: 'json',
            success: function(res) {
                if(res.code === 200) {
                    toast('注册成功！');
                    setTimeout(function() { location.href = 'oldindex.html'; }, 1500);
                } else {
                    toast('提交失败：' + (res.msg || '接口错误'));
                    $btn.removeClass('btn-disabled').text('完成注册');
                }
            },
            error: function() {
                toast('提交出错，请稍后重试'); 
                $btn.removeClass('btn-disabled').text('完成注册');
            }
        });
    }

    document.addEventListener('plusready', function() {
        plus.key.addEventListener('backbutton', goBack);
    });
    document.addEventListener('plusready', function() {
    // 1. 设置状态栏等常规操作
    updateStatusBarStyle();
    plus.navigator.setFullscreen(false);

    // 2. 针对旧内核，先尝试移除可能存在的旧监听，再重新绑定
    plus.key.removeEventListener('backbutton', function(){}); 
    
    plus.key.addEventListener('backbutton', function() {
        const banModal = document.getElementById('ban-modal');
        
        // 兼容性检查：确保元素存在且能读取样式
        const isModalVisible = banModal && (
            banModal.style.display === 'flex' || 
            window.getComputedStyle(banModal).display === 'flex'
        );

        if (isModalVisible) {
            plus.nativeUI.confirm("确定退出吗？", (e) => {
                // index 0 通常是“确定”
                if (e.index === 0) {
                    plus.runtime.quit();
                }
            }, "提示", ["确定", "取消"]);
        } else {
            // 如果不在特定弹窗状态，建议执行“双击退出”逻辑，这在旧内核上更稳健
            handleExit();
        }
    }, false);
});

// 稳健的退出逻辑：连续按两次返回键才退出，防止低内核误触
let firstBackTime = 0;
function handleExit() {
    let now = Date.now();
    if (now - firstBackTime < 2000) {
        plus.runtime.quit();
    } else {
        firstBackTime = now;
        plus.nativeUI.toast('再按一次退出应用');
    }
}
</script>
</body>
</html>
