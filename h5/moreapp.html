<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>更多版本</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --text-main: #1C1C1E;
            --text-second: #8E8E93;
            --line-color: rgba(0,0,0,0.06);
            /* 高级感配色：由明艳橙色改为轻盈的系统灰或淡蓝 */
            --badge-bg: #F0F0F4; 
            --badge-text: #636366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-main);
            overflow-x: hidden;
            /* 隐藏全局滚动条 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { display: none; }

        /* --- 高级毛玻璃导航栏 --- */
        header {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 0.5px solid var(--line-color);
        }

        .back-btn {
            display: flex;
            align-items: center;
            color: var(--ios-blue);
            font-size: 17px;
            font-weight: 400;
            cursor: pointer;
        }

        .back-icon {
            width: 12px;
            height: 12px;
            border-left: 2px solid var(--ios-blue);
            border-bottom: 2px solid var(--ios-blue);
            transform: rotate(45deg);
            margin-right: 5px;
        }

        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* --- 列表容器 --- */
        .main-content {
            margin-top: 52px;
            padding: 16px;
        }

        .item-card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            /* 极轻微的阴影或仅用边框 */
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        
        .item-card:active { 
            transform: scale(0.97);
            background: #EBEBEB;
        }

        .item-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            flex-shrink: 0;
            background-color: #F8F8F8;
            background-size: cover;
            background-position: center;
            /* 给图标加一个极细的内边框防白底 */
            box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        .item-info { 
            flex: 1; 
            min-width: 0; 
        }

        .item-title { 
            font-size: 16px; 
            font-weight: 600; 
            margin-bottom: 2px; 
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-desc { 
            font-size: 13px; 
            color: var(--text-second); 
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 1;
            overflow: hidden;
        }

        /* --- 重新设计的版本色块 (高级iOS感) --- */
        .version-tag {
            width: 52px; /* 固定宽度，适配4-5字符 */
            height: 24px;
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: 11px;
            font-weight: 600; /* Medium加粗 */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
            letter-spacing: -0.2px;
            /* 移除AI感的阴影，改为极其含蓄的边缘感 */
            border: 0.5px solid rgba(0,0,0,0.03);
        }

        /* 针对 App Store 风格的选中反馈（可选） */
        .item-card:hover .version-tag {
            background: #E2E2E7;
        }

        /* 加载动画 */
        .loader {
            display: flex;
            justify-content: center;
            padding-top: 100px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(0,0,0,0.05);
            border-top-color: var(--ios-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-hint {
            text-align: center;
            padding-top: 100px;
            color: var(--text-second);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="goBack()">
            <div class="back-icon"></div>
            <span>返回</span>
        </div>
        <div class="header-title">更多版本</div>
        <div style="width: 48px;"></div> </header>

    <main class="main-content">
        <div id="listContainer"></div>
    </main>

    <script>
        // --- 路由与返回逻辑 ---
        function goBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('pop-out', 300);
            } else {
                history.back();
            }
        }

        document.addEventListener('plusready', function() {
            plus.key.addEventListener('backbutton', goBack);
        });

        // 获取参数
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        // 数据加载
        async function loadData() {
            const mail = localStorage.getItem('usermail');
            const baoming = getParam('baoming');
            const container = document.getElementById('listContainer');

            if (!mail || !baoming) return;

            container.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

            try {
                const api = `https://apirank.qujiaweb.top/?mode=get_more_apps&mail=${encodeURIComponent(mail)}&baoming=${encodeURIComponent(baoming)}`;
                const response = await fetch(api);
                const data = await response.json();

                if (data.code === 200 && data.fields) {
                    renderList(data.fields);
                } else {
                    container.innerHTML = '<div class="empty-hint">暂无其他版本</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="empty-hint">网络请求失败</div>';
            }
        }

        // 渲染列表
        function renderList(apps) {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => {
                    const url = `xiangqing.html?id=${app.id}`;
                    if (window.plus) {
                        plus.webview.create(url, url, {backbuttonMaximize: false}).show('pop-in', 300);
                    } else {
                        window.location.href = url;
                    }
                };

                // 处理图标
                const iconUrl = app.图标 || '';
                
                // 格式化版本号：控制在4-5字符左右
                let v = app.版本 ? app.版本.toString() : '1.0';
                if (v.length > 5) v = v.substring(0, 5);

                card.innerHTML = `
                    <div class="item-icon" style="background-image: url('${iconUrl}')"></div>
                    <div class="item-info">
                        <div class="item-title">${decodeEntities(app.名称 || '未命名')}</div>
                        <div class="item-desc">${decodeEntities(app.简介 || '暂无说明')}</div>
                    </div>
                    <div class="version-tag">${v}</div>
                `;
                container.appendChild(card);
            });
        }

        // HTML实体转义（处理Emoji等）
        function decodeEntities(str) {
            if (!str) return '';
            return str.replace(/&#(\d+);/g, (match, dec) => String.fromCodePoint(dec));
        }

        window.onload = loadData;
    </script>
</body>
</html>
