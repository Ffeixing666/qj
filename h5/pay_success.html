<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>支付成功</title>
    <style>
        /* 极简样式：仅用于移除默认边距并将文字居中于视口，无任何额外视觉元素或内容 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;      /* 纯白背景，符合“空白”视觉 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            font-size: 1.25rem;
            color: #1e1e1e;
            line-height: 1.5;
            /* 保证没有任何装饰或额外生成内容 */
        }
        /* 确保没有任何伪元素添加文本或图形 */
        body::before,
        body::after {
            display: none;
            content: none;
        }
    </style>
</head>
<body>
    <script> // --- 核心功能：返回键万能段 ---
        document.addEventListener('plusready', function() {
            var webview = plus.webview.currentWebview();
            plus.key.addEventListener('backbutton', function() {
                webview.canBack(function(e) {
                    if (e.canBack) {
                        webview.back();
                    } else {
                        // 子页面：直接关闭当前窗口
                        // 此处判断逻辑优化，只要不是首页就直接关闭
                        if (plus.webview.all().length > 1) {
                            webview.close('auto'); 
                        } else {
                            history.back();
                        }
                    }
                });
            });
        });</script>
    支付成功
</body>
</html>
