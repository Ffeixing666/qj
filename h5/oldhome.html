<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页（旧兼容）</title>
    <style>
        * { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: Helvetica, Arial, sans-serif; 
            background-color: #F2F2F7; 
            color: #1C1C1E;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background-color: #F2F2F7; 
            border-bottom: 1px solid #D1D1D6;
            z-index: 1000;
            padding: 0 16px;
            height: 60px;
        }

        .top-row {
            display: -webkit-box;
            -webkit-box-align: center;
            -webkit-box-pack: justify;
            height: 60px;
        }

        .tabs span {
            font-size: 20px;
            font-weight: bold;
            color: #8E8E93;
            margin-right: 16px;
        }
        .tabs span.active { font-size: 24px; color: #1C1C1E; }

        .right-controls { display: -webkit-box; -webkit-box-align: center; }
        
        .search-bar-fake {
            width: 100px; height: 34px;
            background: #E3E3E6;
            border-radius: 10px;
            display: -webkit-box;
            -webkit-box-align: center;
            padding: 0 8px;
            color: #8E8E93;
            font-size: 13px;
            margin-right: 8px;
        }

        .search-icon-img { width: 15px; height: 15px; margin-right: 5px; }

        .msg-box {
            width: 34px; height: 34px;
            background: #E3E3E6;
            border-radius: 10px;
            position: relative;
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: center;
        }

        .unread-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 18px; height: 18px;
            background: #FF3B30; color: white;
            border-radius: 9px; font-size: 11px;
            text-align: center; line-height: 18px;
        }

        #refresh-container { padding-top: 60px; min-height: 100.1vh; }

        .featured-section { padding: 10px 16px; }
        .carousel-container {
            width: 100%; height: 160px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background-color: #E0E0E2;
        }
        .carousel-track {
            width: 200%; height: 100%;
            -webkit-transition: -webkit-transform 0.4s ease-out;
        }
        .carousel-slide {
            width: 50%; height: 100%;
            float: left;
            background-position: center;
            background-size: cover;
        }

        .nav-scroll {
            display: block;
            white-space: nowrap;
            overflow-x: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }
        .nav-item {
            display: inline-block;
            font-size: 15px;
            color: #8E8E93;
            margin-right: 20px;
            font-weight: bold;
        }
        .nav-item.active { color: #007AFF; }

        .app-list { padding: 4px 16px 80px 16px; }
        .app-item {
            background: #FFFFFF;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden; 
        }
        .app-icon {
            width: 60px; height: 60px;
            background-color: #F0f0f2;
            border-radius: 12px;
            float: left;
            margin-right: 12px;
        }
        .app-info { float: left; width: 65%; }
        .app-name { font-size: 16px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-desc { font-size: 12px; color: #8E8E93; margin-top: 4px; height: 32px; overflow: hidden; }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            width: 100%;
            height: 52px;
            background: #FFFFFF;
            border-top: 1px solid #D1D1D6;
            z-index: 1000;
        }
        .bottom-item {
            width: 50%;
            float: left;
            text-align: center;
            padding-top: 6px;
            color: #8E8E93;
            font-size: 10px;
            text-decoration: none;
            cursor: pointer;
        }
        .bottom-item.active { color: #007AFF; }
        .nav-icon-img {
            width: 22px; height: 22px;
            display: block;
            margin: 0 auto 2px;
        }

        .fab {
            position: fixed;
            right: 20px; bottom: 70px;
            width: 46px; height: 46px;
            background: #FFFFFF;
            border: 1px solid #D1D1D6;
            border-radius: 23px;
            text-align: center;
            line-height: 46px;
            font-size: 30px;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .ad-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            z-index: 10001;
        }
        .ad-content { position: relative; width: 260px; margin: 50% auto 0; }
        .ad-content img { width: 100%; border-radius: 20px; }
        .ad-close {
            position: absolute; top: -10px; right: -10px;
            width: 30px; height: 30px; background: #FFF;
            border-radius: 15px; text-align: center; line-height: 30px;
        }

        .loading-spinner {
            width: 24px; height: 24px; border: 3px solid #007AFF;
            border-top-color: transparent; border-radius: 50%;
            -webkit-animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @-webkit-keyframes spin {
            from { -webkit-transform: rotate(0deg); }
            to { -webkit-transform: rotate(360deg); }
        }
        .clearfix:after { content: ""; display: table; clear: both; }
    </style>
</head>
<body>

    <div id="refresh-container">
        <header>
            <div class="top-row">
                <div class="tabs">
                    <span class="tab-item active" onclick="switchTab('app')">应用</span>
                    <span class="tab-item" onclick="switchTab('web')">网页</span>
                </div>
                <div class="right-controls">
                    <div class="search-bar-fake" onclick="openSearchPage()">
                        <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_aS28drljD_1766889872494.png" class="search-icon-img">
                        <span>搜索</span>
                    </div>
                    <div class="msg-box" onclick="openMessagePage()">
                        <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_N7XqHo5QC_1766889837434.png" style="width:20px;height:20px;">
                        <div class="unread-badge" id="unreadBadge" style="display: none;">0</div>
                    </div>
                </div>
            </div>
        </header>

        <main id="app-content">
            <section class="featured-section">
                <div class="carousel-container" id="carousel">
                    <div class="carousel-track clearfix" id="track"></div>
                </div>
            </section>

            <nav class="nav-scroll">
                <span class="nav-item active" onclick="switchCategory('', this)">推荐</span>
                <span class="nav-item" onclick="switchCategory('latest', this)">最新</span>
                <span class="nav-item" onclick="window.location.href='oldrank.html'">排行</span>
                <span class="nav-item" onclick="switchCategory('影视音乐', this)">影视音乐</span>
                <span class="nav-item" onclick="switchCategory('实用工具', this)">实用工具</span>
                <span class="nav-item" onclick="switchCategory('学习必备', this)">学习必备</span>
                <span class="nav-item" onclick="switchCategory('娱乐游戏', this)">娱乐游戏</span>
                <span class="nav-item" onclick="switchCategory('社交生活', this)">社交生活</span>
            </nav>

            <section class="app-list" id="appList"></section>
            <div id="loadMoreTip" style="text-align:center; padding:20px; color:#8E8E93; font-size:12px; display:none;">加载中...</div>
        </main>

        <div id="web-content" style="display:none; text-align:center; padding:50px 0;">
            <h3>卖力开发中</h3>
            <p style="color:#8E8E93; font-size:13px;">正在连接更广阔的世界</p>
        </div>
    </div>

    <div class="fab" onclick="openSharePage()">+</div>

    <nav class="bottom-nav clearfix">
        <div class="bottom-item active">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_W4dgFlZKZZ_1766889744282.png" class="nav-icon-img">
            <span>首页</span>
        </div>
        <div class="bottom-item" onclick="openMePage()">
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_mjBXhTQOaY_1766889744283.png" class="nav-icon-img">
            <span>我的</span>
        </div>
    </nav>

    <div id="adModal" class="ad-modal">
        <div class="ad-content">
            <div class="ad-close" onclick="closeAdModal()">×</div>
            <img src="https://creation.bcmcdn.com/716/appcraft/IMAGE_Y1MRkt7-B_1777691874573.jpeg" onclick="openMall()">
        </div>
    </div>

    <script>
        function ajaxGet(url, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        try { callback(JSON.parse(xhr.responseText)); } catch(e) { callback({code: 500}); }
                    } else { callback({code: xhr.status}); }
                }
            };
            xhr.send();
        }

        var currentFilter = '';
        var currentPage = 1;
        var isLoading = false;
        var slideIndex = 0;

        // 轮播图数据对象（包含跳转逻辑）
        var carouselData = [
            {
                img: 'https://creation.bcmcdn.com/716/appcraft/IMAGE__2anY_mk7_1771559520857.png',
                action: function() {
                    var url = "http://qm.qq.com/cgi-bin/qm/qr?_wv=1027&k=gBER7PtiZVD0cimKXXCGu87ub4okQ8uY&authKey=JqXVtNhWXAcqEXIDqLrxdKu0%2BSQYS5j0l9Rq7dZeZzl7VMD7SFOb%2FEtEqSA0aFg1&noverify=0&group_code=480414235";
                    if (window.plus) { plus.runtime.openURL(url); } else { window.open(url, '_blank'); }
                }
            },
            {
                img: 'https://creation.bcmcdn.com/716/appcraft/IMAGE_N2kJ1Zg64_1772885279386.jpeg',
                action: function() {
                    var url = 'oldactivity.html';
                    if (window.plus) {
                        var ws = plus.webview.create(url, url, { backbuttonMaximize: false });
                        ws.show('pop-in', 300);
                    } else { window.location.href = url; }
                }
            }
        ];

        function getApps(filter, isRefresh) {
            if (isLoading) return;
            var mail = 'guest';
            try { mail = localStorage.getItem('usermail') || 'guest'; } catch(e) {}
            var listDiv = document.getElementById('appList');
            if (isRefresh) {
                listDiv.innerHTML = '<div class="loading-spinner"></div>';
                currentPage = 1;
            }
            isLoading = true;
            var url = "https://apirank.qujiaweb.top/?mode=get_app_list&mail=" + encodeURIComponent(mail) + "&filter=" + encodeURIComponent(filter) + "&page=" + currentPage;
            
            ajaxGet(url, function(res) {
                isLoading = false;
                if (res.code === 200 && res.fields) {
                    if (isRefresh) listDiv.innerHTML = '';
                    renderApps(res.fields);
                } else if (isRefresh) {
                    listDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#8E8E93;">暂无数据</div>';
                }
            });
        }

        function renderApps(apps) {
            var listDiv = document.getElementById('appList');
            for (var i = 0; i < apps.length; i++) {
                var app = apps[i];
                var div = document.createElement('div');
                div.className = 'app-item clearfix';
                div.onclick = (function(id){
                    return function() { window.location.href = 'oldxiangqing.html?id=' + id; }
                })(app.id);
                
                var iconUrl = app.图标 || '';
                div.innerHTML = '<div class="app-icon" style="background:url('+iconUrl+') center/cover"></div>' +
                                '<div class="app-info">' +
                                '<div class="app-name">' + (app.名称 || '未知') + '</div>' +
                                '<div class="app-desc">' + (app.简介 || '暂无简介') + '</div>' +
                                '</div>';
                listDiv.appendChild(div);
            }
        }

        function switchTab(type) {
            var app = document.getElementById('app-content');
            var web = document.getElementById('web-content');
            var items = document.querySelectorAll('.tab-item');
            if (type === 'app') {
                app.style.display = 'block'; web.style.display = 'none';
                items[0].className = 'tab-item active'; items[1].className = 'tab-item';
            } else {
                app.style.display = 'none'; web.style.display = 'block';
                items[1].className = 'tab-item active'; items[0].className = 'tab-item';
            }
        }

        function switchCategory(filter, el) {
            var navs = document.querySelectorAll('.nav-item');
            for(var i=0; i<navs.length; i++) navs[i].className = 'nav-item';
            el.className = 'nav-item active';
            getApps(filter, true);
        }

        // 初始化轮播图并添加点击事件
        function initCarousel() {
            var track = document.getElementById('track');
            var html = '';
            for(var i=0; i < carouselData.length; i++) {
                // 绑定点击索引
                html += '<div class="carousel-slide" style="background-image:url('+carouselData[i].img+')" onclick="handleCarouselClick('+i+')"></div>';
            }
            track.innerHTML = html;

            setInterval(function() {
                slideIndex++;
                if (slideIndex >= carouselData.length) slideIndex = 0;
                track.style.webkitTransform = 'translate3d(-' + (slideIndex * 50) + '%, 0, 0)';
            }, 3000);
        }

        // 处理点击跳转逻辑
        function handleCarouselClick(index) {
            if (carouselData[index] && typeof carouselData[index].action === 'function') {
                carouselData[index].action();
            }
        }

        function closeAdModal() { document.getElementById('adModal').style.display = 'none'; }
        function openMePage() { window.location.href = 'oldme.html'; }
        function openSearchPage() { window.location.href = 'oldsearch.html'; }
        function openSharePage() { window.location.href = 'oldshare.html'; }
        function openMessagePage() { window.location.href = 'oldxiaoxi.html'; }
        function openMall() { window.location.href = 'oldmall.html'; }

        window.onload = function() {
            initCarousel();
            getApps('', true);
            try {
                if(localStorage.getItem('ad_show') !== new Date().toDateString()) {
                    var adModal = document.getElementById('adModal');
                    adModal.style.display = 'block';
                    adModal.style.display = '-webkit-box';
                    localStorage.setItem('ad_show', new Date().toDateString());
                }
            } catch(e) {}
        };

        var startY = 0;
        document.addEventListener('touchstart', function(e) { startY = e.touches[0].pageY; }, false);
        document.addEventListener('touchend', function(e) {
            if (window.scrollY <= 0 && e.changedTouches[0].pageY - startY > 120) {
                location.reload();
            }
        }, false);
    </script>
</body>
</html>
