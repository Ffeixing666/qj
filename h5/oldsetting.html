<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置</title>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-blue: #007AFF; --ios-red: #FF3B30; --text-main: #1C1C1E; --text-second: #8E8E93; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: var(--ios-bg); color: var(--text-main); }
        
        /* 导航栏 */
        header { position: sticky; top: 0; z-index: 100; background: rgba(242, 242, 247, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .nav-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .back-icon { width: 12px; height: 12px; border-left: 2px solid var(--ios-blue); border-bottom: 2px solid var(--ios-blue); transform: rotate(45deg); }
        .nav-title { font-size: 17px; font-weight: 600; }
        
        /* 列表样式 */
        .settings-container { padding: 16px 0; }
        .section-header { padding: 0 32px 8px; font-size: 13px; color: var(--text-second); text-transform: uppercase; }
        .section-group { background: var(--ios-card); margin: 0 16px 24px; border-radius: 12px; overflow: hidden; }
        .item { display: flex; align-items: center; padding: 12px 16px; background: var(--ios-card); position: relative; }
        .item:active { background: #E5E5EA; }
        .item:not(:last-child)::after { content: ""; position: absolute; bottom: 0; left: 56px; right: 0; height: 0.5px; background: rgba(0,0,0,0.1); }
        
        .icon-box { width: 28px; height: 28px; border-radius: 6px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
        .icon-box svg { width: 18px; height: 18px; fill: #fff; }
        .item-label { flex: 1; font-size: 16px; }
        .item-arrow { width: 8px; height: 8px; border-top: 2px solid #C7C7CC; border-right: 2px solid #C7C7CC; transform: rotate(45deg); }

        .logout-btn { margin: 20px 16px; background: var(--ios-card); height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--ios-red); font-size: 17px; }

        /* 弹窗 */
        .prompt-ov { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .prompt-ov.active { display: flex; }
        .prompt-box { width: 270px; background: #fff; border-radius: 14px; overflow: hidden; }
        .prompt-title { padding: 20px 16px 10px; text-align: center; font-weight: 600; }
        .prompt-input { width: 90%; margin: 10px 5%; height: 34px; border: 1px solid #ddd; padding: 0 8px; }
        .prompt-btns { display: flex; border-top: 0.5px solid #eee; height: 44px; }
        .p-btn { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--ios-blue); cursor: pointer; }
        .p-btn:first-child { border-right: 0.5px solid #eee; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div style="width:40px" onclick="goBack()"><div class="back-icon"></div></div>
            <div class="nav-title">设置中心</div>
            <div style="width:40px"></div>
        </div>
    </header>

    <div class="settings-container">
        <div class="section-header">个人资料</div>
        <div class="section-group">
            <div class="item" onclick="openEditor('nickname')">
                <div class="icon-box" style="background:#007AFF"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                <div class="item-label">昵称</div><div class="item-arrow"></div>
            </div>
            <div class="item" onclick="openEditor('bio')">
                <div class="icon-box" style="background:#34C759"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></div>
                <div class="item-label">签名</div><div class="item-arrow"></div>
            </div>
            <div class="item" onclick="triggerUpload('avatar')">
                <div class="icon-box" style="background:#FF9500"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>
                <div class="item-label">头像</div><div class="item-arrow"></div>
            </div>
            <div class="item" onclick="triggerUpload('background')">
                <div class="icon-box" style="background:#5856D6"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM5 5h14v14H5V5z"/></svg></div>
                <div class="item-label">背景</div><div class="item-arrow"></div>
            </div>
        </div>

        <div class="section-header">安全</div>
        <div class="section-group">
            <div class="item" onclick="openEditor('password')">
                <div class="icon-box" style="background:#FF3B30"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg></div>
                <div class="item-label">密码</div><div class="item-arrow"></div>
            </div>
        </div>

        <div class="logout-btn" onclick="doLogout()">退出登录</div>
    </div>

    <!-- 隐藏上传 -->
    <input type="file" id="fileInput" style="display:none" accept="image/*">

    <!-- 弹窗 -->
    <div id="p-ov" class="prompt-ov">
        <div class="prompt-box">
            <div id="p-title" class="prompt-title">输入内容</div>
            <input type="text" id="p-input" class="prompt-input">
            <div class="prompt-btns">
                <div class="p-btn" onclick="closePrompt()">取消</div>
                <div class="p-btn" style="font-weight:600" onclick="confirmPrompt()">确定</div>
            </div>
        </div>
    </div>

    <script>
        var curType = '';
        var curCallback = null;

        // --- 核心网络函数 ---
        function sendAjax(mode, postData, callback) {
            var mail = localStorage.getItem('usermail') || "";
            // 构造 URL，确保 mail 参数始终可见
            var url = 'https://apirank.qujiaweb.top/?mode=' + mode + '&mail=' + encodeURIComponent(mail);
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            
            // 重要：如果是普通的更新请求，使用传统表单编码，兼容性最强
            if (!(postData instanceof FormData)) {
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                // 将对象转为 a=1&b=2 格式
                var pair = [];
                for(var k in postData) { 
                    pair.push(encodeURIComponent(k) + '=' + encodeURIComponent(postData[k])); 
                }
                postData = pair.join('&');
            }

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            callback(res);
                        } catch(e) { showToast("解析失败"); }
                    } else {
                        showToast("连接失败(" + xhr.status + ")");
                    }
                }
            };
            
            xhr.onerror = function() { showToast("请求被拦截或网络断开(0)"); };
            xhr.send(postData);
        }

        // --- 修改资料 ---
        function updateInfo(mode, key, val) {
            var mail = localStorage.getItem('usermail');
            var data = { mail: mail };
            data[key] = val.replace(/'/g, "~PGDBSD~"); // 兼容你的 Emoji 处理

            sendAjax(mode, data, function(res) {
                if(res.code == 200) { showToast("修改成功"); }
                else { showToast("修改失败:" + (res.msg || "错误")); }
            });
        }

        // --- 图片处理 ---
        function triggerUpload(type) {
            curType = type;
            if (window.plus) {
                plus.gallery.pick(function(path) { uploadToMeituan(path); }, function(e){}, {filter:"image"});
            } else {
                document.getElementById('fileInput').click();
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            if(this.files[0]) uploadToMeituan(this.files[0]);
            this.value = '';
        };

        function uploadToMeituan(fileOrPath) {
            if(window.plus) plus.nativeUI.showWaiting("上传中...");
            
            var fd = new FormData();
            if(typeof fileOrPath === 'string') {
                // 原生 App 上传
                var task = plus.uploader.createUpload("https://apirank.qujiaweb.top/?mode=upload_meituan", {method:"POST"}, function(t, status) {
                    plus.nativeUI.closeWaiting();
                    if(status == 200) {
                        var res = JSON.parse(t.responseText);
                        if(res.full_url) submitImg(res.full_url);
                        else showToast("上传结果异常");
                    } else { showToast("上传失败("+status+")"); }
                });
                task.addFile(fileOrPath, {key:"file"});
                task.start();
            } else {
                // Web 上传
                fd.append('file', fileOrPath);
                sendAjax('upload_meituan', fd, function(res) {
                    if(res.full_url) submitImg(res.full_url);
                    else showToast("上传失败");
                });
            }
        }

        function submitImg(url) {
            var mode = (curType === 'avatar') ? 'update_avatar' : 'update_background';
            var data = { mail: localStorage.getItem('usermail') };
            data[curType] = url;
            sendAjax(mode, data, function(res) {
                if(res.code == 200) showToast("更新成功");
                else showToast("保存URL失败");
            });
        }

        // --- UI ---
        function openEditor(type) {
            var titles = {nickname:'修改昵称', bio:'修改签名', password:'修改密码'};
            var inpt = document.getElementById('p-input');
            document.getElementById('p-title').innerText = titles[type];
            inpt.value = '';
            inpt.type = (type==='password' ? 'password' : 'text');
            document.getElementById('p-ov').classList.add('active');
            curCallback = function(val) {
                if(!val && type!=='bio') return;
                var mode = 'update_' + type;
                updateInfo(mode, type, val);
            };
        }

        function confirmPrompt() {
            var v = document.getElementById('p-input').value;
            if(curCallback) curCallback(v);
            closePrompt();
        }

        function closePrompt() { document.getElementById('p-ov').classList.remove('active'); }

        function showToast(m) {
            if(window.plus) plus.nativeUI.toast(m);
            else alert(m);
        }

        function goBack() {
            if(window.plus) plus.webview.currentWebview().close('auto');
            else history.back();
        }

        function doLogout() {
            if(confirm('退出当前账号？')) {
                localStorage.removeItem('usermail');
                localStorage.removeItem('userpass');
                if(window.plus) {
                    var me = plus.webview.getWebviewById('me.html');
                    if(me) me.reload();
                    plus.webview.currentWebview().close('auto');
                } else { window.location.href = 'index.html'; }
            }
        }
    </script>
</body>
</html>
