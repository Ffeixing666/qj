<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设置（旧兼容）</title>
    <style>
        /* iOS 6 不支持 CSS 变量，全部替换为固定值 */
        * {
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            -webkit-user-select: none;
            -webkit-box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, STHeiTi, sans-serif;
            background-color: #F2F2F7;
            color: #1C1C1E;
            -webkit-text-size-adjust: 100%;
        }

        header {
            position: relative; /* iOS 6 粘性布局支持极差，改为相对布局 */
            top: 0;
            z-index: 100;
            background-color: #F2F2F7;
            border-bottom: 1px solid #C6C6C8;
        }

        .nav-bar {
            height: 44px;
            display: -webkit-box;
            -webkit-box-orient: horizontal;
            -webkit-box-align: center;
            -webkit-box-pack: justify;
            padding: 0 16px;
        }

        .back-btn {
            width: 40px;
            height: 44px;
            display: -webkit-box;
            -webkit-box-align: center;
        }

        .back-icon {
            width: 10px;
            height: 10px;
            border-left: 2px solid #007AFF;
            border-bottom: 2px solid #007AFF;
            -webkit-transform: rotate(45deg);
        }

        .nav-title {
            font-size: 17px;
            font-weight: bold;
            -webkit-box-flex: 1;
            text-align: center;
        }

        .nav-right { width: 40px; }

        .settings-container {
            padding: 16px 0 40px 0;
        }

        .section-group {
            background: #FFFFFF;
            margin: 0 16px 24px 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #C6C6C8;
        }

        .section-header {
            padding-left: 32px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #8E8E93;
        }

        .item {
            display: -webkit-box;
            -webkit-box-orient: horizontal;
            -webkit-box-align: center;
            padding: 12px 16px;
            background: #FFFFFF;
        }

        .item:active {
            background-color: #E5E5EA;
        }

        .item-border {
            border-bottom: 1px solid #E5E5EA;
            margin-left: 56px;
        }

        .icon-box {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            margin-right: 12px;
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: center;
        }

        .icon-box img { width: 18px; height: 18px; }

        .bg-blue   { background-color: #007AFF; }
        .bg-green  { background-color: #34C759; }
        .bg-orange { background-color: #FF9500; }
        .bg-indigo { background-color: #5856D6; }
        .bg-red    { background-color: #FF3B30; }

        .item-label {
            -webkit-box-flex: 1;
            font-size: 16px;
        }

        .item-arrow {
            width: 8px;
            height: 8px;
            border-top: 2px solid #C7C7CC;
            border-right: 2px solid #C7C7CC;
            -webkit-transform: rotate(45deg);
        }

        .logout-btn {
            margin: 32px 16px 0 16px;
            background: #FFFFFF;
            height: 50px;
            line-height: 50px;
            border-radius: 10px;
            text-align: center;
            color: #FF3B30;
            font-size: 17px;
            border: 1px solid #C6C6C8;
        }

        .footer-info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8E8E93;
        }

        /* 弹窗兼容性调整 */
        .custom-prompt-overlay {
            position: absolute; /* iOS 6 fixed定位在键盘弹出时有Bug */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }

        .custom-prompt-box {
            position: absolute;
            top: 100px;
            left: 50%;
            margin-left: -135px;
            width: 270px;
            background: #FFFFFF;
            border-radius: 10px;
            border: 1px solid #999;
        }

        .custom-prompt-title {
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            padding: 20px 16px 12px;
        }

        .custom-prompt-content { padding: 0 16px 20px; }

        .custom-prompt-input {
            width: 100%;
            height: 30px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .custom-prompt-footer {
            display: -webkit-box;
            border-top: 1px solid #E5E5EA;
            height: 44px;
        }

        .custom-prompt-btn {
            -webkit-box-flex: 1;
            text-align: center;
            line-height: 44px;
            font-size: 17px;
            color: #007AFF;
        }

        .custom-prompt-btn-cancel { border-right: 1px solid #E5E5EA; }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div class="back-btn" onclick="handleBack()">
                <div class="back-icon"></div>
            </div>
            <div class="nav-title">设置</div>
            <div class="nav-right"></div>
        </div>
    </header>

    <div class="settings-container">
        <div class="section-header">用户资料</div>
        <div class="section-group">
            <div class="item" onclick="navigate('nickname')">
                <div class="icon-box bg-blue"></div>
                <div class="item-label">修改昵称</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item-border"></div>
            <div class="item" onclick="navigate('bio')">
                <div class="icon-box bg-green"></div>
                <div class="item-label">修改个签</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item-border"></div>
            <div class="item" onclick="navigate('avatar')">
                <div class="icon-box bg-orange"></div>
                <div class="item-label">修改头像</div>
                <div class="item-arrow"></div>
            </div>
            <div class="item-border"></div>
            <div class="item" onclick="navigate('background')">
                <div class="icon-box bg-indigo"></div>
                <div class="item-label">修改背景</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="section-header">账号安全</div>
        <div class="section-group">
            <div class="item" onclick="navigate('password')">
                <div class="icon-box bg-red"></div>
                <div class="item-label">修改密码</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="logout-btn" onclick="handleLogout()">退出当前账号</div>
        <div class="footer-info">趣加应用 v2.0.1</div>
    </div>

    <div id="customPromptOverlay" class="custom-prompt-overlay">
        <div class="custom-prompt-box">
            <div id="customPromptTitle" class="custom-prompt-title">提示</div>
            <div class="custom-prompt-content">
                <input type="text" id="customPromptInput" class="custom-prompt-input">
            </div>
            <div class="custom-prompt-footer">
                <div class="custom-prompt-btn custom-prompt-btn-cancel" onclick="closeCustomPrompt()">取消</div>
                <div class="custom-prompt-btn" onclick="confirmCustomPrompt()">确定</div>
            </div>
        </div>
    </div>

    <script>
        // iOS 6 不支持 async/await, fetch，全部回退到 XMLHttpRequest
        var promptCallback = null;

        function showCustomPrompt(title, isPassword, callback) {
            var overlay = document.getElementById('customPromptOverlay');
            var titleEl = document.getElementById('customPromptTitle');
            var inputEl = document.getElementById('customPromptInput');

            titleEl.innerHTML = title;
            inputEl.value = '';
            inputEl.type = isPassword ? 'password' : 'text';
            promptCallback = callback;

            overlay.style.display = 'block';
            inputEl.focus();
        }

        function closeCustomPrompt() {
            document.getElementById('customPromptOverlay').style.display = 'none';
        }

        function confirmCustomPrompt() {
            var val = document.getElementById('customPromptInput').value;
            if (promptCallback) promptCallback(val);
            closeCustomPrompt();
        }

        function ajaxPost(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        callback(JSON.parse(xhr.responseText));
                    } else {
                        toast('网络请求失败');
                    }
                }
            };
            xhr.send(JSON.stringify(data));
        }

        function handleBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('auto');
            } else {
                history.back();
            }
        }

        function toast(msg) {
            if (window.plus) {
                plus.nativeUI.toast(msg);
            } else {
                alert(msg);
            }
        }

        function navigate(page) {
            var mail = localStorage.getItem('usermail');
            if (!mail) { toast('请先登录'); return; }

            if (page === 'nickname') {
                showCustomPrompt('请输入新昵称', false, function(v) { if(v) updateNickname(v); });
            } else if (page === 'bio') {
                showCustomPrompt('请输入新签名', false, function(v) { updateBio(v || ''); });
            } else if (page === 'password') {
                showCustomPrompt('请输入新密码', true, function(v) { if(v) updatePassword(v); });
            } else if (page === 'avatar' || page === 'background') {
                toast('旧版浏览器暂不支持直接上传');
            }
        }

        function updateNickname(name) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_nickname&mail=' + encodeURIComponent(mail), 
                { mail: mail, nickname: name }, function(res) {
                if (res.code === 200) toast('修改成功');
            });
        }

        function updateBio(bio) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_bio&mail=' + encodeURIComponent(mail), 
                { mail: mail, bio: bio }, function(res) {
                if (res.code === 200) toast('修改成功');
            });
        }

        function updatePassword(pwd) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_password&mail=' + encodeURIComponent(mail), 
                { mail: mail, password: pwd }, function(res) {
                if (res.code === 200) toast('修改成功');
            });
        }

        function handleLogout() {
            if (confirm('确定退出登录？')) {
                localStorage.clear();
                window.location.href = 'oldme.html';
            }
        }
    </script>
</body>
</html>
