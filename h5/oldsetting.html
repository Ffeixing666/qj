<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>设置（旧兼容）</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        body {
            font-family: Helvetica, STHeiti, sans-serif;
            background-color: #F2F2F7;
            color: #1C1C1E;
            -webkit-user-select: none;
        }

        header {
            position: relative;
            background-color: #F2F2F7;
            border-bottom: 1px solid #C6C6C8;
            height: 44px;
            width: 100%;
        }

        .nav-bar {
            height: 44px;
            line-height: 44px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            top: 0;
            width: 60px;
            height: 44px;
        }

        .back-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-left: 2px solid #007AFF;
            border-bottom: 2px solid #007AFF;
            -webkit-transform: rotate(45deg);
            margin-top: 16px;
            margin-left: 16px;
        }

        .nav-title {
            font-size: 17px;
            font-weight: bold;
        }

        .settings-container {
            padding: 16px 0;
        }

        .section-header {
            padding: 0 0 8px 32px;
            font-size: 13px;
            color: #8E8E93;
        }

        .section-group {
            background: #FFFFFF;
            margin: 0 16px 24px 16px;
            border-radius: 10px;
            border: 1px solid #C6C6C8;
            overflow: hidden;
        }

        .item {
            display: block;
            height: 44px;
            padding: 0 16px;
            position: relative;
            background: #FFFFFF;
            text-decoration: none;
            color: #1C1C1E;
            overflow: hidden;
        }

        .item:active {
            background-color: #E5E5EA;
        }

        .line-sep {
            margin-left: 56px;
            height: 1px;
            background-color: #E5E5EA;
        }

        .icon-box {
            float: left;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            margin-top: 8px;
            margin-right: 12px;
            text-align: center;
        }

        .icon-box img {
            width: 18px;
            height: 18px;
            margin-top: 5px;
        }

        .bg-blue   { background-color: #007AFF; }
        .bg-green  { background-color: #34C759; }
        .bg-orange { background-color: #FF9500; }
        .bg-indigo { background-color: #5856D6; }
        .bg-red    { background-color: #FF3B30; }

        .item-label {
            float: left;
            line-height: 44px;
            font-size: 16px;
        }

        .item-arrow {
            float: right;
            width: 8px;
            height: 8px;
            border-top: 2px solid #C7C7CC;
            border-right: 2px solid #C7C7CC;
            -webkit-transform: rotate(45deg);
            margin-top: 17px;
        }

        .logout-btn {
            margin: 32px 16px 0 16px;
            background: #FFFFFF;
            height: 50px;
            line-height: 50px;
            border-radius: 10px;
            border: 1px solid #C6C6C8;
            text-align: center;
            color: #FF3B30;
            font-size: 17px;
            font-weight: bold;
        }

        .logout-btn:active {
            background-color: #FFF0F0;
        }

        .footer-info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8E8E93;
        }

        .custom-prompt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 1000;
        }

        .custom-prompt-box {
            width: 270px;
            background: #FFFFFF;
            border-radius: 14px;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: -135px;
            margin-top: -80px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .custom-prompt-title {
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            padding: 20px 16px 12px;
        }

        .custom-prompt-content {
            padding: 0 16px 20px;
        }

        .custom-prompt-input {
            width: 100%;
            height: 30px;
            border: 1px solid #C6C6C8;
            border-radius: 4px;
            padding: 0 4px;
            font-size: 14px;
        }

        .custom-prompt-footer {
            border-top: 1px solid #E5E5EA;
            height: 44px;
            overflow: hidden;
        }

        .custom-prompt-btn {
            width: 50%;
            float: left;
            height: 44px;
            line-height: 44px;
            text-align: center;
            font-size: 17px;
            color: #007AFF;
        }

        .custom-prompt-btn-cancel {
            border-right: 1px solid #E5E5EA;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-bar">
            <div class="back-btn" onclick="handleBack()">
                <div class="back-icon"></div>
            </div>
            <div class="nav-title">设置</div>
        </div>
    </header>

    <div class="settings-container">
        <div class="section-header">用户资料</div>
        <div class="section-group">
            <div class="item" onclick="navigate('nickname')">
                <div class="icon-box bg-blue"></div>
                <div class="item-label">修改昵称</div>
                <div class="item-arrow"></div>
            </div>
            <div class="line-sep"></div>
            <div class="item" onclick="navigate('bio')">
                <div class="icon-box bg-green"></div>
                <div class="item-label">修改个签</div>
                <div class="item-arrow"></div>
            </div>
            <div class="line-sep"></div>
            <div class="item" onclick="navigate('avatar')">
                <div class="icon-box bg-orange"></div>
                <div class="item-label">修改头像</div>
                <div class="item-arrow"></div>
            </div>
            <div class="line-sep"></div>
            <div class="item" onclick="navigate('background')">
                <div class="icon-box bg-indigo"></div>
                <div class="item-label">修改背景</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="section-header">账号安全</div>
        <div class="section-group">
            <div class="item" onclick="navigate('password')">
                <div class="icon-box bg-red"></div>
                <div class="item-label">修改密码</div>
                <div class="item-arrow"></div>
            </div>
        </div>

        <div class="logout-btn" onclick="handleLogout()">退出当前账号</div>

        <div class="footer-info">趣加应用 v2.0.1</div>
    </div>

    <div id="customPromptOverlay" class="custom-prompt-overlay">
        <div class="custom-prompt-box">
            <div id="customPromptTitle" class="custom-prompt-title">提示</div>
            <div class="custom-prompt-content">
                <input type="text" id="customPromptInput" class="custom-prompt-input" />
            </div>
            <div class="custom-prompt-footer">
                <div class="custom-prompt-btn custom-prompt-btn-cancel" onclick="closeCustomPrompt()">取消</div>
                <div class="custom-prompt-btn" style="font-weight:bold" onclick="confirmCustomPrompt()">确定</div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var promptCallback = null;

        function showCustomPrompt(title, isPassword, callback) {
            var overlay = document.getElementById('customPromptOverlay');
            var titleEl = document.getElementById('customPromptTitle');
            var inputEl = document.getElementById('customPromptInput');

            titleEl.innerHTML = title;
            inputEl.value = '';
            inputEl.type = isPassword ? 'password' : 'text';
            promptCallback = callback;

            overlay.style.display = 'block';
            inputEl.focus();
        }

        function closeCustomPrompt() {
            document.getElementById('customPromptOverlay').style.display = 'none';
            promptCallback = null;
        }

        function confirmCustomPrompt() {
            var inputEl = document.getElementById('customPromptInput');
            if (promptCallback) {
                promptCallback(inputEl.value);
            }
            closeCustomPrompt();
        }

        function handleBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('auto');
            } else {
                history.back();
            }
        }

        function ajaxPost(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            callback(null, res);
                        } catch (e) {
                            callback('Parse Error');
                        }
                    } else {
                        callback('Error: ' + xhr.status);
                    }
                }
            };
            xhr.send(JSON.stringify(data));
        }

        function uploadFileWithPlus(filePath, type) {
            var mail = localStorage.getItem('usermail');
            if (!mail) { toast('请先登录'); return; }

            if (window.plus) {
                plus.nativeUI.showWaiting('上传中...');
                var task = plus.uploader.createUpload('https://apirank.qujiaweb.top/?mode=upload_meituan', {
                    method: 'POST'
                }, function(t, status) {
                    plus.nativeUI.closeWaiting();
                    if (status == 200) {
                        var res = JSON.parse(t.responseText);
                        if (res.full_url) {
                            if (type == 'avatar') updateAvatarUrl(res.full_url);
                            else updateBackgroundUrl(res.full_url);
                        }
                    } else {
                        toast('上传失败');
                    }
                });
                task.addFile(filePath, {key: 'file'});
                task.start();
            }
        }

        function updateAvatarUrl(url) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_avatar&mail=' + encodeURIComponent(mail), 
            {mail: mail, avatar: url}, function(err, res) {
                if (!err && res.code == 200) toast('头像修改成功');
            });
        }

        function updateBackgroundUrl(url) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_background&mail=' + encodeURIComponent(mail), 
            {mail: mail, background: url}, function(err, res) {
                if (!err && res.code == 200) toast('背景修改成功');
            });
        }

        function toast(msg) {
            if (window.plus) {
                plus.nativeUI.toast(msg);
            } else {
                alert(msg);
            }
        }

        function navigate(page) {
            var mail = localStorage.getItem('usermail');
            if (!mail) { toast('请先登录'); return; }

            if (page == 'avatar' || page == 'background') {
                if (window.plus) {
                    plus.gallery.pick(function(p) { uploadFileWithPlus(p, page); });
                } else {
                    alert('浏览器暂不支持此操作');
                }
            } else if (page == 'nickname') {
                showCustomPrompt('请输入新昵称', false, function(v) { if(v) updateNickname(v); });
            } else if (page == 'bio') {
                showCustomPrompt('请输入新签名', false, function(v) { updateBio(v); });
            } else if (page == 'password') {
                showCustomPrompt('请输入新密码', true, function(v) { if(v) updatePassword(v); });
            }
        }

        function updateNickname(nickname) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_nickname&mail=' + encodeURIComponent(mail),
            {mail: mail, nickname: nickname}, function(err, res) {
                if (!err && res.code == 200) toast('昵称修改成功');
            });
        }

        function updateBio(bio) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_bio&mail=' + encodeURIComponent(mail),
            {mail: mail, bio: bio}, function(err, res) {
                if (!err && res.code == 200) toast('签名修改成功');
            });
        }

        function updatePassword(pwd) {
            var mail = localStorage.getItem('usermail');
            ajaxPost('https://apirank.qujiaweb.top/?mode=update_password&mail=' + encodeURIComponent(mail),
            {mail: mail, password: pwd}, function(err, res) {
                if (!err && res.code == 200) toast('密码修改成功');
            });
        }

        function handleLogout() {
            var confirmMsg = '确定退出登录？';
            if (window.plus) {
                plus.nativeUI.confirm(confirmMsg, function(e) {
                    if (e.index == 0) {
                        localStorage.clear();
                        plus.webview.currentWebview().close();
                        var me = plus.webview.getWebviewById('oldme.html');
                        if (me) me.reload();
                    }
                });
            } else {
                if (confirm(confirmMsg)) {
                    localStorage.clear();
                    window.location.href = 'oldme.html';
                }
            }
        }
        /* --- 5+App 统一返回键兼容逻辑 (支持多级返回 + 首页退出) --- */
(function() {
    var firstBackTime = 0;

    // 统一返回处理函数
    function handleBackEvent() {
        var ws = plus.webview.currentWebview();
        
        // 1. 检查当前窗口是否可以返回上一页 (针对单页面内的 history 记录)
        // 2. 检查当前窗口是否有父窗口 (如果是通过 create 创建的子窗口)
        // 3. 判断是否是主入口 (通过 id 判断，或者没有 opener)
        
        var opener = ws.opener();
        var canBack = false;

        // 特殊情况：如果有封禁弹窗，强制拦截并处理退出逻辑
        var banModal = document.getElementById('ban-modal');
        var isModalVisible = false;
        if (banModal) {
            var display = banModal.style.display || window.getComputedStyle(banModal).display;
            if (display === 'flex' || display === 'block') {
                isModalVisible = true;
            }
        }

        if (isModalVisible) {
            // 如果封禁弹窗开着，点击返回键直接询问是否退出 App
            plus.nativeUI.confirm("确定退出应用吗？", function(e) {
                if (e.index === 0) {
                    plus.runtime.quit();
                }
            }, "提示", ["确定", "取消"]);
            return;
        }

        // 层级判断逻辑：
        // 如果没有上级页面 (opener) 或者是指定的首页 ID
        if (!opener || ws.id === "HBuilder" || ws.id === "main" || ws.id === "oldhome.html") {
            // 首页/最外层：执行双击退出
            var now = new Date().getTime();
            if (now - firstBackTime < 2000) {
                plus.runtime.quit();
            } else {
                firstBackTime = now;
                plus.nativeUI.toast('再按一次退出应用');
            }
        } else {
            // 子页面：执行关闭当前页，回到上一页
            ws.close('pop-out', 300);
        }
    }

    document.addEventListener('plusready', function() {
        // 基础环境配置
        plus.navigator.setFullscreen(false);
        
        // 安全调用状态栏更新
        if (typeof updateStatusBarStyle === 'function') {
            updateStatusBarStyle();
        }

        // 核心：监听物理返回键
        plus.key.addEventListener('backbutton', function() {
            handleBackEvent();
        }, false);
        
    }, false);
})();
    </script>
</body>
</html>
