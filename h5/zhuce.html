<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>用户注册 - 趣加应用</title>
    <script src="https://static2.pgaot.com/Assets/js/jquery-2.2.4.min.js"></script>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --secondary-text: #8E8E93;
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none;
            user-select: none;
        }
        body { 
            background: var(--bg); 
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        /* 精美导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: rgba(242, 242, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            margin-top: env(safe-area-inset-top);
        }
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }
        .back-btn svg { width: 18px; height: 18px; color: #333; }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-top: 44px;
        }

        .card { 
            width: 100%; 
            max-width: 400px; 
            background: var(--card); 
            border-radius: 28px; 
            padding: 32px 24px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.06); 
        }

        .title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 24px; color: var(--text); letter-spacing: -0.5px; }

        .step { display: none; }
        .active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 14px; 
            background: #F2F2F7; 
            outline: none; 
            font-size: 16px; 
            transition: all 0.2s;
            -webkit-user-select: text; 
            user-select: text; 
        }
        input:focus { background: #E5E5EA; box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 17px;
            cursor: pointer; 
            margin-top: 12px;
            transition: transform 0.1s active;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn:disabled { background: #D1D1D6; cursor: not-allowed; }

        /* 辅助提示样式 */
        .tips-trigger {
            text-align: center;
            font-size: 13px;
            color: var(--primary);
            margin-top: 20px;
            cursor: pointer;
            font-weight: 500;
        }
        .help-panel {
            display: none;
            background: #F9F9FB;
            border-radius: 14px;
            padding: 16px;
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
            color: #666;
            border: 1px solid #EEE;
        }
        .help-panel li { list-style: none; margin-bottom: 6px; }

        #toast { 
            position: fixed; 
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75); 
            backdrop-filter: blur(10px);
            color: #fff; 
            padding: 12px 24px; 
            border-radius: 25px; 
            display: none; 
            font-size: 14px; 
            z-index: 9999; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </div>
</div>

<div id="toast"></div>

<div class="container">
    <div class="card">
        <h2 class="title">Welcome</h2>
        
        <div id="s1" class="step active">
            <input type="email" id="email" placeholder="输入邮箱地址">
            <button id="sendBtn" class="btn" onclick="goStep1()">发送验证码</button>
        </div>

        <div id="s2" class="step">
            <p style="text-align:center; font-size:14px; color:#333; margin-bottom: 10px;">验证码已发送</p>
            <input type="number" id="vcode" placeholder="4位验证码" pattern="\d*">
            <button class="btn" onclick="goStep2()">校验验证码</button>
            
            <div class="tips-trigger" onclick="$('#help').fadeToggle()">收不到验证码？</div>
            <div id="help" class="help-panel">
                <li>1. QQ邮箱请使用QQ邮箱APP或网页版查收，QQ应用内推送可能会有延迟。</li>
                <li>2. 同一设备仅支持注册一个账号。</li>
                <li>3. 如有疑问请联系：110045310@qq.com</li>
            </div>
        </div>

        <div id="s3" class="step">
            <input type="text" id="nick" placeholder="用户昵称">
            <input type="password" id="p1" placeholder="设置密码">
            <input type="password" id="p2" placeholder="确认密码">
            <button id="regBtn" class="btn" onclick="goStep3()">完成注册</button>
        </div>
    </div>
</div>

<script>
    const API = 'https://apirank.qujiaweb.top/';
    let cache = { email: '', code: '' };
    let countdownTimer = null;

    function toast(m) { $('#toast').text(m).stop(true, true).fadeIn().delay(2000).fadeOut(); }
    function showStep(n) { $('.step').removeClass('active'); $(`#s${n}`).addClass('active'); }

    // 返回功能
    function goBack() {
        if ($('#s2').hasClass('active')) {
            showStep(1);
        } else if ($('#s3').hasClass('active')) {
            showStep(2);
        } else {
            // H5+ 环境下关闭
            if(window.plus) {
                plus.webview.currentWebview().close('pop-out', 300);
            } else {
                history.back();
            }
        }
    }

    // 逻辑部分保持原样
    function initSendBtn() {
        const lastTime = localStorage.getItem('last_vcode_time');
        if (lastTime) {
            const diff = Math.floor((Date.now() - lastTime) / 1000);
            if (diff < 300) { startCountdown(300 - diff); }
        }
    }

    function startCountdown(seconds) {
        const $btn = $('#sendBtn');
        $btn.prop('disabled', true);
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdownTimer);
                $btn.prop('disabled', false).text('发送验证码');
                localStorage.removeItem('last_vcode_time');
            } else {
                $btn.text(`重新发送 (${seconds}s)`);
            }
        }, 1000);
    }

    $(document).ready(initSendBtn);

    async function goStep1() {
        const email = $('#email').val().trim();
        if(!email.includes('@')) return toast('请输入有效邮箱');

        const $btn = $('#sendBtn');
        $btn.prop('disabled', true).text('正在发送...');
        localStorage.setItem('last_vcode_time', Date.now());
        startCountdown(300);
        
        const generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
        cache.code = generatedCode;
        cache.email = email;

        toast('正在发送验证码...');
        try {
            const mail = await fetch(`${API}?mode=send_mail`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: email, code: generatedCode })
            }).then(r => r.json());

            if(mail.code === 200) { 
                showStep(2); 
                toast('验证码已发送'); 
            } else { 
                toast('发送失败：' + (mail.msg || '服务商拦截'));
            }
        } catch(e) { 
            toast('网络繁忙，请稍后再试'); 
        }
    }

    function goStep2() {
        const inputCode = $('#vcode').val().trim();
        if(inputCode && inputCode.toString() === cache.code.toString()) {
            showStep(3);
        } else {
            toast('验证码错误');
        }
    }

    function hasSpecialChars(password) { return !/^[a-zA-Z0-9_]+$/.test(password); }

    function escapeEmoji(text) {
        return [...text].map(char => {
            const code = char.codePointAt(0);
            if ((code >= 0x1F300 && code <= 0x1F6FF) || (code >= 0x1F900 && code <= 0x1F9FF) || (code >= 0x2600 && code <= 0x27BF)) {
                return `&#${code};`;
            } else { return char; }
        }).join('').replace(/'/g, "~PGDBSD~");
    }

    async function goStep3() {
        const nick = $('#nick').val().trim();
        const p1 = $('#p1').val();
        const p2 = $('#p2').val();

        if(!nick) return toast('请输入昵称');
        if(p1.length < 6) return toast('密码至少6位');
        if(p1 !== p2) return toast('两次输入的密码不一致');
        if(hasSpecialChars(p1)) return toast('密码请勿包含特殊字符');

        const escapedNick = escapeEmoji(nick);
        const $btn = $('#regBtn');
        $btn.prop('disabled', true).text('提交中...');

        toast('正在完成注册...');
        try {
            const res = await fetch(`${API}?mode=register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: cache.email, 
                    password: p1, 
                    nickname: escapedNick 
                })
            }).then(r => r.json());

            if(res.code === 200) {
                toast('注册成功！');
                setTimeout(() => { location.href = 'index.html'; }, 1500);
            } else {
                toast('提交失败：' + (res.msg || '接口错误'));
                $btn.prop('disabled', false).text('完成注册');
            }
        } catch(e) { 
            toast('提交出错，请稍后重试'); 
            $btn.prop('disabled', false).text('完成注册');
        }
    }

    // 原生返回键监听
    document.addEventListener('plusready', function() {
        plus.key.addEventListener('backbutton', goBack);
    });
</script>
</body>
</html>
