<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>实验室功能（旧兼容）</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            width: 100%;
            background-color: #ffffff;
        }
        /* 兼容旧版 iOS 的居中方案：使用 Table 布局 */
        .wrapper-table {
            display: table;
            width: 100%;
            height: 100%;
            border-collapse: collapse;
        }
        .wrapper-cell {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 20px;
            color: #1e1e1e;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="wrapper-table">
        <div class="wrapper-cell">
            实验室功能
        </div>
    </div>

    <script type="text/javascript">
        // 链接重定向逻辑：将所有 .html 结尾的跳转改为 old_xxx.html
        // 此段落为示例，若页面中有 <a> 标签会自动应用
        window.onload = function() {
            var links = document.getElementsByTagName('a');
            for (var i = 0; i < links.length; i++) {
                var href = links[i].getAttribute('href');
                if (href && href.indexOf('.html') !== -1 && href.indexOf('old_') === -1) {
                    links[i].setAttribute('href', 'old_' + href);
                }
            }
        };

        // 核心功能：返回键万能段（兼容 HTML5+）
        document.addEventListener('plusready', function() {
            var webview = plus.webview.currentWebview();
            plus.key.addEventListener('backbutton', function() {
                webview.canBack(function(e) {
                    if (e.canBack) {
                        webview.back();
                    } else {
                        webview.close();
                    }
                });
            });
        }, false);
        document.addEventListener('plusready', function() {
    // 1. 设置状态栏等常规操作
    updateStatusBarStyle();
    plus.navigator.setFullscreen(false);

    // 2. 针对旧内核，先尝试移除可能存在的旧监听，再重新绑定
    plus.key.removeEventListener('backbutton', function(){}); 
    
    plus.key.addEventListener('backbutton', function() {
        const banModal = document.getElementById('ban-modal');
        
        // 兼容性检查：确保元素存在且能读取样式
        const isModalVisible = banModal && (
            banModal.style.display === 'flex' || 
            window.getComputedStyle(banModal).display === 'flex'
        );

        if (isModalVisible) {
            plus.nativeUI.confirm("确定退出吗？", (e) => {
                // index 0 通常是“确定”
                if (e.index === 0) {
                    plus.runtime.quit();
                }
            }, "提示", ["确定", "取消"]);
        } else {
            // 如果不在特定弹窗状态，建议执行“双击退出”逻辑，这在旧内核上更稳健
            handleExit();
        }
    }, false);
});

// 稳健的退出逻辑：连续按两次返回键才退出，防止低内核误触
let firstBackTime = 0;
function handleExit() {
    let now = Date.now();
    if (now - firstBackTime < 2000) {
        plus.runtime.quit();
    } else {
        firstBackTime = now;
        plus.nativeUI.toast('再按一次退出应用');
    }
}
    </script>
</body>
</html>
