<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>更多版本（旧兼容）</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, STHeiti, "Microsoft YaHei", sans-serif;
            background-color: #F2F2F7;
            color: #1C1C1E;
            overflow-x: hidden;
            -webkit-text-size-adjust: none;
        }

        header {
            height: 44px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #C8C7CC;
        }

        .back-btn {
            position: absolute;
            left: 10px;
            top: 0;
            height: 44px;
            line-height: 44px;
            color: #007AFF;
            font-size: 16px;
            cursor: pointer;
        }

        .back-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-left: 2px solid #007AFF;
            border-bottom: 2px solid #007AFF;
            -webkit-transform: rotate(45deg);
            margin-right: 3px;
            position: relative;
            top: -1px;
        }

        .header-title {
            width: 100%;
            text-align: center;
            line-height: 44px;
            font-size: 17px;
            font-weight: bold;
        }

        .main-content {
            padding: 56px 12px 12px 12px;
        }

        .item-card {
            background: #FFFFFF;
            -webkit-border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #DDDDDD;
            position: relative;
            min-height: 76px;
            display: block;
            text-decoration: none;
            overflow: hidden;
        }

        .item-card:active {
            background-color: #E5E5EA;
        }

        .item-icon {
            width: 56px;
            height: 56px;
            -webkit-border-radius: 10px;
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #F8F8F8;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .item-info {
            margin-left: 66px;
            margin-right: 50px;
        }

        .item-title {
            font-size: 16px;
            font-weight: bold;
            color: #1C1C1E;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 13px;
            color: #8E8E93;
            height: 32px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .version-tag {
            position: absolute;
            right: 10px;
            top: 26px;
            width: 48px;
            height: 22px;
            background: #F0F0F4;
            color: #636366;
            font-size: 11px;
            font-weight: bold;
            line-height: 22px;
            text-align: center;
            -webkit-border-radius: 11px;
            border: 1px solid #DDDDDD;
        }

        .loader, .empty-hint {
            text-align: center;
            padding-top: 50px;
            color: #8E8E93;
            font-size: 14px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            margin: 0 auto 10px auto;
            border: 2px solid #DDDDDD;
            border-top: 2px solid #007AFF;
            -webkit-border-radius: 50%;
            -webkit-animation: spin 0.8s linear infinite;
        }

        @-webkit-keyframes spin {
            from { -webkit-transform: rotate(0deg); }
            to { -webkit-transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="header">
        <header>
            <div class="back-btn" onclick="goBack()">
                <div class="back-icon"></div>
                <span>返回</span>
            </div>
            <div class="header-title">更多版本（旧兼容）</div>
        </header>
    </div>

    <div class="main-content">
        <div id="listContainer"></div>
    </div>

    <script type="text/javascript">
        function goBack() {
            if (window.plus) {
                plus.webview.currentWebview().close('pop-out', 300);
            } else {
                window.history.back();
            }
        }

        if (window.plus) {
            document.addEventListener('plusready', function() {
                plus.key.addEventListener('backbutton', goBack);
            });
        }

        function getQueryString(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return unescape(r[2]);
            return null;
        }

        function loadData() {
            var mail = window.localStorage.getItem('usermail');
            var baoming = getQueryString('baoming');
            var container = document.getElementById('listContainer');

            if (!mail || !baoming) return;

            container.innerHTML = '<div class="loader"><div class="spinner"></div>正在加载...</div>';

            var xhr = new XMLHttpRequest();
            var api = 'https://apirank.qujiaweb.top/?mode=get_more_apps&mail=' + encodeURIComponent(mail) + '&baoming=' + encodeURIComponent(baoming);
            
            xhr.open('GET', api, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4) {
                    if (xhr.status == 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (data.code === 200 && data.fields) {
                                renderList(data.fields);
                            } else {
                                container.innerHTML = '<div class="empty-hint">暂无其他版本</div>';
                            }
                        } catch (e) {
                            container.innerHTML = '<div class="empty-hint">数据解析失败</div>';
                        }
                    } else {
                        container.innerHTML = '<div class="empty-hint">网络请求失败</div>';
                    }
                }
            };
            xhr.send();
        }

        function renderList(apps) {
            var container = document.getElementById('listContainer');
            container.innerHTML = '';

            for (var i = 0; i < apps.length; i++) {
                var app = apps[i];
                var card = document.createElement('div');
                card.className = 'item-card';
                
                (function(id) {
                    card.onclick = function() {
                        var url = 'oldxiangqing.html?id=' + id;
                        if (window.plus) {
                            plus.webview.create(url, url, {backbuttonMaximize: false}).show('pop-in', 300);
                        } else {
                            window.location.href = url;
                        }
                    };
                })(app.id);

                var iconUrl = app.图标 || '';
                var v = app.版本 ? app.版本.toString() : '1.0';
                if (v.length > 5) v = v.substring(0, 5);

                var title = decodeEntities(app.名称 || '未命名');
                var desc = decodeEntities(app.简介 || '暂无说明');

                card.innerHTML = '<div class="item-icon" style="background-image: url(' + iconUrl + ')"></div>' +
                                 '<div class="item-info">' +
                                 '<div class="item-title">' + title + '</div>' +
                                 '<div class="item-desc">' + desc + '</div>' +
                                 '</div>' +
                                 '<div class="version-tag">' + v + '</div>';
                
                container.appendChild(card);
            }
        }

        function decodeEntities(str) {
            if (!str) return '';
            return str.replace(/&#(\d+);/g, function(match, dec) {
                return String.fromCharCode(dec);
            });
        }

        window.onload = function() {
            setTimeout(function() {
                loadData();
            }, 300);
        };
    </script>
</body>
</html>
