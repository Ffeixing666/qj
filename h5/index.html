<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣加应用</title>
    <style>
        :root {
            --primary-color: #4facfe;
            --text-color: #1a1a1a;
            --bg-color: #ffffff;
            --danger-color: #ff7675;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
            overflow: hidden;
        }

        .welcome-wrapper {
            position: relative;
            display: none;
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-text {
            position: relative;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 15px;
            color: var(--text-color);
            text-indent: 15px;
        }

        .text-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            white-space: nowrap;
            animation: elegantFade 6s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        }

        .text-item:nth-child(2) {
            animation-delay: 3s;
        }

        @keyframes elegantFade {
            0%, 5% { opacity: 0; }
            20%, 45% { opacity: 1; }
            55%, 100% { opacity: 0; }
        }

        #ban-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 1);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ban-content {
            background: #fff;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .ban-title {
            color: var(--danger-color);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .ban-body {
            color: #636e72;
            font-size: 15px;
            line-height: 2;
            text-align: left;
            margin-bottom: 35px;
            padding: 20px;
            background: #fdfdfd;
            border-radius: 16px;
        }

        .ban-mail {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="welcome-wrapper" id="ui-container" style="display: none;">
        <div class="loading-text">
            <div class="text-item">欢迎回来</div>
            <div class="text-item">马上就好</div>
        </div>
    </div>

    <div id="ban-modal">
        <div class="ban-content">
            <div class="ban-title">账号受限</div>
            <div class="ban-body">
                抱歉，您的账号已被系统封禁。<br>
                1. 严禁发布违规内容。<br>
                2. 严禁恶意抓包或修改数据。<br>
                3. 请遵守社区文明互动规范。
            </div>
            <div style="font-size: 13px; color: #b2bec3;">
                申诉联络：<br>
                <a href="mailto:110045310@qq.com" class="ban-mail">110045310@qq.com</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://apirank.qujiaweb.top/';
        let isTaskStarted = false;

        function applyNativeUI() {
            if (window.plus) {
                plus.navigator.setFullscreen(false);
                plus.navigator.setStatusBarBackground('#FFFFFF');
                plus.navigator.setStatusBarStyle('dark');
            }
        }

        function navigate() {
            if (window.plus) {
                const target = plus.webview.create('home.html', 'home.html', {
                    backbuttonMaximize: false,
                    scrollIndicator: 'none',
                    statusbar: { background: "#FFFFFF" }
                });
                target.show('fade-in', 300);
                setTimeout(() => { plus.webview.currentWebview().close('none'); }, 500);
            } else {
                window.location.replace('home.html');
            }
        }

        function clearStorage() {
            const keys = ['usermail_login', 'userpass_login', 'usermail', 'username', 'userpicture', 'userpoints'];
            keys.forEach(k => localStorage.removeItem(k));
        }

        async function initAction() {
            if (isTaskStarted) return;
            isTaskStarted = true;

            const u_m = localStorage.getItem('usermail_login');
            const u_p = localStorage.getItem('userpass_login');

            if (!u_m || !u_p) {
                navigate();
                return;
            }

            document.getElementById('ui-container').style.display = 'flex';

            try {
                const response = await fetch(`${API}?mode=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: u_m, password: u_p })
                });

                const data = await response.json();

                if (data.code === 200) {
                    if (data.fields && data.fields.length > 0) {
                        const info = data.fields[0];
                        localStorage.setItem('usermail', info["邮箱"]);
                        localStorage.setItem('username', info["昵称"]);
                        localStorage.setItem('userpicture', info["头像"]);
                        localStorage.setItem('userpoints', info["积分"] || '0');
                    }
                    navigate();
                } else if (data.code === 403) {
                    document.getElementById('ui-container').style.display = 'none';
                    document.getElementById('ban-modal').style.display = 'flex';
                } else {
                    alert("账号异常，请重新登录");
                    clearStorage();
                    navigate();
                }
            } catch (err) {
                navigate();
            }
        }

        window.addEventListener('pageshow', () => {
            applyNativeUI();
            initAction();
        });

        document.addEventListener('plusready', () => {
            applyNativeUI();
            plus.key.addEventListener('backbutton', () => {
                if (document.getElementById('ban-modal').style.display === 'flex') {
                    plus.nativeUI.confirm("确定退出应用吗？", (e) => {
                        if (e.index === 0) plus.runtime.quit();
                    }, "提示", ["确定", "取消"]);
                } else {
                    plus.runtime.quit();
                }
            });
        });

        if (document.readyState === 'complete') {
            applyNativeUI();
            initAction();
        }
    </script>
</body>
</html>
