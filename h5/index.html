<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣加应用</title>
    
    <!-- 旧设备检测与跳转脚本 (必须放在最前面且使用老语法，防止旧浏览器因不支持下方ES6语法而整块罢工) -->
    <script>
        (function() {
            var ua = navigator.userAgent;
            var needRedirect = false;

            // 1. 检测 iOS 版本小于 11 (精准覆盖 iOS 6、7、8、9、10 这些不支持完整 ES6/async 的旧版)
            var iosMatch = ua.match(/(iPhone|iPod|iPad).*OS\s+(\d+)_/i);
            if (iosMatch && parseInt(iosMatch[2], 10) < 11) {
                needRedirect = true;
            }

            // 2. 检测 Chrome 内核 (包含 Android WebView / 很多国产浏览器) 版本小于 60
            // 修正：以前的 100 阈值太高了，会误杀 Chrome 70-99 之间完全支持现代语法的浏览器。60 是安全且合理的分界线。
            var chromeMatch = ua.match(/Chrome\/(\d+)/i);
            if (chromeMatch && parseInt(chromeMatch[1], 10) < 60) {
                needRedirect = true;
            }

            // 3. 检测 Firefox 版本小于 60
            var firefoxMatch = ua.match(/Firefox\/(\d+)/i);
            if (firefoxMatch && parseInt(firefoxMatch[1], 10) < 60) {
                needRedirect = true;
            }

            // 如果匹配到旧设备，执行无痕跳转
            if (needRedirect) {
                window.location.replace('oldindex.html');
            }
        })();
    </script>

    <style>
        :root {
            --bg-color: #F2F2F7;
            --text-color: #1c1c1e;
            --danger-color: #ff3b30;
            --accent-color: #007aff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --danger-color: #ff453a;
                --accent-color: #0a84ff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .welcome-wrapper {
            position: relative;
            display: none;
            width: 100%;
            height: 120px;
            align-items: center;
            justify-content: center;
            transform: translateY(-40px);
        }

        .loading-text {
            position: relative;
            font-size: 34px;
            font-weight: 600;
            letter-spacing: 10px;
            color: var(--text-color);
            text-indent: 10px;
        }

        .text-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            white-space: nowrap;
            animation: ultraFade 7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .text-item:nth-child(2) {
            animation-delay: 3.5s;
        }

        @keyframes ultraFade {
            0%, 5% { opacity: 0; }
            20%, 45% { opacity: 1; }
            60%, 100% { opacity: 0; }
        }

        #ban-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .ban-content {
            width: 100%;
            max-width: 340px;
            text-align: center;
        }

        .ban-title {
            color: var(--danger-color);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .ban-body {
            color: var(--text-color);
            font-size: 16px;
            line-height: 1.8;
            text-align: left;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .ban-mail {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="welcome-wrapper" id="ui-container">
        <div class="loading-text">
            <div class="text-item">欢迎回来</div>
            <div class="text-item">马上就好</div>
        </div>
    </div>

    <div id="ban-modal">
        <div class="ban-content">
            <div class="ban-title">⚠️ 当前账号已封禁</div>
            <div class="ban-body">
                可能存在的原因：<br>
            1.上传病毒、低俗等不良内容。<br>
            2.刷评论、引战等违规行为。<br>
            3.抓包、外挂等篡改数据行为。<br>
            </div>
            <div style="font-size: 14px; color: var(--text-color); opacity: 0.5;">
                如有疑问请联系：<br>
                <a href="mailto:110045310@qq.com" class="ban-mail">110045310@qq.com</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://apirank.qujiaweb.top/';
        let hasInited = false;

        function updateStatusBarStyle() {
            if (window.plus) {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (isDark) {
                    plus.navigator.setStatusBarBackground('#000000');
                    plus.navigator.setStatusBarStyle('light');
                } else {
                    plus.navigator.setStatusBarBackground('#F2F2F7');
                    plus.navigator.setStatusBarStyle('dark');
                }
            }
        }

        function clearAndExit() {
            const keys = ['usermail_login', 'userpass_login', 'usermail', 'username', 'userpicture', 'userpoints'];
            keys.forEach(k => localStorage.removeItem(k));
            goHome();
        }

        function goHome() {
            if (window.plus) {
                const h = plus.webview.create('home.html', 'home.html', {
                    backbuttonMaximize: false,
                    scrollIndicator: 'none'
                });
                h.show('fade-in', 250);
                setTimeout(() => { plus.webview.currentWebview().close('none'); }, 500);
            } else {
                window.location.replace('home.html');
            }
        }

        async function startApp() {
            if (hasInited) return;
            hasInited = true;

            const m = localStorage.getItem('usermail_login');
            const p = localStorage.getItem('userpass_login');

            if (!m || !p) {
                goHome();
                return;
            }

            document.getElementById('ui-container').style.display = 'flex';

            try {
                const response = await fetch(`${API}?mode=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: m, password: p })
                });
                const res = await response.json();

                if (res.code === 200 && res.fields && res.fields.length > 0) {
                    const u = res.fields[0];
                    localStorage.setItem('usermail', u["邮箱"]);
                    localStorage.setItem('username', u["昵称"]);
                    localStorage.setItem('userpicture', u["头像"]);
                    localStorage.setItem('userpoints', u["积分"] || '0');
                    goHome();
                } else if (res.code === 403) {
                    document.getElementById('ui-container').style.display = 'none';
                    document.getElementById('ban-modal').style.display = 'flex';
                } else {
                    alert("账号异常，请重新登录");
                    clearAndExit();
                }
            } catch (e) {
                goHome();
            }
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateStatusBarStyle);

        window.addEventListener('pageshow', () => {
            updateStatusBarStyle();
            startApp();
        });

        document.addEventListener('plusready', () => {
            updateStatusBarStyle();
            plus.navigator.setFullscreen(false);
            plus.key.addEventListener('backbutton', () => {
                if (document.getElementById('ban-modal').style.display === 'flex') {
                    plus.nativeUI.confirm("确定退出吗？", (e) => {
                        if (e.index === 0) plus.runtime.quit();
                    }, "提示", ["确定", "取消"]);
                } else {
                    plus.runtime.quit();
                }
            });
        });

        if (document.readyState === 'complete') {
            updateStatusBarStyle();
            startApp();
        }
    </script>
</body>
</html>
