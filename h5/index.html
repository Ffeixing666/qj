<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣加应用</title>
    <style>
        :root {
            --primary-color: #4facfe;
            --text-color: #1a1a1a;
            --bg-color: #ffffff;
            --danger-color: #ff7675;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            overflow: hidden;
        }

        .welcome-wrapper {
            position: relative;
            width: 100%;
            display: none;
            text-align: center;
        }

        .loading-text {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 12px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
        }

        .text-item {
            position: absolute;
            opacity: 0;
            white-space: nowrap;
            animation: pureFade 6s infinite;
        }

        .text-item:nth-child(2) {
            animation-delay: 3s;
        }

        @keyframes pureFade {
            0%, 10% { opacity: 0; }
            40%, 60% { opacity: 1; }
            90%, 100% { opacity: 0; }
        }

        #ban-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .ban-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 32px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
        }

        .ban-title {
            color: var(--danger-color);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .ban-body {
            color: #636e72;
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
            margin-bottom: 30px;
        }

        .ban-mail {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="welcome-wrapper" id="ui-container">
        <div class="loading-text">
            <div class="text-item">欢迎回来</div>
            <div class="text-item">马上就好</div>
        </div>
    </div>

    <div id="ban-modal">
        <div class="ban-content">
            <div class="ban-title">访问受限</div>
            <div class="ban-body">
                抱歉，您的账号因违反社区规定已被封禁。<br><br>
                1. 严禁发布违规及有害资源内容。<br>
                2. 严禁使用第三方工具恶意破坏。<br>
                3. 请保持文明健康的互动环境。
            </div>
            <div style="font-size: 13px; color: #b2bec3;">
                申诉邮箱：<br>
                <a href="mailto:110045310@qq.com" class="ban-mail">110045310@qq.com</a>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://apirank.qujiaweb.top/';
        let hasExecuted = false;

        function enterHome() {
            if (window.plus) {
                const h = plus.webview.create('home.html', 'home.html', {
                    backbuttonMaximize: false,
                    scrollIndicator: 'none'
                });
                h.show('fade-in', 300);
                setTimeout(() => { plus.webview.currentWebview().close('none'); }, 500);
            } else {
                window.location.replace('home.html');
            }
        }

        function clearSession() {
            const list = ['usermail_login', 'userpass_login', 'usermail', 'username', 'userpicture', 'userpoints'];
            list.forEach(k => localStorage.removeItem(k));
        }

        async function process() {
            if (hasExecuted) return;
            hasExecuted = true;

            const mail = localStorage.getItem('usermail_login');
            const pass = localStorage.getItem('userpass_login');

            if (!mail || !pass) {
                enterHome();
                return;
            }

            document.getElementById('ui-container').style.display = 'block';

            try {
                const response = await fetch(`${API}?mode=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: mail, password: pass })
                });

                const res = await response.json();

                if (res.code === 200) {
                    if (res.fields && res.fields.length > 0) {
                        const u = res.fields[0];
                        localStorage.setItem('usermail', u["邮箱"]);
                        localStorage.setItem('username', u["昵称"]);
                        localStorage.setItem('userpicture', u["头像"]);
                        localStorage.setItem('userpoints', u["积分"] || '0');
                    }
                    enterHome();
                } else if (res.code === 403) {
                    document.getElementById('ui-container').style.display = 'none';
                    document.getElementById('ban-modal').style.display = 'flex';
                } else {
                    alert("账号异常，请重新登录");
                    clearSession();
                    enterHome();
                }
            } catch (e) {
                enterHome();
            }
        }

        window.addEventListener('pageshow', process);

        document.addEventListener('plusready', function() {
            plus.navigator.setStatusBarStyle('dark');
            plus.key.addEventListener('backbutton', function() {
                if (document.getElementById('ban-modal').style.display === 'flex') {
                    plus.nativeUI.confirm("确定退出应用吗？", function(res) {
                        if (res.index === 0) plus.runtime.quit();
                    }, "提示", ["确定", "取消"]);
                } else {
                    plus.runtime.quit();
                }
            });
        });

        if (document.readyState === 'complete') process();
    </script>
</body>
</html>
