<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端视口，确保状态栏区域正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <!-- 备用刷新跳转：确保即使脚本执行异常也能跳转，且页面无任何文字 -->
    <meta http-equiv="refresh" content="0; url=https://qujia.qujiaweb.top">
    
    <script>
        // --------------------------------------------------------------
        // 模块：状态栏颜色 + 深色模式 SDK (基于提供的代码提取并集成)
        // 功能：自动适配系统深色/浅色模式，设置 plus 状态栏背景色与文字样式
        // 说明：仅在跳转逻辑之上增加此 SDK，不影响页面空白与跳转行为
        // --------------------------------------------------------------
        (function() {
            // 状态栏样式更新函数（根据系统深色模式状态）
            function updateStatusBarStyle() {
                // 仅在 plus (5+ App / HTML5+ 环境) 可用时执行
                if (window.plus && plus.navigator) {
                    try {
                        // 检测当前系统是否为深色模式
                        const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                        if (isDarkMode) {
                            // 深色模式：状态栏背景黑色，文字/图标白色
                            plus.navigator.setStatusBarBackground('#000000');
                            plus.navigator.setStatusBarStyle('light');
                        } else {
                            // 浅色模式：状态栏背景浅灰（iOS 风格），文字/图标深色
                            plus.navigator.setStatusBarBackground('#F2F2F7');
                            plus.navigator.setStatusBarStyle('dark');
                        }
                    } catch (e) {
                        // 静默失败，不影响跳转
                        console.warn('[StatusBar] update failed', e);
                    }
                }
            }

            // 监听系统深色模式变化（实时更新状态栏样式）
            if (window.matchMedia) {
                const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
                // 标准 API: addEventListener 优先，兼容旧版 addListener
                if (darkModeMedia.addEventListener) {
                    darkModeMedia.addEventListener('change', updateStatusBarStyle);
                } else if (darkModeMedia.addListener) {
                    darkModeMedia.addListener(updateStatusBarStyle);
                }
            }

            // 监听 plus 环境就绪事件 (HTML5+ SDK 初始化完成)
            if (window.plus) {
                // 若 plus 已存在则立即更新状态栏样式
                updateStatusBarStyle();
            } else {
                // 等待 plusready 事件
                document.addEventListener('plusready', function() {
                    updateStatusBarStyle();
                    // 可选：确保全屏模式下状态栏正常（非强制，仅保证风格）
                    if (plus.navigator && typeof plus.navigator.setFullscreen === 'function') {
                        try {
                            plus.navigator.setFullscreen(false);
                        } catch(e) {}
                    }
                });
            }

            // 初次调用：如果 plus 已经可用（极少数同步情况），立刻设置样式
            if (window.plus && plus.navigator) {
                updateStatusBarStyle();
            }

            // 额外适配：页面显示/加载完成时再次尝试，确保状态栏样式正确
            window.addEventListener('pageshow', function() {
                if (window.plus && plus.navigator) {
                    updateStatusBarStyle();
                }
            });
        })();

        // --------------------------------------------------------------
        // 核心跳转逻辑：立即无痕跳转至目标地址，页面无任何文字内容
        // 使用 location.replace 替换当前历史记录，meta 刷新作为后备保障
        // --------------------------------------------------------------
        (function() {
            // 优先使用 JavaScript 的无痕跳转 (replace 不会产生历史记录，体验更干净)
            // 延迟 0 毫秒，确保状态栏 SDK 的同步部分已执行完毕（上面模块已同步运行）
            // 同时避免与 meta 刷新冲突，但 replace 后 meta 将失效，无负面影响。
            try {
                window.location.replace("https://qujia.qujiaweb.top");
            } catch (e) {
                // 极少数异常下，备用方式修改 href
                window.location.href = "https://qujia.qujiaweb.top";
            }
        })();
    </script>
</head>
<!-- 
    完全空白的 body：没有任何文本节点、子元素、可见内容。
    保证了“没有任何文字”的硬性要求。
-->
<body></body>
</html>
