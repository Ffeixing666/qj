<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>趣加应用 · 系统维护公告</title>
    <!-- 引入Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: 现代无衬线字体，提升精致感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0c1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(46, 125, 255, 0.08) 0%, rgba(0, 0, 0, 0) 60%),
                radial-gradient(circle at 85% 70%, rgba(255, 90, 200, 0.06) 0%, rgba(0, 0, 0, 0) 55%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            background-color: #0a0c18;
        }

        /* 动态光晕背景 (科技感呼吸效果) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at 40% 50%, rgba(70, 130, 250, 0.1) 0%, transparent 70%);
            animation: slowShift 12s infinite alternate;
            z-index: 0;
        }

        @keyframes slowShift {
            0% { opacity: 0.4; transform: scale(1);}
            100% { opacity: 0.8; transform: scale(1.2);}
        }

        /* 主卡片容器 */
        .announcement-card {
            position: relative;
            z-index: 2;
            max-width: 560px;
            width: 100%;
            background: rgba(18, 22, 35, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 56px;
            border: 1px solid rgba(96, 165, 250, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(80, 150, 255, 0.2) inset, 0 0 18px rgba(70, 130, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .announcement-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 55px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(120, 180, 255, 0.4) inset;
        }

        /* 卡片内部装饰光效 */
        .card-glow {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(70, 140, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card-content {
            padding: 2.5rem 2rem;
            position: relative;
            z-index: 2;
        }

        /* 品牌区 */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.6rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, #4d9eff, #a85eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 2px 5px rgba(77, 158, 255, 0.3));
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.65rem;
            letter-spacing: -0.3px;
            background: linear-gradient(115deg, #ffffff, #b9e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: rgba(255, 102, 0, 0.25);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffb347;
            border: 0.5px solid rgba(255, 150, 80, 0.5);
            text-transform: uppercase;
        }

        /* 主标题 */
        .main-title {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 1.8rem 0 1.2rem 0;
            background: linear-gradient(120deg, #F0F4FF, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        /* 时间板块 */
        .time-schedule {
            background: rgba(0, 10, 30, 0.5);
            border-radius: 32px;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.4rem 0;
            border-left: 4px solid #ff9f4a;
            backdrop-filter: blur(4px);
        }

        .time-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #eef5ff;
            margin-bottom: 0.7rem;
            font-weight: 500;
        }

        .time-item:last-child {
            margin-bottom: 0;
        }

        .time-item i {
            width: 28px;
            font-size: 1.25rem;
            color: #4d9eff;
            text-align: center;
        }

        .time-highlight {
            font-weight: 700;
            color: #ffbc6e;
            background: rgba(255, 140, 0, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 24px;
            display: inline-block;
            font-size: 0.95rem;
        }

        /* 描述段落 */
        .description {
            margin: 1.6rem 0 1.6rem 0;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cddcff;
            font-weight: 400;
            background: rgba(255,255,245,0.03);
            padding: 0.8rem 1rem;
            border-radius: 28px;
            letter-spacing: 0.2px;
        }

        /* 警告区域 重点提示 */
        .warning-box {
            background: linear-gradient(115deg, rgba(255, 80, 40, 0.12), rgba(255, 50, 100, 0.08));
            border-radius: 28px;
            padding: 1.1rem 1.3rem;
            margin: 1.5rem 0 1.8rem;
            border: 1px solid rgba(255, 100, 70, 0.4);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            backdrop-filter: blur(2px);
        }

        .warning-icon {
            font-size: 1.7rem;
            color: #ff7a4a;
            flex-shrink: 0;
        }

        .warning-text {
            font-weight: 600;
            color: #ffe3c6;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .warning-text strong {
            color: #ffa270;
            font-weight: 800;
        }

        /* 我知道了按钮 */
        .btn-action {
            width: 100%;
            background: linear-gradient(95deg, #3069ff, #9b4dff);
            border: none;
            padding: 1rem 0;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 20px -8px rgba(48, 105, 255, 0.4);
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            margin-bottom: 1.8rem;
        }

        .btn-action i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-action:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #2059ff, #8b3df5);
            box-shadow: 0 6px 14px -4px rgba(48, 105, 255, 0.6);
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        /* 底部支持团队 */
        .footer-thanks {
            text-align: center;
            font-size: 0.75rem;
            color: #8f9ec0;
            border-top: 1px dashed rgba(100, 140, 210, 0.3);
            padding-top: 1.2rem;
            margin-top: 0.4rem;
            letter-spacing: 0.3px;
        }

        .footer-thanks i {
            font-size: 0.7rem;
            margin: 0 4px;
        }

        /* Toast 提示轻弹窗 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.2px;
        }

        .toast-message i {
            font-size: 1rem;
            color: #6effa8;
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: none;
        }

        /* 响应式细节 */
        @media (max-width: 550px) {
            .card-content {
                padding: 1.8rem 1.5rem;
            }
            .main-title {
                font-size: 1.8rem;
                margin: 1rem 0 1rem;
            }
            .brand-name {
                font-size: 1.4rem;
            }
            .time-item {
                font-size: 0.9rem;
            }
            .warning-text {
                font-size: 0.85rem;
            }
            .btn-action {
                padding: 0.85rem 0;
                font-size: 1rem;
            }
        }

        @media (max-width: 420px) {
            .card-content {
                padding: 1.5rem 1.2rem;
            }
            .time-schedule {
                padding: 1rem 1.1rem;
            }
        }

        /* 自定义滚动条优雅 */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0f1222;
        }
        ::-webkit-scrollbar-thumb {
            background: #3055aa;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="announcement-card">
    <div class="card-glow"></div>
    <div class="card-content">
        <!-- 品牌区 融合趣加应用标识 -->
        <div class="brand">
            <div class="brand-logo">
                <i class="fas fa-cube"></i>
                <span class="brand-name">趣加应用</span>
            </div>
            <div class="badge">
                <i class="fas fa-microchip"></i> 官方公告
            </div>
        </div>

        <!-- 主公告标题 -->
        <div class="main-title">
            服务器维护通知
        </div>

        <!-- 时间板块，精确显示维护起始时间 -->
        <div class="time-schedule">
            <div class="time-item">
                <i class="fas fa-calendar-alt"></i>
                <span>维护起始 · <span class="time-highlight">2026年5月24日 22:30</span></span>
            </div>
            <div class="time-item">
                <i class="fas fa-hourglass-half"></i>
                <span>恢复时间 · <span class="time-highlight" style="color:#ffb86c;">待定</span></span>
            </div>
            <div class="time-item">
                <i class="fas fa-sync-alt"></i>
                <span>状态 · 紧急维护中</span>
            </div>
        </div>

        <!-- 具体说明 -->
        <div class="description">
            <i class="fas fa-info-circle" style="margin-right: 6px; color: #6d9eff;"></i> 
            为了提升趣加应用APP及网页版软件板块的稳定性与流畅体验，我们正在对核心服务进行深度升级与优化。期间可能会出现无法访问或服务中断的情况，技术团队已全力抢修，我们将尽快解决相关问题，恢复后第一时间告知。给您带来不便，深表歉意。
        </div>

        <!-- 重点警告区: 强调不可卸载/不可尝试登录 -->
        <div class="warning-box">
            <div class="warning-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="warning-text">
                <strong>⚠️ 重要提醒</strong><br>
                维护期间请<span style="color:#ffb347; font-weight:700;">不要卸载APP</span>，也请<span style="color:#ffb347; font-weight:700;">不要尝试登录</span>账户，以免造成数据异常或影响后续自动恢复。您的数据是安全的，维护结束后即可正常使用。
            </div>
        </div>

        <!-- 确认按钮 “我知道了” -->
        <button class="btn-action" id="understoodBtn">
            <i class="fas fa-check-circle"></i> 我知道了
            <i class="fas fa-arrow-right" style="font-size: 0.9rem;"></i>
        </button>

        <!-- 底部致谢及团队信息 -->
        <div class="footer-thanks">
            <i class="fas fa-heart" style="color: #ff708d;"></i> 感谢您的耐心与理解 · 趣加运营团队 <i class="fas fa-code-branch"></i>
            <div style="margin-top: 6px; font-size: 0.7rem;">
                <i class="fas fa-clock"></i> 我们将尽快恢复服务
            </div>
        </div>
    </div>
</div>

<!-- 自定义 toast 提示容器 -->
<div id="customToast" class="toast-message">
    <i class="fas fa-thumbs-up"></i> 感谢您的等待，维护完成后我们会即刻开放。
</div>

<script>
    (function() {
        const confirmBtn = document.getElementById('understoodBtn');
        const toastEl = document.getElementById('customToast');
        let toastTimeout = null;

        // 显示轻提示函数 (精致非阻塞)
        function showGentleToast(message) {
            if (toastEl) {
                // 自定义消息内容
                const iconSpan = toastEl.querySelector('i');
                const textNode = toastEl.childNodes[2]; 
                if (message) {
                    // 更新消息文本保留图标样式
                    toastEl.innerHTML = `<i class="fas fa-check-double"></i> ${message}`;
                } else {
                    toastEl.innerHTML = `<i class="fas fa-thumbs-up"></i> 感谢您的理解，我们将尽快修复问题。`;
                }
                // 增加类显示动画
                toastEl.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toastEl.classList.remove('show');
                    // 3秒后复原默认文本（可选）
                    setTimeout(() => {
                        if (toastEl && !toastEl.classList.contains('show')) {
                            toastEl.innerHTML = `<i class="fas fa-thumbs-up"></i> 感谢您的等待，维护完成后我们会即刻开放。`;
                        }
                    }, 400);
                }, 2200);
            } else {
                // fallback 极简 alert 但无侵入精致原则，但是保留控制台友好
                console.log("用户已知悉维护公告");
            }
        }

        // 按钮点击交互，附加灵动效果 + 防抖保护
        let isProcessing = false;
        if (confirmBtn) {
            confirmBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (isProcessing) return;
                isProcessing = true;

                // 添加微触感反馈 (视觉波纹或光效)
                confirmBtn.style.transform = 'scale(0.97)';
                setTimeout(() => {
                    if (confirmBtn) confirmBtn.style.transform = '';
                }, 140);

                // 展示优雅提示，告知用户已记录其确认 (无需任何强制跳转/卸载行为)
                showGentleToast('已收到确认 ✓ 请静待维护完成，请勿卸载或登录');

                // 可选: 为增强交互, 增加按钮临时禁用半秒避免狂点 (但不影响体验)
                setTimeout(() => {
                    isProcessing = false;
                }, 800);
            });
        }

        // 额外悬浮光效卡片 细节: 鼠标移动微小光效?（可选简单)
        const card = document.querySelector('.announcement-card');
        if (card) {
            card.addEventListener('mousemove', function(e) {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const glow = card.querySelector('.card-glow');
                if (glow) {
                    glow.style.transform = `translate(${x * 0.03}px, ${y * 0.03}px)`;
                    glow.style.opacity = '0.6';
                }
            });
            card.addEventListener('mouseleave', function() {
                const glow = card.querySelector('.card-glow');
                if (glow) {
                    glow.style.transform = 'translate(0px, 0px)';
                    glow.style.opacity = '1';
                }
            });
        }

        // 针对移动端 touch 事件 简单处理光效 
        card.addEventListener('touchmove', function(e) {
            const touch = e.touches[0];
            const rect = card.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            const glow = card.querySelector('.card-glow');
            if (glow && x > 0 && x < rect.width && y > 0 && y < rect.height) {
                glow.style.transform = `translate(${x * 0.02}px, ${y * 0.02}px)`;
            }
        });
        card.addEventListener('touchend', function() {
            const glow = card.querySelector('.card-glow');
            if (glow) glow.style.transform = 'translate(0px, 0px)';
        });

        // 补充针对维护重要信息的二次强调: 控制台不输出注释，但用户无侵入
        // 避免任何卸载引导，安全
        // 优雅禁止用户长按/右键菜单选取某些误导操作? 不干扰正常浏览，不加多余限制
    })();
</script>
</body>
</html>
