<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <style>
        /* 确保页面没有任何可见元素，完全空白 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: transparent;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
<script>
    (function() {
        // 目标跳转地址 (HTTPS 确保正确跳转)
        const TARGET_URL = 'https://qujia.qujiaweb.top';

        // 执行页面跳转 (使用 replace 避免在历史记录中留存当前页)
        function performRedirect() {
            window.location.replace(TARGET_URL);
        }

        // 状态栏颜色设置函数 (参考提供代码中的 updateStatusBarStyle)
        // 仅当 plus 环境可用时调用，根据系统深色模式设置状态栏背景和文字颜色
        function applyStatusBarStyle() {
            if (typeof window.plus !== 'undefined' && window.plus && plus.navigator) {
                try {
                    // 检测当前系统是否为深色模式
                    const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (isDarkMode) {
                        // 深色模式：状态栏背景黑色，文字亮色
                        plus.navigator.setStatusBarBackground('#000000');
                        plus.navigator.setStatusBarStyle('light');
                    } else {
                        // 浅色模式：状态栏背景浅灰，文字暗色
                        plus.navigator.setStatusBarBackground('#F2F2F7');
                        plus.navigator.setStatusBarStyle('dark');
                    }
                } catch (e) {
                    // 静默失败，不影响跳转
                }
            }
        }

        // 5+ 环境：先设置状态栏颜色，再执行跳转
        function setStatusBarAndRedirect() {
            applyStatusBarStyle();      // 设置状态栏颜色
            performRedirect();          // 立即跳转
        }

        // 检测是否为 5+ 环境 (存在 plus 对象)
        if (typeof window.plus !== 'undefined') {
            // 存在 plus 对象，进一步判断 plus 是否已就绪
            if (window.plus.isReady) {
                // plus 已就绪，直接设置状态栏并跳转
                setStatusBarAndRedirect();
            } else {
                // plus 尚未就绪，监听 'plusready' 事件
                let redirected = false;

                const onPlusReady = function() {
                    if (redirected) return;
                    redirected = true;
                    setStatusBarAndRedirect();
                };

                document.addEventListener('plusready', onPlusReady);

                // 设置超时保护: 避免 plusready 事件因未知原因未触发导致页面卡死
                // 超时后依然尝试设置状态栏并跳转 (此时 plus 应该已可用)
                setTimeout(function() {
                    if (!redirected) {
                        redirected = true;
                        setStatusBarAndRedirect();
                    }
                }, 1200);   // 1.2 秒内未触发 plusready 则强制执行
            }
        } else {
            // 非 5+ 环境 (普通浏览器或未集成 plus SDK 的 WebView): 直接跳转，不进行状态栏设置
            performRedirect();
        }
    })();
</script>
</body>
</html>
