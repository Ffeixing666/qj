<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 使用 meta 刷新作为备选方案，确保在 JavaScript 被禁用或执行异常时仍能跳转 -->
    <meta http-equiv="refresh" content="0; url=https://qujia.qujiaweb.top">
    <script>
        // 使用 replace 方法进行跳转，不会在历史记录中保留当前页面，实现无痕跳转
        // 该脚本会立即执行，优先于 meta 刷新，确保最快的跳转体验
        window.location.replace("https://qujia.qujiaweb.top");
    </script>
</head>
<!-- body 内没有任何文本、空白节点或任何可见元素，确保页面完全空白 -->
<body></body>
</html>
